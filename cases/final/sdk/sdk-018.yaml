description: Large version-bump PR that upgrades NPM/Cargo dependencies, updates the
  Rust nightly toolchain, changes the Yarn node linker strategy, and refactors the
  WASM build pipeline. The xmlhttprequest polyfill's Buffer-to-ArrayBuffer coercion
  (`(response.body as Buffer).buffer as any`) is a known Node.js compatibility hazard
  across major version bumps, and the bulk dependency changes risk introducing subtle
  API-misuse regressions that are invisible without the full diff.
expected_findings:
- file: sdk/src/polyfill/xmlhttprequest.ts
  line: 141
  summary: Buffer.buffer accessor changed — verify the new pattern handles ArrayBuffer
    conversion correctly across Node.js versions, as Buffer.buffer semantics changed
    in Node 18+
  line_side: pre_fix
- file: sdk/src/polyfill/fetch.ts
  line: 1
  summary: Removal of mime/lite import — verify replacement correctly resolves MIME
    types in Node.js polyfill context without the lightweight mime library
  line_side: pre_fix
- file: rust-toolchain.toml
  line: 1
  summary: Nightly toolchain pin updated — nightly compiler changes can introduce
    subtle codegen differences in Wasm output; verify wasm-pack build still produces
    correct binaries
  line_side: pre_fix
- file: sdk/src/polyfill/xmlhttprequest.ts
  line: 151
  summary: Duplicate unsafe Buffer-to-ArrayBuffer cast in a second code path — same
    issue as line 141. Both sites need the same fix to avoid returning a shared/offset
    ArrayBuffer.
  line_side: pre_fix
