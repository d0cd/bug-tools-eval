description: The SDK's KeyProvider was still fetching credits.aleo verifying keys
  from a remote server, a pattern left over from Testnet3. After the transition, these
  keys are provided directly by SnarkVM, so the remote fetch was both unnecessary
  and unreliable, causing failures for SDK users. The fix updates the KeyProvider
  to source keys locally from SnarkVM and updates the WASM bindings and SnarkVM dependency
  accordingly.
expected_findings:
- file: sdk/src/function-key-provider.ts
  line: 33
  summary: KeyProvider fetches verifying keys from a remote URL instead of using keys
    bundled in SnarkVM; remote keys may be stale or unavailable post-Testnet3 migration
  line_side: pre_fix
- file: wasm/src/programs/verifying_key/credits.rs
  line: 18
  summary: get_credits_verifying_key implementation needs to return keys from the
    local SnarkVM build rather than relying on external fetching
  line_side: pre_fix
- file: wasm/Cargo.toml
  line: 24
  summary: SnarkVM dependency pinned to old revision that does not include the bundled
    credits.aleo verifying keys
  line_side: pre_fix
