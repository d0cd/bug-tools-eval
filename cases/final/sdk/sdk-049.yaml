description: SnarkVM 0.10.x replaced the `gates` field on Records with `microcredits`
  in the identifier map and changed Transaction construction methods and serialization
  formats. This PR adapts the Rust and WASM SDKs to the new API, but the PR author
  notes that WASM serialization test vectors are still outdated and network-dependent
  tests fail because the network is down, leaving the migration incomplete.
