  line: 7
  summary: Relative import missing `.js` extension — incompatible with TypeScript
    nodenext/node16 module resolution. Should be `"./wasm.js"` instead of `"./wasm"`.
  line_side: pre_fix
- file: sdk/src/browser.ts
  line: 1
  summary: Relative import missing `.js` extension — breaks nodenext module resolution.
    Should use `"./polyfill/shared.js"`.
  line_side: pre_fix
- file: sdk/src/function-key-provider.ts
