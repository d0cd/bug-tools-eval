description: The app had a race condition where components would attempt to use the
  WASM worker before it finished initializing, causing the app to fail to load on
  mobile or slow connections. The fix introduces a React context provider (WorkerProvider/WorkerContext)
  that gates app rendering until the worker signals initialization is complete, and
  refactors worker.js to post status messages so the provider can track readiness.
expected_findings:
- file: website/src/aleo-wasm-hook.js
  line: 1
  summary: 'Race condition: WASM hook initializes and exposes the module without waiting
    for the web worker to be ready, causing components to call into uninitialized
    worker on slow connections'
  line_side: pre_fix
- file: website/src/workers/worker.js
  line: 1
  summary: Worker does not signal initialization completion to the main thread; consumers
    have no way to know when WASM is ready before invoking operations
  line_side: pre_fix
- file: website/src/index.jsx
  line: 3
  summary: App renders immediately without gating on worker readiness — needs a provider/context
    that defers rendering until the worker posts an 'initialized' message
  line_side: pre_fix
