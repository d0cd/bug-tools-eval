description: The codebase was using an outdated SnarkVM API that could produce malformed
  executions and deployments. The consensus version check in execute.rs used a deprecated
  method instead of the new `CurrentNetwork::CONSENSUS_HEIGHT` API, and the transaction
  Deploy destructuring pattern did not match the updated SnarkVM 1.4.0 struct layout.
  The fix updates the dependency and adapts all call sites to the new API surface.
expected_findings:
- file: wasm/src/programs/manager/execute.rs
  line: 315
  summary: Consensus version check uses deprecated API; should use CurrentNetwork::CONSENSUS_HEIGHT
    introduced in SnarkVM 1.4.0
  line_side: pre_fix
- file: wasm/src/ledger/transaction.rs
  line: 282
  summary: Deploy variant destructuring pattern has wrong arity — SnarkVM 1.4.0 changed
    the Deploy tuple structure
  line_side: pre_fix
- file: wasm/Cargo.toml
  line: 22
  summary: SnarkVM pinned at pre-1.4.0 version; executions and deployments may be
    malformed when submitted to a network running the updated consensus rules
  line_side: pre_fix
