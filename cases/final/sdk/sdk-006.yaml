description: The `verify_function_execution` WASM function and its TypeScript wrapper
  `verifyExecution` only supported single-program executions without imports. Any
  execution involving imported programs (multi-transition) would fail verification
  because the process object never resolved import programs or inserted their verifying
  keys. The fix adds optional `imports` and `importedVerifyingKeys` parameters, resolves
  imports into the process, and inserts per-function verifying keys for each imported
  program before calling `process.verify_execution`.
expected_findings:
- file: wasm/src/programs/execution.rs
  line: 110
  summary: verify_function_execution only accepts (execution, verifying_key, program,
    function_id) — no way to supply imported programs or their verifying keys, so
    verification of any execution with cross-program calls will fail.
  line_side: pre_fix
- file: sdk/src/program-manager.ts
  line: 1963
  summary: verifyExecution passes only (execution, verifyingKey, program, function_id)
    to the WASM layer without imported programs or verifying keys, making multi-import
    execution verification impossible.
  line_side: pre_fix
- file: wasm/src/programs/execution.rs
  line: 103
  summary: verify_function_execution does not resolve imported programs or their verifying
    keys; any execution with imports will fail verification because the process only
    knows about the top-level program
  line_side: pre_fix
- file: sdk/src/program-manager.ts
  line: 1965
  summary: verifyExecution signature does not accept imports or imported verifying
    keys, making it impossible for callers to provide the data needed for multi-import
    verification
  line_side: pre_fix
