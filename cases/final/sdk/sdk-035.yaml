description: The website uses webpack for bundling but was referencing environment
  variables via `import.meta.env`, which is a Vite-specific API and does not work
  in webpack builds. The fix switches to `process.env`, adds dotenv to parse `.env`
  files, and uses `webpack.DefinePlugin` to inject the variables at build time. Without
  this, the Amplitude analytics API key was always undefined, silently disabling analytics.
expected_findings:
- file: website/src/index.jsx
  line: 11
  summary: '`import.meta.env.VITE_AMPLITUDE_API_KEY` uses Vite''s env API but this
    project is bundled with webpack — this will always be undefined. Should use `process.env.VITE_AMPLITUDE_API_KEY`
    with DefinePlugin.'
  line_side: pre_fix
- file: website/webpack.config.js
  line: 60
  summary: No `webpack.DefinePlugin` configured to inject environment variables into
    the bundle. Without it, `process.env.*` references in client code will be undefined
    at runtime.
  line_side: pre_fix
