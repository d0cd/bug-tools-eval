description: The `useAleoWASM()` hook's return signature was changed to return an
  array, but the call site in the develop/execute tab was not updated to destructure
  the result. This caused `aleoWASM` to hold the entire array instead of the WASM
  module, breaking key generation and program input display on the develop screen.
