description: This PR replaces axios with native fetch across the SDK (network-client.ts,
  function-key-provider.ts, new utils.ts). The key risk is that fetch does not reject
  on HTTP error status codes (4xx/5xx) unlike axios, so if the new get/post wrappers
  in utils.ts don't explicitly check response.ok and throw on failures, HTTP errors
  will be silently swallowed. Additionally, the PR is an XL grab-bag of unrelated
  changes (CI fixes, new templates, dependency removal, thread pool refactor) making
  it hard to review each concern thoroughly.
expected_findings:
- file: sdk/src/utils.ts
  line: 1
  summary: Verify that the fetch-based get/post wrappers check response.ok and throw
    on HTTP error statuses; unlike axios, fetch resolves successfully on 4xx/5xx responses,
    which would silently swallow server errors
  line_side: pre_fix
- file: sdk/src/network-client.ts
  line: 1
  summary: Replacing axios import with custom fetch-based get/post utilities — ensure
    error handling semantics are preserved (axios throws on non-2xx, fetch does not)
    across all ~20 network methods in this file
  line_side: pre_fix
- file: sdk/src/function-key-provider.ts
  line: 1
  summary: Replaced axios get with custom fetch-based get for downloading function
    keys — verify binary response handling (arrayBuffer/blob) works correctly since
    axios returns data directly while fetch requires explicit body parsing
  line_side: pre_fix
