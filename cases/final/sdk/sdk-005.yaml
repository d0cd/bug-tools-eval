description: String-to-bytes encoding for message signing and verification used a
  naive encoding method (likely charCodeAt) that fails on multi-byte Unicode characters,
  producing incorrect byte arrays. This caused false positives in signature verification
  on aleo.tools. The fix replaces the custom encoding with the standard TextEncoder
  API which correctly handles UTF-8.
expected_findings:
- file: website/src/utils/Utils.js
  line: 1
  summary: String encoding utility uses naive byte conversion (e.g. charCodeAt) that
    silently corrupts multi-byte Unicode characters; should use TextEncoder for correct
    UTF-8 encoding
  line_side: pre_fix
- file: website/src/tabs/account/SignMessage.js
  line: 25
  summary: Message signing encodes the input string using a method that fails on non-ASCII
    characters, producing incorrect signatures for some messages
  line_side: pre_fix
- file: website/src/tabs/account/VerifyMessage.js
  line: 9
  summary: Signature verification re-encodes the message with the same flawed encoding,
    causing verification to produce false positives when the original signing also
    used the broken encoding
  line_side: pre_fix
