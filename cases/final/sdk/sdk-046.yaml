description: 'The SDK''s Node.js polyfill layer used xmlhttprequest-ssl for XMLHttpRequest
  compatibility, which was broken (issue #956). The fix replaced it with sync-request,
  rewrote the fetch polyfill to no longer depend on the broken XMLHttpRequest shim,
  corrected the Worker polyfill''s null-check guard, and updated rollup externals
  to match the new dependency graph.'
expected_findings:
- file: sdk/src/polyfill/xmlhttprequest.ts
  line: 1
  summary: XMLHttpRequest polyfill imports xmlhttprequest-ssl which is broken/incompatible
    in the current Node.js environment; should be replaced with a working HTTP request
    polyfill (e.g. sync-request)
  line_side: pre_fix
- file: sdk/src/polyfill/fetch.ts
  line: 4
  summary: Fetch polyfill implementation depends on the broken xmlhttprequest-ssl-based
    XMLHttpRequest shim, causing fetch calls to fail in non-browser environments
  line_side: pre_fix
- file: sdk/src/polyfill/worker.ts
  line: 10
  summary: Worker polyfill guard `globalThis.Worker == null` uses loose equality;
    should use strict check or also handle undefined to avoid runtime errors in non-browser
    environments
  line_side: pre_fix
