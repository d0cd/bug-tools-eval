description: The getTransitionId method used the wrong return type (Transition instead
  of string) and deserialized the API response as a Transition object. After an upstream
  API change, the /find/transitionID endpoint returns a plain transition ID string,
  not a Transition object, causing the method to fail or return incorrect data.
