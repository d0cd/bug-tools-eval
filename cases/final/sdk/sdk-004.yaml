- file: wasm/src/programs/program.rs
  line: 313
  summary: Record input serialization omits the `_nonce` field — all Aleo records
    contain a nonce and it should be included in the function input schema returned
    to callers
  line_side: pre_fix
- file: wasm/src/programs/program.rs
  line: 683
  summary: Same missing nonce issue in a second code path that constructs function
    input representations for records
  line_side: pre_fix
