description: The getFunctionInputs method in the WASM bindings omitted the `_nonce`
  field when serializing record-type function inputs. This caused tools consuming
  the SDK (e.g., aleo.tools) to display incomplete record schemas, missing the mandatory
  nonce field that is part of every Aleo record.
