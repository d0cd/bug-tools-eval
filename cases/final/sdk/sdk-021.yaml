description: Public assets (favicon, manifest icons) were not being copied to the
  dist/ folder during webpack builds because the CopyPlugin was missing from the webpack
  configuration. Additionally, the favicon path in index.html incorrectly referenced
  'public/favicon.ico' instead of the root-relative path, and the Header component
  had an incorrect hardcoded height causing a UI layout bug.
expected_findings:
- file: website/webpack.config.js
  line: 1
  summary: Webpack config is missing copy-webpack-plugin to copy public assets (favicon,
    manifest, icons) into the dist/ output folder — built site will have broken asset
    references
  line_side: pre_fix
- file: website/public/index.html
  line: 2
  summary: Favicon href uses 'public/favicon.ico' but public/ is the webroot — path
    should be '/favicon.ico' or 'favicon.ico', otherwise the icon will 404 in production
  line_side: pre_fix
- file: website/src/App.js
  line: 22
  summary: Header has hardcoded inline style height:67 which causes a UI layout bug
    — height value is incorrect or should be removed in favor of CSS
  line_side: pre_fix
