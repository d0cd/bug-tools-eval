description: The `buildExecutionTransaction` function always built a fee transaction,
  even for `split` and `upgrade` functions which should not include fees. The fix
  adds conditional checks to skip fee construction when these special functions are
  invoked, applied across both the WASM execution path (execute.rs, proving_request.rs)
  and the TypeScript SDK (program-manager.ts).
expected_findings:
- file: wasm/src/programs/manager/execute.rs
  line: 174
  summary: 'Missing check: execution transaction builder unconditionally constructs
    a fee for all functions, but `split` and `upgrade` functions in the credits program
    should not include fees.'
  line_side: pre_fix
- file: wasm/src/programs/manager/proving_request.rs
  line: 84
  summary: No fee-exemption logic for `split` or `upgrade` function names — fee proving
    request is generated even when it should be skipped for these special functions.
  line_side: pre_fix
- file: sdk/src/program-manager.ts
  line: 422
  summary: TypeScript SDK execution path does not check whether the function is `split`
    or `upgrade` before building the fee portion of the transaction.
  line_side: pre_fix
