description: The team creation payment redirect used `req.nextUrl.origin` (which reflects
  the server's local origin, e.g. `localhost:3000`) instead of the configured `WEBAPP_URL`
  environment constant. This caused users to be redirected to the wrong host after
  paying for a team. The fix replaces `req.nextUrl.origin` with `WEBAPP_URL`, consistent
  with other redirects in the same file and codebase.
