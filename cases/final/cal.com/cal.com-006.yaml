description: The locale E2E tests used `waitForLoadState("domcontentloaded")` which
  fires before React hydration completes. During Next.js App Router streaming, the
  server-rendered `locale-select` element briefly coexists with its hydrated counterpart,
  causing Playwright's strict mode to reject the ambiguous locator. The fix switches
  to `waitForLoadState("networkidle")` to ensure hydration is complete before querying
  the DOM.
