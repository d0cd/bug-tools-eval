  summary: "Logic error: `teamHasLimits` for managed child event types is always false\
    \ because child event types have no direct team\u2014only the parent has a team.\
    \ Must check parent's team limits when event type is a managed child with `includeManagedEventsInLimits`\
    \ enabled."
