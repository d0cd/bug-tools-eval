description: The FeatureOptInBanner was rendered inline within the component tree,
  creating a stacking context that caused z-index conflicts with the Intercom widget
  at the bottom of the viewport. The fix uses React's createPortal to render the banner
  directly into document.body, but the original code also lacked an SSR guard, meaning
  accessing document.body during server-side rendering could crash the application.
