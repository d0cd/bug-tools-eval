description: The DELETE endpoint throttle decorators for teams and organizations in
  API v2 were configured with a 30-second TTL and blockDuration (30000ms), which is
  excessively restrictive for normal usage. This was reduced to 1 second (1000ms),
  making the rate limit 30x more permissive while still preventing rapid-fire abuse.
