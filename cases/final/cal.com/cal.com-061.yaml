description: The template exclusion check in the app-store build script uses a hardcoded
  forward slash (`"templates/"`) in `startsWith`, but `path.join` returns backslashes
  on Windows. This causes template apps like `link-as-an-app` to leak into `redirect-apps.generated.ts`
  on Windows builds. The fix replaces the hardcoded separator with `path.sep` for
  cross-platform compatibility.
