description: Next.js Link components on the team page prefetch all linked event type
  pages when they enter the viewport. For teams with many event types, this triggers
  server-side rendering for each page, which makes Google Calendar API calls and causes
  rate limiting. The fix adds prefetch={false} to the Link components, matching the
  existing pattern in users-public-view.tsx.
