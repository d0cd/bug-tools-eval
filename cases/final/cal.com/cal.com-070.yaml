description: The @ApiProperty decorator on the routing form responses endpoint declared
  the response type as a single RoutingFormResponseOutput instead of an array. This
  caused the generated OpenAPI spec to incorrectly document the 'data' field as a
  single object rather than an array, misleading API consumers and potentially breaking
  auto-generated SDK clients.
