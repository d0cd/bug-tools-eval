description: 'The @ApiQuery decorators on the getAvailableSlots endpoint were missing
  the `type` property (e.g. `type: String`, `type: Number`), resulting in empty `schema:
  {}` objects in the generated OpenAPI/Swagger specification. This made query parameters
  render without type information in Swagger UI, degrading API documentation quality.
  The fix adds explicit type annotations to all affected decorators.'
