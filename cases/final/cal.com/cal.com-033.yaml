description: The `ics.createEvent()` call in `generateIcsString.ts` does not handle
  Yup ValidationError thrown when an attendee has a phone number instead of an email.
  Because Yup's ValidationError is not an instance of `Error`, it bypasses existing
  catch blocks and propagates as an unhandled 500. The fix catches this specific validation
  failure and converts it to a 400 BadRequest.
