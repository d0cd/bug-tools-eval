description: The round-robin reassignment audit logging unconditionally included organizerUuid
  with old/new values even when the organizer did not change. Additionally, the reviewer
  flagged that spreading `null` into an object literal (when hasOrganizerChanged is
  false) throws at runtime. The fix conditionally includes organizerUuid only when
  hasOrganizerChanged is true and updates the schema to handle the now-optional field.
