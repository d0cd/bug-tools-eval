description: The `calendar.events.patch` call in `updateEvent` was not awaited, causing
  promise rejections (e.g., from Google Calendar quota errors) to escape the surrounding
  try/catch block. This resulted in unhandled rejection crashes in the API. The fix
  simply adds `await` to the call.
