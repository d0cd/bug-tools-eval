description: When updating Cal Video settings on a team managed event type, the handleChildrenEventTypes
  synchronization logic omitted Cal Video configuration fields from the set of properties
  propagated from parent to child events. This caused children event types to retain
  stale Cal Video settings after the parent was updated. The fix adds the missing
  Cal Video fields to both the update handler's pass-through and the children sync
  logic.
