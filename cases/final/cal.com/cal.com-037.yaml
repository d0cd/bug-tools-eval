description: The teams loading skeleton (skeleton.tsx) rendered <TeamsCTA />, which
  includes a button with data-testid="new-team-btn". When the real page content loads
  and also renders <TeamsCTA />, both instances briefly coexist in the DOM, causing
  Playwright's strict-mode locator to fail by finding two matching elements. The fix
  removes <TeamsCTA /> from the skeleton so only the real page renders it.
