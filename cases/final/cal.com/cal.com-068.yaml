description: The bookings page used FeaturesRepository.getUserFeaturesStatus to check
  the bookings-v3 feature flag, which only checks per-user flags. This ignored org-level
  and team-level opt-ins, so users whose organization or team had enabled bookings-v3
  would not see the feature. The fix switches to FeatureOptInService.resolveFeatureStates
  which respects the full org/team/user opt-in hierarchy.
