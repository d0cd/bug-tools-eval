description: The Umami integration's SCRIPT_URL field was defined as optional in the
  Zod schema with no default value. The React component's defaultValue prop only serves
  as a UI placeholder and does not persist to the data model, so when a user enables
  Umami without explicitly setting a script URL, the field is undefined at runtime
  and the tracking script fails to load. The fix adds a .default() in the Zod schema
  so the URL is populated during validation. Additionally, the old default URL (us.umami.is)
  was outdated and updated to cloud.umami.is.
expected_findings:
- file: packages/app-store/umami/zod.ts
  line: 8
  summary: SCRIPT_URL is z.string().optional() with no .default(). When the user never
    sets a value, this field remains undefined and the tracking script silently fails
    to load. Needs a schema-level default.
  line_side: pre_fix
- file: packages/app-store/umami/components/EventTypeAppCardInterface.tsx
  line: 33
  summary: defaultValue on the input is only a UI hint — it does not persist to the
    data model. The actual default must be set in the Zod schema, not here. Also the
    URL 'us.umami.is' is stale; Umami moved to 'cloud.umami.is'.
  line_side: pre_fix
- file: packages/app-store/umami/zod.ts
  line: 1
  summary: SCRIPT_URL field in the Zod schema lacks a .default() value, causing validation
    to reject configs where the user omits the script URL — add a default pointing
    to the standard Umami script endpoint
  line_side: pre_fix
