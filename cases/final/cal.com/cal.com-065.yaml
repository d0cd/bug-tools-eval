  line: 1
  summary: File uses `-controller.ts` suffix instead of `.controller.ts`. The NestJS
    Swagger CLI plugin requires the `.controller.ts` suffix to apply AST transformations
    for OpenAPI response type annotations; this file will be silently skipped.
  line_side: pre_fix
- file: docs/api-reference/v2/openapi.json
