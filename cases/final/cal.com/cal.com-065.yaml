description: The OOO controller file was named `organizations-users-ooo-controller.ts`
  (hyphen before 'controller') instead of the NestJS convention `organizations-users-ooo.controller.ts`
  (dot before 'controller'). The NestJS Swagger CLI plugin's `controllerFileNameSuffix`
  defaults to `['.controller.ts']`, so it skipped AST transformation on the file,
  resulting in empty response schemas in the generated OpenAPI spec.
