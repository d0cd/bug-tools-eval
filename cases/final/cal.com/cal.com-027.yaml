description: When `areCalendarEventsEnabled` was set to false in the Platform API,
  the EventManager skipped all event creation including third-party video meetings
  (e.g. Daily.co). This caused `meetingUrl` in webhook payloads to contain the raw
  location identifier (`integrations:daily`) instead of the actual video URL. The
  fix introduces a `skipCalendarEvent` option that selectively skips calendar and
  CRM event creation while still creating video meetings.
expected_findings:
- file: packages/features/bookings/lib/handleConfirmation.ts
  line: 151
  summary: When `areCalendarEventsEnabled` is false, `eventManager.create()` is called
    without distinguishing between calendar events and video meeting creation, causing
    video meetings to be skipped entirely.
  line_side: pre_fix
- file: packages/features/bookings/lib/service/RegularBookingService.ts
  line: 2292
  summary: The `shouldSkipCalendarEvents` flag is used to gate all event creation
    including video meetings; third-party video apps like Daily.co should still create
    meetings even when calendar sync is disabled.
  line_side: pre_fix
- file: packages/features/bookings/lib/EventManager.ts
  line: 280
  summary: EventManager.create() has no mechanism to skip only calendar/CRM events
    while preserving video meeting creation, so disabling calendar events inadvertently
    prevents video URL generation.
  line_side: pre_fix
