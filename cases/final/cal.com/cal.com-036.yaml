description: Page headers in Shell.tsx had sticky positioning enabled by default,
  causing inconsistent scroll behavior across pages. Some pages (workflows, routing
  forms, org members) used the sticky Shell header while others (event types, bookings)
  used ShellMainAppDir which never had it. The fix adds a `disableSticky` prop to
  the Shell header components and passes `disableSticky={true}` from affected pages.
