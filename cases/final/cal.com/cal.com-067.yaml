description: Replaces direct @trpc/server imports with hand-rolled duck-typing and
  a hardcoded error-code-to-HTTP-status mapping to avoid circular dependencies. The
  duck-typing type guard (err.name === 'TRPCError') is fragile and the status code
  mapping can silently drift from TRPC's canonical mapping. Additionally, the pre-commit
  hook change removes --error-on-warnings entirely rather than making it opt-out,
  weakening local lint enforcement.
expected_findings:
- file: packages/lib/server/trpcErrorUtils.ts
  line: 37
  summary: 'Duck-typing via err.name === ''TRPCError'' is fragile: any error with
    name manually set to ''TRPCError'' will match, and minifiers or future TRPC versions
    could change the name. Consider checking for the ''code'' property being a known
    TRPC error code as an additional discriminant, or using Symbol-based detection.'
  line_side: pre_fix
- file: packages/lib/server/trpcErrorUtils.ts
  line: 6
  summary: Hardcoded TRPC_ERROR_CODES_TO_HTTP mapping duplicates @trpc/server/http's
    getHTTPStatusCodeFromError and can silently drift if TRPC adds or changes codes
    (e.g., UNSUPPORTED_MEDIA_TYPE was added in tRPC v11). This table has no mechanism
    to detect staleness.
  line_side: pre_fix
- file: lint-staged.config.mjs
  line: 3
  summary: Removed --error-on-warnings entirely from pre-commit linting rather than
    keeping it as the default with an opt-out. Biome lint warnings will now silently
    pass pre-commit, allowing warning accumulation that CI (which runs yarn lint,
    not biome directly) may or may not catch.
  line_side: pre_fix
- file: .github/workflows/lint.yml
  line: 19
  summary: '`continue-on-error: true` silently swallows all lint failures in CI, making
    the lint job purely informational and allowing lint errors to merge uncaught.'
  line_side: pre_fix
- file: packages/lib/server/trpcErrorUtils.ts
  line: 36
  summary: 'Duck-typing type guard (`err.name === "TRPCError"`) is fragile: any error
    object with `name: "TRPCError"` and a string `code` field will match, and the
    hardcoded TRPC-error-code-to-HTTP-status mapping can silently drift from the canonical
    mapping in `@trpc/server` if TRPC adds or changes codes.'
  line_side: pre_fix
