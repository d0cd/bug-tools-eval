description: The Docker Compose volume mount for PostgreSQL uses `/var/lib/postgresql/data`,
  but PostgreSQL 18+ changed its data directory layout to `/var/lib/postgresql/18/main`.
  This causes the container to fail its healthcheck and enter a crash loop, breaking
  `yarn dx`. The fix updates the mount to `/var/lib/postgresql` so it covers the new
  subdirectory structure.
