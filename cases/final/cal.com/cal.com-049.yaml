description: Team and user ID arrays passed to Prisma ANY conditions were not sorted
  or deduplicated, causing non-deterministic SQL query generation. This led to flaky
  integration tests because identical logical queries produced different SQL strings
  depending on the order IDs were returned from prior queries. The fix sorts and deduplicates
  the ID arrays before passing them to Prisma.
