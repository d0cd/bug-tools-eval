description: 'The call history empty screen lacked actionable guidance for users and
  had an accessibility defect: a Link component was nested inside a Button, producing
  invalid button>anchor HTML that breaks keyboard navigation and screen-reader semantics.
  The fix replaces the nested Link with the Button''s own `href` prop, adds a CTA
  to create a Cal.ai workflow, updates copy, and removes the unused `Link` import.'
