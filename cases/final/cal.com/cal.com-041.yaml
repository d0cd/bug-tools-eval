description: The OAuth authorization flow broke when an unauthenticated user needed
  to sign up. The login page redirected to signup/onboarding but did not preserve
  the original OAuth redirect URL (`/auth/oauth2/authorize`), so after completing
  onboarding the user landed in the main app instead of being sent back to complete
  the OAuth consent flow. The fix stores the OAuth return URL (via `ONBOARDING_REDIRECT_KEY`
  in localStorage) during login and reads it back after onboarding completes.
expected_findings:
