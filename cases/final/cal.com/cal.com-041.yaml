  line: 57
  summary: After onboarding completes, the redirect target does not check for a stored
    OAuth return URL; new users who entered via an OAuth authorize flow are sent to
    the default app route instead of back to `/auth/oauth2/authorize`.
  line_side: pre_fix
- file: apps/web/modules/auth/login-view.tsx
  line: 47
  summary: When redirecting an unauthenticated user to the signup flow, the original
    OAuth `callbackUrl` / redirect query parameter is not persisted, so it is lost
    across the signup and onboarding steps.
  line_side: pre_fix
