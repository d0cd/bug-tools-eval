description: Email reminder workflows in EmailWorkflowService.ts were constructing
  meeting URLs directly from the daily.co metadata instead of using getVideoCallUrlFromCalEvent,
  which produces the branded Cal.com /video/{uid} URL. This caused email reminders
  (both REMINDER and CUSTOM template paths) to expose raw daily.co links to end users,
  breaking the consistent branded experience for Cal Video meetings.
expected_findings:
- file: packages/features/ee/workflows/lib/service/EmailWorkflowService.ts
  line: 397
  summary: meetingUrl is built from raw daily.co metadata instead of using getVideoCallUrlFromCalEvent(uid,
    location) to produce the Cal.com branded /video/{uid} URL
  line_side: pre_fix
- file: packages/features/ee/workflows/lib/service/EmailWorkflowService.ts
  line: 414
  summary: 'Same issue in the CUSTOM email template path: meetingUrl uses raw daily.co
    link rather than the Cal.com video URL helper'
  line_side: pre_fix
- file: packages/features/ee/workflows/lib/service/EmailWorkflowService.ts
  line: 442
  summary: 'Third occurrence of the same pattern: meetingUrl constructed from metadata
    instead of getVideoCallUrlFromCalEvent'
  line_side: pre_fix
