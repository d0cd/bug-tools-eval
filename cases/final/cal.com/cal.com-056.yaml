description: The ListSchedules atom documentation used the prop name `getRedirectUrl`,
  which does not exist on the component. The actual prop is `getScheduleUrl`, so anyone
  following the docs would pass a callback that is silently ignored, causing schedule
  links to fall back to `#` instead of navigating correctly.
