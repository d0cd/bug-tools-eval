description: 'PR #27012 introduced logic to disable apps without valid environment
  keys during database seeding, but failed to account for E2E test environments where
  payment app keys (e.g., alby) are intentionally unconfigured. This caused payment-apps
  E2E tests to fail because the alby app was marked disabled in the App table before
  tests ran. The fix adds an ensureAppEnabled helper to explicitly re-enable the app
  during test setup.'
