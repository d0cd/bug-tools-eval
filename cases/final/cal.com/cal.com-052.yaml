description: The `getOrgFullOrigin()` function in orgDomains.ts unconditionally used
  `WEBSITE_URL` as the base for booking URLs for non-organization users. On the EU
  instance, `WEBSITE_URL` is `cal.com` (marketing site) while bookings are served
  from `app.cal.eu` (`WEBAPP_URL`), causing generated booking URLs to point to the
  wrong domain. The fix detects when the two env vars have different root domains
  and falls back to `WEBAPP_URL`.
expected_findings:
- file: packages/features/ee/organizations/lib/orgDomains.ts
  line: 150
  summary: 'Logic error: `getOrgFullOrigin()` uses `WEBSITE_URL` for non-org booking
    URLs without checking whether `WEBSITE_URL` and `WEBAPP_URL` share the same root
    domain. On EU deployments this produces URLs like `cal.com/user/event` instead
    of `app.cal.eu/user/event`, redirecting users to the marketing site instead of
    the booking page.'
  line_side: pre_fix
