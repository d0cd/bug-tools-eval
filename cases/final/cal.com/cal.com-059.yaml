description: Locale E2E tests used a fragile CSS path selector (`.bg-default > div
  > div:nth-child(2)`) to click the language dropdown, causing intermittent test failures
  when react-select's internal DOM structure or render timing shifted. The fix adds
  a `data-testid="locale-select"` attribute to the Select component and replaces brittle
  CSS selectors with `getByTestId` in both affected test cases.
