description: The blocked relay/disposable email domains list incorrectly included
  fastmail.com and proton.me, which are primary mailbox domains used by millions of
  legitimate users. This caused false-positive rejections during signup, preventing
  real users from creating accounts. The fix removes these two domains while keeping
  actual relay/alias service domains (e.g. simplelogin.com) on the list.
