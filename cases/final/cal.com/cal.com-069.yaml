description: The Stripe collectCard method threw a generic Error on failure, causing
  the server error handler to map it to HTTP 500 (internal server error) instead of
  HTTP 400 (bad request). The fix introduces a CollectCardFailure error code used
  with ErrorWithCode, and maps it to 400 in getHttpStatusCode.
