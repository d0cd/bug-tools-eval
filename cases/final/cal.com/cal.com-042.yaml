description: The SecondaryEmail table lacked a composite index on (email, emailVerified),
  causing the email-verification EXISTS subquery in checkIfBookerEmailIsBlocked.ts
  to perform full table scans. This resulted in ~300ms latency and ~4% steady CPU
  usage. The fix adds the missing composite index via a migration with IF NOT EXISTS
  for safe production deployment.
