description: The sticky navigation header in the app shell caused visible layout shift
  (CLS) during render and scroll because no stable height was reserved for the sticky
  element. The fix adds explicit height reservation for the sticky container, preventing
  the content below from jumping when the header transitions to/from its sticky state.
expected_findings:
