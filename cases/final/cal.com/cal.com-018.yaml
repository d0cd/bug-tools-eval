  line: 127
  summary: Sticky container does not reserve a stable height — content below will
    shift when the element becomes sticky, causing layout jank (CLS). Should set a
    min-height or use a placeholder to prevent reflow.
  line_side: pre_fix
- file: apps/web/modules/shell/Shell.tsx
  line: 196
  summary: Same missing height reservation pattern for sticky element — bannersHeight
    is read but not used to stabilize the layout, causing visible jump on scroll.
  line_side: pre_fix
- file: apps/web/components/apps/layouts/AppsLayout.tsx
  line: 19
  summary: disableSticky={true} is passed but the underlying Shell component still
    lacks proper height reservation for its sticky header, leading to layout shift
    in the apps layout.
  line_side: pre_fix
