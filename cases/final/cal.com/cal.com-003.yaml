- file: apps/web/modules/onboarding/getting-started/onboarding-view.tsx
  line: 1
  summary: Onboarding view does not account for loading state of team membership check,
    potentially rendering incorrect UI before membership status is resolved
  line_side: pre_fix
- file: packages/features/auth/lib/onboardingUtils.ts
  line: 67
  summary: 'Logic error: `hasPendingInviteByUserId` only checks pending membership
    status, but invite-token signups auto-accept the membership. Should check for
    any team membership, not just pending invites.'
  line_side: pre_fix
- file: apps/web/app/(use-page-wrapper)/onboarding/getting-started/page.tsx
