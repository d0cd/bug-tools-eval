description: The organization onboarding flow sent raw base64-encoded image files
  directly to the server without client-side resizing, causing HTTP 413 (Request Entity
  Too Large) errors for large uploads. The fix replaces manual file input handling
  with existing ImageUploader/BannerUploader components that crop and resize images
  client-side before transmission. A secondary issue was the translation hint showing
  an incorrect 10MB max file size instead of 5MB.
