description: The Widget Viewer modal incorrectly treated CATEGORICAL_BAR charts like
  time-series charts (LINE, AREA, BAR), giving them HALF_TABLE_ITEM_LIMIT instead
  of FULL_TABLE_ITEM_LIMIT. This caused fewer bars to render and a smaller backing
  table. The fix adds CATEGORICAL_BAR to the TABLE display-type condition in all three
  query branches and passes widget.limit as tableItemLimit.
