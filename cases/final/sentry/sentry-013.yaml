description: Widget layout dimensions from external sources (e.g. LLM-generated dashboards)
  are passed unclamped to react-grid-layout, which expects widths ≤ the column count
  (6). Values like w:12 trigger an infinite re-render loop in the grid library, crashing
  the browser tab. The fix adds a clampWidgetLayout() function that normalizes w/h/x/y
  before layouts reach the grid.
