description: The `OrganizationPreprodRetentionEndpoint` had `SessionAuthentication`
  listed before token authentication classes. When a request carried both session
  cookies and a Bearer token, session auth would win, set `request.auth = None`, and
  trigger an SSO check — returning a spurious `401 sso-required` error, preventing
  CLI token-based access entirely. The fix reorders `authentication_classes` to place
  token classes first (matching the framework's `DEFAULT_AUTHENTICATION` order) and
  adds the missing `OrgAuthTokenAuthentication`.
expected_findings:
- file: src/sentry/preprod/api/endpoints/organization_preprod_retention.py
  line: 49
  summary: 'authentication_classes ordering is wrong: SessionAuthentication precedes
    UserAuthTokenAuthentication, so session auth wins over Bearer tokens and triggers
    spurious SSO 401 errors. Token auth classes should come first, and OrgAuthTokenAuthentication
    is missing entirely.'
