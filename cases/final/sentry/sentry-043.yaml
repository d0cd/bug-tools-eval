description: The CI setup action restores the virtual environment from cache and then
  immediately runs `find` commands that delete all `__pycache__` directories and `.pyc`
  files, including those inside `.venv/`. This negates the venv cache restoration,
  forcing Python to recompile every installed package on first import during every
  CI run. The fix excludes `.venv` from the `find` cleanup paths.
expected_findings:
- file: .github/actions/setup-sentry/action.yml
  line: 90
  summary: '`find . -type d -name __pycache__ -exec rm -rf {} +` deletes cached bytecode
    inside .venv, negating the venv cache restore from the previous step. Should exclude
    .venv with `-not -path ''./.venv/*''`'
  line_side: pre_fix
- file: .github/actions/setup-sentry/action.yml
  line: 91
  summary: Second `find` command removing .pyc files also lacks a `.venv` exclusion,
    compounding the cache invalidation problem
  line_side: pre_fix
