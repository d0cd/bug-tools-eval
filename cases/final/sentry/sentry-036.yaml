description: Rate limiting in save_attachment was incorrectly applied to attachments
  that already had a stored_id (already written to objectstore during ingestion).
  Since putfile reads from objectstore for these attachments rather than writing to
  filestore, rate limiting them only discards already-stored data with no protective
  benefit. The fix wraps rate limit checks in an `if not attachment.stored_id` guard.
expected_findings:
