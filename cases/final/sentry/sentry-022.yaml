description: 'The PR removes frontend defense-in-depth filtering of hidden occurrence
  types (HIDDEN_OCCURRENCE_TYPE_IDS in addOccurrence), relying entirely on the EAP
  trace API to filter them server-side. The frontend does not explicitly request this
  filtering, so if the API-side filter (PR #110356) has gaps or is not yet fully deployed,
  hidden occurrence types could be exposed to users.'
