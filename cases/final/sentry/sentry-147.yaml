description: The Redis buffer's _dump_value/_load_value methods only handled primitive
  types (str, datetime, date, int, float) but the buffer's `extra` argument can contain
  dict values. Passing a dict would raise a TypeError. The fix adds recursive dict
  serialization via JSON with a depth limit of 3, and corresponding deserialization
  in _load_value.
