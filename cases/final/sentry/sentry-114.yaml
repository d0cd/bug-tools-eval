description: The `SeerExplorerClient` was being instantiated in `operator.py` with
  only `organization` but missing critical initialization parameters including the
  `on_completion_hook` callback. This meant the explorer client at the OPEN_PR stopping
  point would not trigger the completion hook, silently skipping post-completion logic.
  The fix extracts a shared factory function `get_autofix_explorer_client` that always
  initializes the client with the correct parameters including the `AutofixOnCompletionHook`.
