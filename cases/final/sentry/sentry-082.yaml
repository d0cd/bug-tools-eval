description: The `detect_expired_preprod_artifacts` task incorrectly marks snapshot
  artifacts as timed out. Artifacts with an associated `PreprodSnapshotMetrics` row
  have a different processing lifecycle and should be excluded from the 30-minute
  expiry check, but the query lacked a filter to skip them. The fix adds a `preprodsnapshotmetrics__isnull=True`
  filter to the expired artifacts query.
