description: Refactoring PR replaces custom expand/collapse card implementations with
  a standardized Disclosure component in autofix cards. The migration incorrectly
  moves summary text inside `Disclosure.Content`, hiding it when collapsed, leaves
  a stale `area="header"` prop that no longer has a CSS grid context, and drops ARIA
  labels for collapse/expand buttons, degrading accessibility.
