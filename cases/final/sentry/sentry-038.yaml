description: is_installable_artifact() failed to check for a valid code signature,
  only verifying installable_app_file_id and build_number. This caused XCARCHIVE artifacts
  without valid code signatures to be incorrectly treated as installable, resulting
  in spurious PR comments on Cocoa SDK PRs. The fix moves the existing code signature
  check from get_artifact_install_info() into is_installable_artifact().
