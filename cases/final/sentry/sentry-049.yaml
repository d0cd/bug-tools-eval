  line: 297
  summary: 'Out-of-bounds equation index: `orderby: -equation[9]` references the 10th
    equation but only two `equation|`-prefixed fields exist (indices 0 and 1), breaking
    table sorting'
  line_side: pre_fix
- file: static/app/views/dashboards/datasetConfig/spans.tsx
  line: 506
  summary: Falsy `||` operator between `data[INTERNAL_ERROR_COUNT_FIELD]` and the
    equation-prefixed key treats a valid count of 0 as falsy, skipping the first key
    unnecessarily; also `INTERNAL_ERROR_COUNT_FIELD` lacks the `equation|` prefix
    so the custom error-count renderer will never match the now-prefixed field
  line_side: pre_fix
- file: static/app/views/dashboards/utils/prebuiltConfigs/ai/aiAgentsModels.ts
