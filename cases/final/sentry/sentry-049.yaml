description: 'Prebuilt dashboard configs used aggregates like `count_if`, `performance_score`,
  etc. without the required `equation|` prefix, causing Explore to render them as
  ''None''. The mechanical fix of adding the prefix introduced secondary issues: the
  `INTERNAL_ERROR_COUNT_FIELD` constant in spans.tsx was not updated to match the
  new prefixed field name (breaking the custom error count renderer), the `orderby`
  field `-equation[9]` references a non-existent equation index, and a `||` fallback
  operator treats valid zero counts as falsy.'
expected_findings:
