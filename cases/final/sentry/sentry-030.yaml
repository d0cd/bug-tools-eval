description: Tests used midnight (00:00:00) as timestamps, causing flaky failures
  when test execution straddled a day boundary. Date-arithmetic and time-window queries
  produce different results depending on whether the current time is before or after
  midnight relative to the test timestamp. The fix updates timestamps to mid-day values
  for stable results.
