  line: 95
  summary: Midnight timestamp in test setup causes timing-dependent flakiness around
    day boundaries; should use a non-midnight timestamp (e.g. noon) so date arithmetic
    is stable regardless of when the test suite runs
  line_side: pre_fix
- file: tests/sentry/api/endpoints/test_organization_traces.py
