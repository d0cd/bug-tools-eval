  line: 41
  summary: Missing explicit timeout on make_translate_query_request call; inherits
    the 5-second default from the urllib3 connection pool, which is too short for
    AI translation queries
  line_side: pre_fix
- file: src/sentry/seer/endpoints/trace_explorer_ai_translate_agentic.py
  line: 82
  summary: Missing explicit timeout on make_translate_agentic_request call; the default
    5-second pool timeout is insufficient for agentic AI translation
  line_side: pre_fix
- file: src/sentry/seer/signed_seer_api.py
  line: 370
  summary: make_translate_query_request lacks a timeout parameter, so callers cannot
    override the pool default timeout for long-running AI requests
  line_side: pre_fix
