description: After migrating to urllib3 connection pools (commit 8500e95), a default
  5-second read timeout was introduced. The AI translate endpoints (translate and
  translate-agentic) did not specify explicit timeouts, causing ReadTimeoutErrors
  for requests that legitimately take longer than 5 seconds. The fix adds explicit
  timeout parameters (30s and 10s respectively) to the Seer API call functions.
expected_findings:
