description: The SubmitButton was disabled whenever the form value equaled the defaultValue,
  in addition to when the form was submitting. This logic broke creation forms that
  ship with sensible defaults the user may want to submit immediately without modification.
  The fix narrows the disabled condition to only the submitting state.
