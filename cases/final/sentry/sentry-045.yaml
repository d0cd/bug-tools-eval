description: The comparison data download query fires as soon as metric IDs are available,
  without waiting for the async comparison task to reach SUCCESS state. This causes
  the query to hit a 404, cache the error via React Query, and never re-fire when
  the comparison actually completes — leaving the user with a permanent 'Comparison
  not found' error. The fix gates the download query's `enabled` flag on `mainArtifactComparison?.state
  === SizeAnalysisComparisonState.SUCCESS`.
