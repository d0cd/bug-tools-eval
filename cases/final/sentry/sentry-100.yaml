description: The backend widget serializer's limit validation had no case for TABLE
  display type, causing it to fall through to the default max of 10. The frontend
  hardcodes a table limit of 20, so saving table widgets with 11-20 rows would fail
  backend validation. The fix adds TABLE as a recognized display type with max_allowed=20.
