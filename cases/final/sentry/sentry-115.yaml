description: The modal's document-level keydown listener unconditionally closes the
  modal on any ESC press, ignoring whether a child overlay (e.g., CompactSelect dropdown)
  has already handled and prevented the event. The fix adds an `e.defaultPrevented`
  check so the modal respects events already consumed by React Aria's `useOverlay`.
expected_findings:
- file: static/app/components/globalModal/index.tsx
  line: 1
  summary: 'Modal ESC keydown handler missing `e.defaultPrevented` guard: the `document.addEventListener(''keydown'',
    ...)` callback closes the modal on any ESC press without checking if a child overlay
    already called `e.preventDefault()`, causing premature modal dismissal when nested
    overlays are open'
