description: A loading state bug caused the 'connect repositories' popup to incorrectly
  reappear when project Seer preferences were updated. The mutation or query invalidation
  logic did not distinguish between initial data loading (where showing the popup
  is appropriate) and refetching after a settings change, causing UI elements gated
  on `isLoading` to flash incorrectly. Additionally, branding was incompletely renamed
  from 'Autofix Agent' to 'Autofix Handoff'.
