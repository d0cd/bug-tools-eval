description: Cache invalidation in GroupHash ORM hooks (save/update/delete) passes
  hash values directly as cache keys without validation. When the database contains
  corrupted records where the hash field holds an error message instead of a valid
  hash, cache.delete_all raises an exception that propagates up and blocks the entire
  database operation. The fix wraps the cache invalidation call in a try-except to
  allow DB mutations to proceed even if cache cleanup fails.
expected_findings:
