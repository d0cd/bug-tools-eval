  line: 39
  summary: "Cache key derived directly from hash field without validation \u2014 malformed\
    \ hash data (e.g. error messages stored as hashes) produces invalid cache keys,\
    \ causing cache.delete_all to raise and block the calling ORM operation. Wrap\
    \ in try-except or validate the key before use."
  line_side: pre_fix
