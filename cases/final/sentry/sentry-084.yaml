description: The issue details actions component conditionally hides the unarchive
  button based on whether resolving/unresolving is allowed for the issue type. Crons,
  uptime, and metric issues disallow resolve/unresolve, which incorrectly also hides
  the unarchive button. The fix separates the unarchive visibility check from the
  resolve/unresolve permission check so archived issues of these types can always
  be unarchived.
