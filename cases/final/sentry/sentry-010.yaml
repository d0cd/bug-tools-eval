description: The checkout form's useEffect unconditionally calls fetchBillingConfig()
  whenever the subscription object changes. When payment details are updated via the
  SubscriptionStore, this triggers a re-fetch of billing config which resets the form
  state (including plan selection) back to defaults. The fix uses a useRef guard to
  ensure fetchBillingConfig() is only called once on mount.
