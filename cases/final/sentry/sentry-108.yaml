description: The code used `logger.exception()` and `metrics_incr('error')` to report
  a missing Environment, then re-raised the exception. This double-reports the error
  (once via Sentry's exception capture from `logger.exception`, once via the re-raise
  propagating up). Additionally, a missing environment is an expected condition during
  deletion, not a true error, so error-level logging and error metrics were inappropriate.
expected_findings:
- file: src/sentry/workflow_engine/processors/workflow.py
  line: 388
  summary: logger.exception() combined with re-raise causes double error reporting
    in Sentry. Use logger.info() or logger.warning() instead since the exception is
    re-raised and will be handled upstream.
  line_side: pre_fix
- file: src/sentry/workflow_engine/processors/workflow.py
  line: 386
  summary: metrics_incr('process_workflows.error') treats a missing Environment as
    an error, but this is an expected condition during environment deletion. This
    inflates error metrics with non-actionable noise.
  line_side: pre_fix
