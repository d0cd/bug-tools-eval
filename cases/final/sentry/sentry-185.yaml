description: When querying raw metric 'value' without an aggregation function, the
  response metadata lacked unit information because units are only embedded in aggregate
  function definitions (e.g. avg(value,name,type,unit)). The fix augments the frontend
  response meta by injecting the unit extracted from the metric filter conditions
  already available client-side, so non-aggregate metric values render with proper
  unit formatting.
