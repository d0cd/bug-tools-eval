description: 'Pagination was removed from the snapshot details API endpoint, replaced
  with a single unbounded response that can return up to 50,000 image metadata entries
  at once. While the metadata per image is lightweight, the combination of no server-side
  limit, raising maxProperties from 1,000 to 50,000, and changing all sidebar sections
  to defaultExpanded: true risks large payloads and DOM rendering overhead for uploads
  with many images.'
