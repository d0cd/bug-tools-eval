description: App Store signed builds were incorrectly treated as installable artifacts
  because `is_installable_artifact()` did not exclude builds with `app-store` codesigning
  type. This caused broken install links in PR comments, install pages, and update
  checks, since only Apple can distribute those builds via TestFlight/App Store. A
  reviewer also noted that `find_latest_installable_artifact()` has a related issue
  where its codesigning_type filter may still return app-store artifacts.
expected_findings:
- file: src/sentry/preprod/build_distribution_utils.py
  line: 1
  summary: 'Missing guard in is_installable_artifact(): should return false when codesigning
    type is ''app-store'', since those builds can only be installed by Apple via TestFlight/App
    Store'
  line_side: pre_fix
- file: src/sentry/preprod/build_distribution_utils.py
  line: 88
  summary: "find_latest_installable_artifact() applies a codesigning_type filter only\
    \ when the parameter is provided, meaning callers that omit the argument can still\
    \ receive app-store artifacts \u2014 the filter is insufficient to prevent returning\
    \ non-installable builds"
  line_side: pre_fix
