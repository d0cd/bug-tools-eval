description: The customer stats chart filtered abuse data points using a strict equality
  check `reason === 'none'`, which missed entries where `reason` is `undefined` or
  an empty string. These falsy-but-not-'none' values caused abuse data points to be
  silently dropped, leading to underreported abuse volumes. The fix adds a falsy check
  alongside the string comparison.
