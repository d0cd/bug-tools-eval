description: The ProjectPreprodBuildDistributionLatestEndpoint only accepted distribution-scoped
  tokens, which are hard to mint (only via custom integrations). The fix creates a
  new union permission class (ProjectDistributionOrProjectPermission) that accepts
  either distribution-scoped or regular project-scoped user tokens, broadening access
  to the endpoint.
