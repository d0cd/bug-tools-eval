description: The widget full-screen modal displayed an issues table alongside timeseries
  visualizations (line, bar, area) for ISSUES dataset widgets. Since issue tables
  do not support aggregates, this produced broken or misleading results. The fix adds
  a condition to hide the table for issues timeseries widgets, as well as for rage/dead
  click and server tree widgets.
