description: The ByCellName resolver did not handle the case where `cell_name` is
  None during the migration period from `region_name` to `cell_name`. Old callers
  that still pass `region_name` instead of `cell_name` would cause the resolver to
  fail. The fix adds a fallback to `region_name` when `cell_name` is not yet provided.
