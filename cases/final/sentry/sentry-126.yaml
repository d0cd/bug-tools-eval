description: ProjectDebugFile.file used Django's default CASCADE on_delete, meaning
  deleting a File would cascade-delete all ProjectDebugFile rows referencing it, and
  the custom delete() method unconditionally deleted the backing File even when other
  ProjectDebugFile rows still referenced it. The fix changes the FK to PROTECT and
  wraps the File cleanup in a ProtectedError handler so shared Files survive until
  the last reference is removed.
expected_findings:
- file: src/sentry/models/debugfile.py
  line: 122
  summary: FlexibleForeignKey to sentry.File uses default CASCADE on_delete, but File
    rows can be shared by multiple ProjectDebugFile rows — CASCADE allows a File deletion
    to silently destroy all referencing ProjectDebugFile rows. Should use PROTECT
    to prevent deleting a File that is still referenced.
  line_side: pre_fix
- file: src/sentry/models/debugfile.py
  line: 197
  summary: self.file.delete() is called unconditionally after deleting the ProjectDebugFile
    row. If another ProjectDebugFile shares the same File, this deletes the backing
    File out from under it, causing data loss. Must check for remaining references
    or catch ProtectedError.
  line_side: pre_fix
