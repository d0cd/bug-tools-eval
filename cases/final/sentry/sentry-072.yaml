description: 'The whats-new sidebar component had multiple edge cases in its mark-seen
  logic: an accidental cache write with an empty value, missing guard to prevent unnecessary
  POST calls when all broadcasts were already seen, and a useEffect dependency on
  the useMutation return that could cause redundant re-runs. Additionally, test mocks
  used string query parameters while the implementation passed numbers, preventing
  correct request matching.'
