description: The regex for parameterizing 'kitchen' time formats uses a literal space
  before the am/pm group, but all parameterization regexes are evaluated with the
  `(?x)` verbose flag which causes whitespace to be ignored. This means the space
  between the time and am/pm marker is silently dropped from the pattern, causing
  it to only match formats without a space (e.g. '3:04PM' but not '3:04 PM'). The
  fix replaces the literal space with `\s?` to both survive verbose mode and make
  the space optional.
