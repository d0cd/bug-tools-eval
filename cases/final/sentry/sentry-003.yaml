description: 'When a new commit is pushed to a PR, the code only queries the current
  CommitComparison row for an existing comment_id, missing comment_ids stored on previous
  commits'' rows and causing duplicate GitHub comments on every push. The fix widens
  the lock and search to all CommitComparison rows for the PR, but introduces a StopIteration
  risk: the current row''s CommitComparison can be deleted between the initial fetch
  and the wider query since there is no enclosing transaction, causing `next()` without
  a default to raise an unhandled exception.'
expected_findings:
- file: src/sentry/preprod/vcs/pr_comments/tasks.py
  line: 1
  summary: Query for existing comment_id is scoped to only the current CommitComparison
    row; should search all rows matching the same PR (organization_id + head_repo_name
    + pr_number) to find a comment_id from a previous commit and avoid posting duplicate
    comments.
  line_side: pre_fix
- file: src/sentry/preprod/vcs/pr_comments/tasks.py
  line: 109
  summary: 'StopIteration raised if CommitComparison is deleted between the initial
    artifact fetch and the second query for all_for_pr: `next(c for c in all_for_pr
    if c.id == commit_comparison.id)` has no default value and no transaction guarantees
    the row still exists.'
  line_side: pre_fix
