description: Impersonated superuser sessions bypass data secrecy enforcement because
  `is_active_superuser()` returns False during impersonation, skipping the `get_superuser_scopes()`
  path that checks data secrecy. This allows impersonating users to access organizations
  that have data secrecy enabled, defeating the access control. The fix adds explicit
  guards in both `from_request_org_and_scopes()` and `from_request()` to detect impersonation
  via `request.actual_user` and raise `DataSecrecyError`.
