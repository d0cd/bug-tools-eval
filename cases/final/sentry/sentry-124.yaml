  summary: 'Type mismatch: `sentry.normalized_description` is typed as `string` but
    the backend can return `null`. Should be `string | null` to prevent runtime TypeErrors
    when null values reach string-expecting consumers like the SQLish parser.'
  line_side: pre_fix
- file: static/app/views/insights/database/components/tables/queriesTable.tsx
  line: 1
  summary: Passing potentially null `sentry.normalized_description` to a component
    or parser expecting a non-null string without a `?? ''` fallback, causing TypeError
    at runtime when the backend returns null.
  line_side: pre_fix
- file: static/app/views/insights/database/views/databaseSpanSummaryPage.tsx
  line: 1
  summary: Missing null guard when passing `sentry.normalized_description` to string-expecting
    consumer; needs `?? ''` fallback to handle null values from the backend.
  line_side: pre_fix
