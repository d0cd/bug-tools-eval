description: The `SpanResponseRaw` type declared `sentry.normalized_description` as
  `string`, but the backend can return `null`. This type mismatch allowed null values
  to flow unchecked to string-expecting consumers like the SQLish parser, causing
  runtime TypeErrors. The fix widens the type to `string | null` and adds `?? ''`
  fallbacks at all call sites.
