description: The GitHub integration's get_file method does not distinguish between
  a successful raw bytes response and a JSON error response when fetching CODEOWNERS
  files. When the GitHub API returns an error (status >= 400), the response body is
  treated as file content, leading to bad state where error JSON is stored as if it
  were a valid CODEOWNERS file. The fix adds an explicit check for error status codes
  and raises an exception that callers already swallow.
expected_findings:
- file: src/sentry/integrations/github/client.py
  line: 1
  summary: "get_file method does not check HTTP status code before returning response\
    \ body \u2014 an error response (status >= 400) from GitHub API will be treated\
    \ as valid file content, corrupting CODEOWNERS state"
