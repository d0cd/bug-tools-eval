description: The regex lookahead `(?=.*[0-9])` used to validate that a suspected hex
  string contains at least one digit was too permissive. The `.*` could consume past
  the end of the hex token and match a digit anywhere later in the string, causing
  non-hex words like `deadbeef` to be incorrectly parameterized as hex when followed
  by any digit elsewhere in the message. The fix narrows the lookahead to `(?=[a-f]*[0-9])`
  so only hex letters are allowed before the required digit.
expected_findings:
- file: src/sentry/grouping/parameterization.py
  line: 1
  summary: 'Overly permissive lookahead `(?=.*[0-9])` in hex parameterization regex:
    `.*` matches beyond the hex token boundary, causing false positives like `deadbeef`
    in `deadbeef dogs are number 1`. Should be `(?=[a-f]*[0-9])` to restrict the lookahead
    to hex characters only.'
