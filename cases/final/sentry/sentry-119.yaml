description: The `useAvatar` hook calls `.trim()` on `ownerId` and the avatar name
  without first coercing them to strings. When these values are numeric (e.g., a user
  ID passed as a number), `.trim()` is not a function on `Number`, causing a runtime
  TypeError that crashes the avatar component. The fix coerces both values to strings
  before calling `.trim()`.
