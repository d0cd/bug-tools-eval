description: 'The trace waterfall''s measurement indicator placement logic had two
  bugs: it failed to prefer standalone LCP/CLS span measurements over pageload-derived
  ones (skipping them when an indicator of the same type already existed), and it
  incorrectly calculated timestamps for standalone spans by assuming measurements
  occur exactly at span start rather than applying the measurement offset from the
  provided origin (e.g., performance.timeOrigin).'
expected_findings:
- file: static/app/views/performance/newTraceDetails/traceModels/traceTree.measurements.tsx
  line: 1
  summary: When a standalone span measurement duplicates an existing pageload-derived
    indicator of the same type, the standalone span's more specific measurement should
    replace the existing indicator rather than being skipped
  line_side: pre_fix
- file: static/app/views/performance/newTraceDetails/traceModels/traceTree.measurements.tsx
  line: 1
  summary: Indicator timestamp for standalone spans should apply the measurement offset
    relative to the provided origin (node-start or performance.timeOrigin), not assume
    the measurement occurs exactly at span start time
  line_side: pre_fix
