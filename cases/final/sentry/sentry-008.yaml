description: The OAuth2 authorization page's Approve button was immediately clickable
  on page load, making it vulnerable to double-clickjacking and UI redressing attacks.
  The fix adds a delay mechanism before enabling the Approve button, but the implementation
  uses `pointermove` as the sole trigger to start the enable timer, which blocks keyboard-only
  and some touch users from ever approving. Additionally, the timer uses a 1-second
  delay instead of the intended 3 seconds, and `pointerdown` could let an attacker's
  overlaid click initiate the enable timer.
expected_findings:
- file: src/sentry/templates/sentry/oauth-authorize.html
  line: 80
  summary: "OAuth Approve button is only enabled via a `pointermove` event listener,\
    \ making it permanently inaccessible to keyboard-only users and assistive technology\
    \ users \u2014 needs a fallback such as `focusin` or a pure timer."
  line_side: pre_fix
- file: src/sentry/templates/sentry/oauth-authorize.html
  line: 73
  summary: setTimeout delay is 1000ms (1 second) instead of the intended 3000ms (3
    seconds), reducing the effectiveness of the anti-clickjacking mitigation.
  line_side: pre_fix
- file: src/sentry/templates/sentry/oauth-authorize.html
  line: 69
  summary: Listening for `pointerdown` to start the enable timer allows an attacker's
    overlaid click to begin the countdown, weakening the clickjacking protection.
    Should use `pointerup` or a user-gesture-independent timer.
  line_side: pre_fix
