description: The upload options endpoint returned an objectstore base URL with a trailing
  slash. When the objectstore client appended its subpath (e.g. `/v1/objects:batch/...`),
  the resulting URL contained a double slash (`//`), causing batch upload requests
  to fail. The fix strips the trailing slash from the generated URL.
expected_findings:
- file: src/sentry/preprod/api/endpoints/project_preprod_upload_options.py
  line: 1
  summary: "Base URL returned to clients includes a trailing slash, which causes double-slash\
    \ (`//`) in composed URLs when clients append subpaths \u2014 use `.rstrip('/')`\
    \ or equivalent before returning"
