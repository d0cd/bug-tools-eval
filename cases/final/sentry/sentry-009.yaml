description: The trace API endpoints did not apply visibility filtering for issue
  types, causing unreleased and internal issue types to leak to users in trace waterfall,
  preview timeline, and event graph views. The fix adds backend filtering using the
  existing GroupType visibility system, but the fallback behavior when get_visible()
  is unavailable silently degrades to no filtering rather than blocking.
expected_findings:
- file: src/sentry/snuba/trace.py
  line: 338
  summary: Trace query returns issues without filtering by GroupType.released status;
    unreleased/internal issue types leak to API consumers. Additionally, when get_visible()
    returns an empty list, the code falls back to no filtering instead of returning
    no results, which preserves the information leak in edge cases.
  line_side: pre_fix
- file: src/sentry/api/endpoints/organization_trace.py
  line: 59
  summary: Trace API endpoint lacks the visibility filtering that the /issues/ endpoint
    applies, allowing users to see internal test issue types in trace views.
  line_side: pre_fix
- file: src/sentry/seer/endpoints/organization_trace_summary.py
  line: 1
  summary: Trace summary endpoint also exposes unreleased issue types; needs the same
    GroupType visibility filtering applied to the main trace and issues endpoints.
  line_side: pre_fix
