  summary: 'Platform filter is overly restrictive: integrations are filtered by specific
    platform strings rather than by language, hiding valid AI integrations from users
    whose projects match the language but not the exact platform variant'
  line_side: pre_fix
- file: static/app/views/insights/pages/agents/onboarding.tsx
