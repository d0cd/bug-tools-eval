description: AI agent integrations were incorrectly filtered by platform (e.g., 'python-flask',
  'node-express') instead of by language alone (e.g., 'python', 'javascript'). This
  caused valid integrations to be hidden from users whose projects used a recognized
  language but a platform variant not in the filter list. The fix removes the platform-level
  filters and retains only language-based filtering.
