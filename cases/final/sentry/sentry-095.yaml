  summary: Polling checks `task_status.status == "completed"` but the Copilot API
    uses the `state` field for lifecycle values; `status` is always empty string,
    so this condition is never true and tasks stay stuck in RUNNING forever.
  line_side: pre_fix
- file: src/sentry/integrations/github_copilot/models.py
