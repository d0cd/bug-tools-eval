description: The polling logic for GitHub Copilot tasks checked `task_status.status`
  for completion, but the Copilot API returns lifecycle values (`queued`, `in_progress`,
  `completed`, `failed`, `timed_out`) in the `state` field while `status` is always
  an empty string. This caused Copilot tasks to remain stuck in RUNNING state indefinitely,
  never syncing the PR URL or completion state back to Sentry.
