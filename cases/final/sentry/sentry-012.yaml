description: Dashboard linked field validation was checking against `fields` (which
  includes both aggregates and group bys) instead of `columns` (which contains only
  group bys). Since linked dashboards are not supported on aggregates, validating
  against `fields` would incorrectly allow aggregate fields to pass validation or
  incorrectly reject valid column references.
