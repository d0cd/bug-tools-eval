description: All echarts widget instances on the dashboard were unconditionally connected
  to the same sync group, causing every mousemove event to dispatch cursor-sync calls
  to every chart—including those scrolled off-screen. The fix uses an IntersectionObserver
  to dynamically add/remove charts from the echarts connect group based on viewport
  visibility, significantly reducing the work echarts does on hover.
expected_findings:
- file: static/app/views/dashboards/contexts/widgetSyncContext.tsx
  line: 31
  summary: 'Performance: `chart.group = groupName; echarts.connect(groupName)` registers
    every chart into the sync group unconditionally. On dashboards with many widgets,
    this causes expensive cross-chart cursor synchronization on every mousemove event,
    even for off-screen charts. Should only connect charts that are currently visible
    in the viewport.'
  line_side: pre_fix
- file: static/app/views/dashboards/widgets/timeSeriesWidget/timeSeriesWidgetVisualization.tsx
  line: 452
  summary: 'Missing cleanup: `registerWithWidgetSyncContext(instance)` is called on
    chart ready but its return value (unregister callback) is discarded, so charts
    are never removed from the sync group when unmounted or re-initialized.'
  line_side: pre_fix
