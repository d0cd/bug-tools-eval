description: The `git_pr_number` field was listed in `SENTRY_PREPROD_STRING_TAGS`
  but PR numbers are integers. The backend already treats it as numeric (in `numeric_keys`
  in `artifact_search.py`), so the frontend explore view was fetching and presenting
  it with the wrong type, causing incorrect filtering or display. The fix moves the
  field to `SENTRY_PREPROD_NUMBER_TAGS`.
