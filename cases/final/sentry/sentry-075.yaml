description: The metrics UI filtered out metrics lacking a unit (`!has:metric.unit`)
  but failed to also exclude metrics where the unit is explicitly stored as the string
  "none". This incomplete filter allowed "none" to leak through as a visible unit
  label in the metric selector, samples table, and alert rule field. The fix adds
  `metric.unit:none` to the exclusion query and suppresses display of the literal
  "none" unit string in select rows.
