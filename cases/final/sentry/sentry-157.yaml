description: The function call_seer_to_delete_these_hashes() was making unauthenticated
  POST requests to Seer's delete-by-hash endpoint using the raw connection pool (seer_grouping_connection_pool.urlopen())
  instead of make_signed_seer_api_request(), bypassing RPC signature authentication.
  Additionally, when exception handling was broadened to catch TimeoutError and MaxRetryError,
  the logging and metric tags were left hardcoded as 'ReadTimeoutError', misidentifying
  the actual exception type.
expected_findings:
- file: src/sentry/seer/similarity/grouping_records.py
  line: 1
  summary: 'Unauthenticated POST request: call_seer_to_delete_these_hashes() uses
    seer_grouping_connection_pool.urlopen() directly instead of make_signed_seer_api_request(),
    bypassing RPC signature authentication on the Seer delete-by-hash endpoint'
  line_side: pre_fix
- file: src/sentry/seer/similarity/grouping_records.py
  line: 86
  summary: "Hardcoded error reason 'ReadTimeoutError' in log extra and metric tag\
    \ is incorrect when the except clause also catches TimeoutError and MaxRetryError\
    \ \u2014 should use the actual exception type"
  line_side: pre_fix
- file: src/sentry/seer/similarity/grouping_records.py
  line: 86
  summary: 'Redundant ReadTimeoutError in except clause: ReadTimeoutError is a subclass
    of TimeoutError, so catching both is unnecessary and misleading'
  line_side: pre_fix
