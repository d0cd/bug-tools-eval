description: When a sentinel value (All Projects or My Projects) was staged but not
  yet committed, unchecking an individual project checkbox would add its ID alongside
  the sentinel (e.g. `[-1, 1]`). Because the sentinel `-1` remained, the selection
  still resolved to `kind='all'`, leaving the checkbox visually checked and suppressing
  the selection limit warning. The fix expands the sentinel to explicit project IDs
  before toggling the clicked project off.
expected_findings:
- file: static/app/components/pageFilters/project/projectPageFilter.tsx
  line: 1
  summary: 'Toggle logic does not expand sentinel values before removing a project:
    when staged selection contains a sentinel like -1 (All Projects) or -2 (My Projects),
    toggling a project ID appends it without removing the sentinel, so the selection
    still resolves as ''all'' or ''my'' and the uncheck has no visible effect'
  line_side: pre_fix
