  summary: Flex container uses `height="100%"` instead of `flex="1" minHeight="0"`,
    causing overflow clipping when parent has other children consuming space
  line_side: pre_fix
- file: static/app/views/preprod/snapshots/main/imageDisplay/diffImageDisplay.tsx
