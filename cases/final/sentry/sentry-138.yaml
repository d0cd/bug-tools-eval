description: The `if not value` truthiness check in the rule serializer's `to_internal_value`
  method was intended to strip empty strings but also incorrectly stripped falsy values
  like `0`, `False`, and empty lists `[]`. This caused alert rule conditions with
  a threshold of 0 to silently lose their value field, breaking alert configuration.
