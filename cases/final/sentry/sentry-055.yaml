description: The frontend defines `DisplayType.AGENTS_TRACES_TABLE = 'agents_traces_table'`
  but the backend `DashboardWidgetDisplayTypes` enum lacks this value. Since the DRF
  serializer validates against `as_text_choices()`, any attempt to save a widget with
  display type `agents_traces_table` is rejected as an invalid choice, breaking the
  AI Agents Overview dashboard.
