description: 'Two issues broke HMR in the Scraps storybook: (1) circular dependencies
  from barrel self-imports in storybook.tsx created a cycle that crashed rspack HMR
  with a TypeError on reload; (2) `useMemo` with an empty dependency array in `useStoryBookFiles`
  captured a stale webpack/rspack context reference, preventing subsequent hot reloads
  from registering accept handlers and updating the story list.'
expected_findings:
- file: static/app/stories/storybook.tsx
  line: 1
  summary: "Circular dependency: barrel self-import (`import * from './'`) creates\
    \ a cycle (barrel \u2192 storybook \u2192 barrel) that crashes rspack HMR with\
    \ a TypeError on module reload. Replace with direct imports from the specific\
    \ modules needed."
  line_side: pre_fix
- file: static/app/stories/view/useStoriesLoader.tsx
  line: 41
  summary: 'Stale HMR context: `useMemo` with an empty dependency array captures the
    webpack/rspack context only once, so after the first HMR cycle the reference is
    stale and no new accept handler is registered. The context or its keys should
    be a dependency, or a mutable ref pattern should be used.'
  line_side: pre_fix
