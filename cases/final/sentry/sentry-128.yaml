  line: 530
  summary: 'Incorrect filtering: uses `occurrence_category=OccurrenceCategory.ISSUE_PLATFORM`
    enum to distinguish error vs issue-platform occurrences instead of checking presence/absence
    of `occurrence_id` field'
  line_side: pre_fix
- file: src/sentry/api/endpoints/organization_traces.py
  line: 380
  summary: "Same incorrect `occurrence_category=OccurrenceCategory.ISSUE_PLATFORM`\
    \ filter \u2014 should check for `occurrence_id` presence instead"
  line_side: pre_fix
- file: src/sentry/snuba/occurrences_rpc.py
  line: 34
  summary: The `OccurrenceCategory` enum used for filtering is semantically wrong
    for distinguishing error vs issue-platform occurrences; the correct discriminant
    is presence of `occurrence_id`
  line_side: pre_fix
