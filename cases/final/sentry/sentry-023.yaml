description: 'ChartLegend''s useLayoutEffect read triggerWidth from React state (via
  useDimensions), which was always one render behind due to queued layout-effect state
  updates. At the exact overflow boundary, this one-render lag caused a permanent
  oscillation: showing the ''+N more'' trigger made items not fit, hiding it made
  them fit, creating an infinite render loop (''Maximum update depth exceeded'').
  The fix reads triggerRef.current?.getBoundingClientRect().width directly instead
  of relying on stale state.'
expected_findings:
- file: static/app/components/charts/chartLegend.tsx
  line: 1
  summary: Stale triggerWidth from useDimensions state causes infinite render loop
    at overflow boundary; should read getBoundingClientRect().width directly from
    the ref inside the layout effect instead of depending on state that lags by one
    render
  line_side: pre_fix
