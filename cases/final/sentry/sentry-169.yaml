description: 'The Agents Traces Table widget had multiple rendering issues in the
  widget viewer: it used `frameless` mode which disabled pagination, column widths
  were too narrow causing text clipping, chart visualization was incorrectly enabled
  for a table-only widget, and an incorrect `widgetType: WidgetType.SPANS` caused
  spurious ''Open in Explore'' links. These are symptoms of the widget not being fully
  adapted for the widget viewer context.'
