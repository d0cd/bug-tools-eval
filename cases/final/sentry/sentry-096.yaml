description: 'The snapshot testing feature (PR #107971, commit b3def8dd550) added
  `*.snapshots.tsx` files under `static/` but did not update the `TsCheckerRspackPlugin`
  exclude list in rspack.config.ts. Since `tests/**/*` is excluded, the `it.snapshot`
  type augmentation is unavailable, causing TS2339 errors when the plugin type-checks
  snapshot files. The fix adds `''**/*.snapshots.*''` to the exclude list, matching
  the existing `''**/*.spec.*''` pattern.'
expected_findings:
- file: rspack.config.ts
  line: 1
  summary: "TsCheckerRspackPlugin exclude list is missing a glob for `*.snapshots.*`\
    \ files \u2014 these files depend on the `it.snapshot` type augmentation from\
    \ `tests/`, which is itself excluded, causing TS2339 errors"
