description: Test class `TestEAPIsEscalating` used a hardcoded `FROZEN_TIME` of `datetime(2026,
  2, 11, ...)` which, after 30 days from that date, exceeded Snuba's retention window.
  Events stored via `store_events_to_snuba_and_eap()` were silently dropped, causing
  all 5 tests to return 0 results. The fix replaces the absolute date with a relative
  one (`datetime.now() - 24h`), matching the `TIME_YESTERDAY` pattern already used
  by sibling test classes.
