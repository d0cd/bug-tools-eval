description: The Jira integration's `raise_error()` method only parsed JSON error
  fields for `ApiInvalidRequestError`, not for the broader `ApiError` class. When
  Jira returned a 404 with JSON body (e.g., 'Issue does not exist'), the error fell
  through to the generic handler without surfacing actionable field-level errors.
  Additionally, `get_issue()` lacked any error handling, so API errors from the Jira
  client were never routed through `raise_error()` at all.
expected_findings:
- file: src/sentry/integrations/jira/integration.py
  line: 1023
  summary: error_fields_from_json() is only called inside the `isinstance(exc, ApiInvalidRequestError)`
    branch, so a plain ApiError with valid JSON error fields (e.g., 404 'issue not
    found') skips field parsing entirely and falls through to super().raise_error()
  line_side: pre_fix
- file: src/sentry/integrations/jira/integration.py
  line: 534
  summary: get_issue() calls client.get_issue() without try/except, so ApiError exceptions
    are never routed through self.raise_error() — the error is not surfaced as an
    IntegrationFormError to the user
  line_side: pre_fix
