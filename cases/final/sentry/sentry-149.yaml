description: "The widget card's fullscreen button was conditionally hidden when `dashboardId`\
  \ from `useParams()` was undefined, which is always the case in PrebuiltDashboardRenderer/insights\
  \ pages. The fix to show the fullscreen button and fall back to `openWidgetViewerModal()`\
  \ was only applied to one render path \u2014 the fallback path for non-timeseries\
  \ widgets (e.g., tables) still guards fullscreen on `dashboardId`, leaving it broken\
  \ there. Additionally, the modal's `onClose` callback strips query parameters like\
  \ 'sort' from the URL, which can break parent page state."
expected_findings:
