  summary: 'Incomplete fix: the second WidgetFrame render path (for non-timeseries
    widgets like tables) still guards the fullscreen button on `dashboardId`, so prebuilt/insights
    dashboards remain broken for these widget types.'
  line_side: pre_fix
- file: static/app/views/dashboards/widgetCard/index.tsx
  line: 272
  summary: The `onClose` callback for the widget viewer modal deletes query parameters
    (including 'sort') from the URL when closing, which can break the sorting state
    of the host page in insights contexts.
  line_side: pre_fix
