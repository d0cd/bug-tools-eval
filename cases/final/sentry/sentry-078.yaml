description: The sequential `drain_mailbox` function returned immediately upon any
  single `DeliveryFailed` exception, causing head-of-line blocking where one transient
  failure (e.g. a 500 response) would delay all subsequent unrelated webhooks in that
  mailbox until the next retry cycle (up to 3 minutes). The fix makes the function
  skip failed messages and continue delivering the rest, matching the parallel drain
  path's behavior, with a provider-based allowlist to preserve strict ordering for
  providers that need it.
expected_findings:
- file: src/sentry/hybridcloud/tasks/deliver_webhooks.py
  line: 320
  summary: 'Head-of-line blocking: `except DeliveryFailed` unconditionally returns,
    halting delivery of all remaining messages in the mailbox when a single message
    fails. Should skip the failed message and continue processing subsequent messages.'
  line_side: pre_fix
- file: src/sentry/hybridcloud/tasks/deliver_webhooks.py
  line: 305
  summary: Query uses `id__gte=payload.id` (the original trigger payload ID) instead
    of tracking the last-processed ID. On the next drain invocation within the same
    call, this re-fetches already-failed records that are still in the DB with a future
    `schedule_for`, potentially causing an infinite loop or redundant processing.
  line_side: pre_fix
