description: The existing block sync process used a cyclical request-response pattern
  that was slow and could miss forks. The PR replaces it with an aggressive continuous
  sync that broadcasts the highest known hash back to each responding peer and requests
  all missing blocks, dramatically improving sync throughput and fork coverage.
