description: Off-by-one boundary error in ledger block loading. When the ledger contains
  exactly n*501+1 blocks (one block past a batch boundary), the final block is not
  loaded during validation, causing a panic due to a block hash mismatch assertion.
  The fix corrects the loop boundary conditions in three while-loops that iterate
  over block batches.
