  summary: 'Off-by-one in batch loop: `while start_block_height <= latest_block_height`
    skips the last block when it falls exactly one past a batch boundary; the loop''s
    end-of-batch calculation excludes the final partial batch of size 1'
  line_side: pre_fix
- file: storage/src/state/ledger.rs
