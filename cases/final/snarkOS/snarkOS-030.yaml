description: The longest_child_path operation used an application-level in-memory
  cache (HashedMap) to store block children, which was inefficient and required repeated
  Rust-side BFS traversal. This PR replaces that with a single SQL recursive CTE query
  in the SQLite backend, removing the cache entirely. It also fixes an off-by-one
  error in get_block_hashes where OLDEST_FORK_THRESHOLD was incremented by 1 unnecessarily.
