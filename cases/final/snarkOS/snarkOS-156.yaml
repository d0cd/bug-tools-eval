description: The node's sync state was incorrectly updated during block request generation,
  and there was no mechanism to clear the greatest peer height when all peers disconnected.
  This caused nodes to remain in a 'synced' state with misleading log messages even
  when not connected to any peers. The fix restricts sync state changes to response
  processing, new block locators, and disconnects, adding a `clear_greatest_peer_height`
  function that transitions the node to 'unsynced' when no block locators remain.
