description: The NUM_REDUNDANT_REQUESTS constant was hardcoded rather than scaling
  dynamically with committee size, causing either excessive or insufficient fetch
  redundancy depending on the validator set. Additionally, the redundancy metric incorrectly
  counted callbacks instead of actual sent TransmissionRequest/CertificateRequest
  events, making the redundancy check unreliable.
