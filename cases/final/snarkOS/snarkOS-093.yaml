description: The validator requests cache map in the BFT gateway is never cleaned
  up when a peer disconnects. Since the cache has no time-based expiry, entries accumulate
  indefinitely as peers connect and disconnect (potentially from different IPs), leading
  to unbounded memory growth. The fix clears the cached validator requests for a peer
  upon disconnect.
expected_findings:
- file: node/bft/src/gateway.rs
  line: 1085
  summary: Disconnect handler does not clear the validator requests cache for the
    departing peer, allowing the cache to grow without bound
  line_side: pre_fix
- file: node/bft/src/helpers/cache.rs
  line: 119
  summary: Cache structure for validator requests lacks any eviction or cleanup mechanism
    — entries are inserted but never removed
  line_side: pre_fix
- file: node/bft/src/helpers/cache.rs
  line: 298
  summary: No method exists to remove or clear entries for a specific peer from the
    validator requests cache
  line_side: pre_fix
