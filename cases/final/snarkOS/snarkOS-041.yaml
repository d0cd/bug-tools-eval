description: The prover node was using `propagate_to_validators` instead of `propagate`
  when broadcasting `UnconfirmedSolution` messages. This restricted solution propagation
  to only validator peers, preventing solutions from reaching the full network. The
  fix reverts to `propagate` which broadcasts to all connected peers, restoring correct
  network-wide solution dissemination.
