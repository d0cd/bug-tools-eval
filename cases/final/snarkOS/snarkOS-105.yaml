description: After removing `std::env::set_var` usage for Rust 2024 compatibility,
  log filter strings were still prefixed with `RUST_LOG=`, causing filters to be parsed
  incorrectly and suppressing all log output. Additionally, a missing `!` (negation
  operator) caused the sync mode to be reported incorrectly to users.
expected_findings:
- file: cli/src/helpers/logger.rs
  line: 33
  summary: Log filter string is prefixed with `RUST_LOG=` but the new filter setup
    (without env vars) expects a bare filter directive. The `RUST_LOG=` prefix causes
    the entire filter to be misinterpreted, silencing logs.
  line_side: pre_fix
- file: node/src/client/mod.rs
  line: 198
  summary: Missing negation `!` in condition causes sync mode to be reported as the
    opposite of its actual state (e.g., reporting syncing when not syncing, or vice
    versa).
  line_side: pre_fix
