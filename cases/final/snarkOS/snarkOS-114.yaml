description: Router initialization (TCP bind) occurs before unspent records are computed
  and before enable_handshake is called, causing the node to accept inbound connections
  prematurely. This leads to 'permission denied' errors because peers connect before
  the node is ready to perform handshakes. The fix reorders router initialization
  to occur after unspent record computation, right before enable_handshake is invoked.
