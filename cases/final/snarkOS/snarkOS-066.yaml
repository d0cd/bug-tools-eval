description: When calculating the stake of certificate authors, the code retrieved
  the lookback committee for the round before the certificate round instead of the
  certificate round itself. Although currently the two happen to be equal, this is
  semantically incorrect and could lead to wrong stake calculations if the lookback
  logic changes. The fix corrects the round parameter in committee lookback retrievals
  in both bft.rs and sync/mod.rs.
expected_findings:
- file: node/bft/src/bft.rs
  line: 514
  summary: 'Off-by-one: committee lookback is retrieved for the wrong round (round
    before the certificate round instead of the certificate round itself)'
  line_side: pre_fix
- file: node/bft/src/bft.rs
  line: 528
  summary: 'Off-by-one: second committee lookback retrieval also uses the wrong round;
    should use the certificate''s round'
  line_side: pre_fix
- file: node/bft/src/sync/mod.rs
  line: 509
  summary: 'Off-by-one: committee lookback in sync module uses the wrong round for
    certificate stake calculation'
  line_side: pre_fix
