description: Block deserialization of large blocks was performed synchronously on
  async task threads, blocking the tokio runtime and causing stalls or timeouts in
  the BFT gateway. The fix offloads expensive deserialization work to the rayon thread
  pool so that async tasks remain responsive.
expected_findings:
- file: node/bft/src/gateway.rs
  line: 657
  summary: Blocking deserialization of a large block on an async task thread; should
    be offloaded to a rayon/spawn_blocking thread to avoid stalling the async runtime
  line_side: pre_fix
- file: node/bft/src/gateway.rs
  line: 1002
  summary: Synchronous block deserialization on async context; expensive CPU-bound
    work should be moved to a dedicated thread pool
  line_side: pre_fix
- file: node/bft/src/gateway.rs
  line: 1118
  summary: Inline deserialization of block data blocking the async executor; should
    use rayon::spawn or tokio::spawn_blocking
  line_side: pre_fix
