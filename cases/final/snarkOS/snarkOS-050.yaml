  summary: Peer status promoted from 'connecting' to 'connected' during handshake
    before the lower-level TCP connection is fully established; should only promote
    via OnConnect callback
  line_side: pre_fix
- file: node/src/validator/router.rs
  line: 64
  summary: 'Same premature peer promotion pattern: status changed to ''connected''
    before lower-level connection setup completes'
  line_side: pre_fix
- file: node/src/prover/router.rs
  line: 61
  summary: 'Same premature peer promotion pattern: status changed to ''connected''
    before lower-level connection setup completes'
  line_side: pre_fix
- file: node/router/src/handshake.rs
  line: 108
  summary: 'Race condition: peer is promoted from ''connecting'' to ''connected''
    during handshake before the lower-level TCP layer has finalized the connection.
    Promotion should be deferred to the OnConnect callback to ensure the transport
    layer is fully ready.'
  line_side: pre_fix
- file: node/router/src/lib.rs
  line: 87
  summary: The connecting_peers collection only stores addresses, not full Peer objects.
    This prevents the OnConnect callback from having the Peer data needed to complete
    the promotion, forcing premature promotion during handshake instead.
  line_side: pre_fix
