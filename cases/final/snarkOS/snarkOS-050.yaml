description: The peer's status was promoted from 'connecting' to 'connected' during
  the handshake in the router layer before the lower-level TCP layer had finished
  its connection setup. This race condition could cause the higher-level layer to
  treat a peer as fully connected while the underlying transport was still being established,
  leading to message delivery failures or inconsistent peer state. The fix delays
  the promotion to occur only via the OnConnect callback, which fires after the lower-level
  layer has completed its work.
