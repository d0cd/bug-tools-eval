description: Tests for BlockResponse only handled one message version format, naively
  asserting equality of `latest_consensus_version` without accounting for the V12
  protocol change. Pre-V12 consensus versions are not serialized in the BlockResponse
  wire format, so deserialized values will be None for those versions. The fix branches
  on protocol version to verify correct behavior for each format.
expected_findings:
- file: node/bft/events/src/block_response.rs
  line: 216
  summary: 'Test blindly asserts `block_response.latest_consensus_version == decoded.latest_consensus_version`
    without accounting for the V12 boundary: pre-V12 consensus versions are not serialized
    in the BlockResponse format, so decoded will have None while the original may
    have Some(v < V12). Should branch on version to check expected deserialized value.'
  line_side: pre_fix
