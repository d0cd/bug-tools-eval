  summary: Trait method signature uses Block instead of PendingBlock, bypassing the
    pending-block validation pipeline that ensures blocks are properly verified before
    commitment
  line_side: pre_fix
- file: node/bft/src/sync/mod.rs
  line: 31
  summary: Import uses Block where PendingBlock should be used; sync module must operate
    on pending blocks to correctly handle blocks that are not yet finalized in the
    BFT pipeline
  line_side: pre_fix
- file: node/consensus/src/lib.rs
  line: 355
  summary: Consensus block advancement uses Block directly instead of PendingBlock
    API, skipping the pending-block lifecycle that guards against premature block
    commitment
  line_side: pre_fix
- file: node/bft/ledger-service/src/ledger.rs
  line: 338
  summary: Ledger service implementation constructs/returns `Block` where `PendingBlock`
    should be used, causing the BFT layer to miss pending block state during commit
    rounds.
  line_side: pre_fix
