description: Two concurrent bilateral handshake attempts with the same peer could
  cause a race condition where a later duplicate handshake invalidated a former successful
  one, downgrading the peer from its established status (e.g. TrustedPeer) to CandidatePeer.
  Additionally, the gateway made redundant duplicate outbound connection attempts
  to trusted validators, increasing the likelihood of triggering the race.
expected_findings:
- file: node/router/src/handshake.rs
  line: 93
  summary: Handshake returns error on duplicate connection attempt instead of treating
    it as a benign no-op; this causes the caller to downgrade an already-connected
    peer back to CandidatePeer status during concurrent bilateral handshakes
  line_side: pre_fix
- file: node/bft/src/gateway.rs
  line: 421
  summary: Outbound connection attempts to trusted validators are not deduplicated;
    multiple concurrent connect calls to the same validator increase the chance of
    duplicate handshake races that trigger peer downgrade
  line_side: pre_fix
- file: node/router/src/helpers/peer.rs
  line: 29
  summary: Peer state machine allows transition from a connected/trusted state back
    to CandidatePeer when a duplicate connection is treated as an error, rather than
    preserving the existing higher-trust status
  line_side: pre_fix
