description: The BFT round advancement functions (`is_even_round_ready_for_next_round`
  and `is_leader_quorum_or_nonleaders_available`) were missing quorum threshold (2f+1)
  checks before allowing round progression. In odd rounds, if the previous even-round
  leader was unseen, the code returned true immediately without verifying quorum,
  allowing a malicious node to send a batch header beyond the GC limit and force premature
  round advancement. The fix adds mandatory quorum checks at the top of both functions
  before any other conditions are evaluated.
expected_findings:
- file: node/bft/src/bft.rs
  line: 370
  summary: 'Missing quorum threshold check: `is_leader_quorum_or_nonleaders_available`
    returns true when leader certificate is None without first verifying that 2f+1
    certificates exist for the current round, allowing premature odd-round advancement
    exploitable by a malicious node.'
  line_side: pre_fix
- file: node/bft/src/bft.rs
  line: 339
  summary: 'Missing quorum threshold check: `is_even_round_ready_for_next_round` returns
    true when the leader certificate matches the current round without verifying quorum
    (2f+1 certificates), allowing even-round advancement without sufficient validator
    participation.'
  line_side: pre_fix
- file: node/bft/src/bft.rs
  line: 347
  summary: 'Quorum check only on timer-expiry path: the function checks `is_quorum_threshold_reached`
    only when the timer has expired, but the leader-certificate-present path at line
    339 bypasses this check entirely.'
  line_side: pre_fix
