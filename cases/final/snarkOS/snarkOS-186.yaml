  line: 370
  summary: peer_address uses channel.address directly instead of constructing from
    channel IP + version message sender port, causing address mismatch with the handshake-registered
    address
  line_side: pre_fix
- file: network/src/context/handshakes.rs
  line: 75
  summary: receive_any() discards the Version message after handshake, preventing
    the caller from using peer chain height to initiate sync node selection
  line_side: pre_fix
- file: network/src/context/handshakes.rs
  line: 107
  summary: Verack branch constructs peer_address from ip()+port() separately instead
    of using peer_message.address_sender directly, inconsistent with intended address
    semantics
  line_side: pre_fix
