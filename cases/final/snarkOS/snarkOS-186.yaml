description: The peer address was incorrectly derived from channel.address instead
  of combining the channel IP with the version message's declared sender port. This
  caused address mismatches during handshakes (breaking bootnode connections) and
  prevented sync node selection on initial handshake since the version message was
  discarded rather than propagated.
