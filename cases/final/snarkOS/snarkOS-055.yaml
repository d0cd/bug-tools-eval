description: In the BFT consensus logic, `send_primary_round_to_bft` incorrectly returned
  `true` when storage failed to increment to the next round. This caused the primary
  to start proposing batches even after a storage failure, preventing a synced validator
  from participating in consensus. The fix changes the failure path to return `false`.
