description: The Resolver struct used two independent RwLocks for its bidirectional
  address maps (from_listener, to_listener), allowing the maps to become inconsistent
  under concurrent access—e.g., insert_peer could write to one map but not the other
  before a concurrent read. Additionally, remove_connected_peer removed the resolver
  entry before removing from connected_peers, creating a window where resolution would
  fail for a still-connected peer, triggering spurious disconnect cascades. The fix
  consolidates to a single outer RwLock<Resolver> and reorders cleanup operations.
expected_findings:
- file: node/router/src/helpers/resolver.rs
  line: 19
  summary: 'Dual-RwLock concurrency bug: from_listener and to_listener each have their
    own RwLock, so insert_peer and remove_peer acquire/release locks independently
    on each map. Concurrent operations can observe an inconsistent state where one
    map is updated but the other is not, leading to failed address resolution.'
  line_side: pre_fix
- file: node/router/src/lib.rs
  line: 612
  summary: 'Incorrect cleanup ordering in remove_connected_peer: resolver entry is
    removed first (line 617), then connected_peers (line 619). Between these two operations,
    resolve_to_listener returns None for a peer still in connected_peers, triggering
    spurious ''Unable to resolve'' errors and redundant disconnect attempts.'
  line_side: pre_fix
- file: node/router/src/inbound.rs
  line: 78
  summary: Unresolvable peer addresses in the inbound path bail with an error, triggering
    a disconnect flow. Post-disconnect straggler messages are guaranteed to fail resolution
    here, causing redundant disconnect attempts and noisy warnings. Should be handled
    gracefully as a non-error.
  line_side: pre_fix
