description: The `dev execute` command assumed a V2 API endpoint, causing failures
  when used against a V1 API. V1 returns errors as plain strings (not JSON) and responds
  with HTTP 500 (not 404) for missing transactions, breaking both error parsing and
  the `--wait` polling loop. The fix adds version detection via `parse_custom_endpoint`
  and branches the error-handling and status-code logic accordingly.
