description: TransmissionID lacked a checksum field, allowing malicious validators
  to submit malformed solutions or transactions that would be accepted by peers without
  integrity verification. The fix adds a TransmissionChecksum to TransmissionID variants
  and enforces checksum validation on all incoming peer transmissions across the BFT
  consensus layer.
expected_findings:
- file: node/bft/src/worker.rs
  line: 273
  summary: Incoming peer transmissions are accepted without any integrity checksum
    verification on the TransmissionID, enabling malformed solution/transaction attacks
    by malicious validators
  line_side: pre_fix
- file: node/bft/src/primary.rs
  line: 522
  summary: TransmissionID::Solution is destructured and processed without verifying
    a checksum, allowing a malicious peer to associate an incorrect solution with
    a valid solution_id
  line_side: pre_fix
- file: node/consensus/src/lib.rs
  line: 248
  summary: Transmissions are mapped by ID during block creation without checksum validation,
    so a tampered transmission could be included in a block
  line_side: pre_fix
- file: node/bft/src/helpers/ready.rs
  line: 82
  summary: TransmissionID::Solution match discards the checksum field with wildcard
    (_), missing an opportunity to verify transmission integrity before queuing
  line_side: pre_fix
