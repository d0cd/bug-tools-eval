description: The miner's failure counter was incremented for all mining errors, including
  expected terminations caused by receiving a canon block. After 10 such terminations
  (which happen regularly during normal operation), the miner would permanently stop.
  The fix distinguishes between actual failures and expected miner termination by
  checking the error type (ConsensusError::PoswError(PoswError::SnarkError(SNARKError::Terminated))),
  only counting genuine failures toward the limit.
