description: In the wrapped MPSC sender's `try_send` method, the metric tracking sent
  messages was incremented before calling `self.inner.try_send()`. If `try_send` failed
  (e.g., channel full), the metric was still incremented, producing inaccurate counts
  of queued messages. The fix reorders the operations so the metric is only incremented
  after `try_send` succeeds.
expected_findings:
- file: metrics/src/wrapped_mpsc.rs
  line: 62
  summary: "Metric `self.increment()` is called before `self.inner.try_send(message)`\
    \ returns \u2014 if try_send fails, the metric still gets incremented, producing\
    \ inaccurate message-queued counts. The increment should happen only after confirming\
    \ try_send succeeded."
  line_side: pre_fix
- file: metrics/src/wrapped_mpsc.rs
  line: 65
  summary: "Metric `self.increment()` is called unconditionally before `self.inner.try_send(message)`\
    \ \u2014 if try_send fails (e.g. channel full), the metric is still incremented,\
    \ producing inaccurate message-queued counts. The increment should only happen\
    \ after confirming try_send succeeded."
  line_side: pre_fix
