description: The downgrade_peer_to_candidate function was being called unconditionally
  during handshake abort, even for peers that are not in the ConnectingPeer state.
  This could incorrectly downgrade already-connected peers to candidate status when
  a duplicate address is detected during handshake, disrupting existing valid connections.
  The fix adds a guard so that only ConnectingPeer instances are downgraded.
expected_findings:
- file: node/router/src/handshake.rs
  line: 147
  summary: downgrade_peer_to_candidate is called unconditionally on handshake failure;
    should guard to only downgrade if the peer is a ConnectingPeer, otherwise connected
    peers get incorrectly demoted
  line_side: pre_fix
- file: node/bft/src/gateway.rs
  line: 1275
  summary: Missing ConnectingPeer guard before calling downgrade_peer_to_candidate;
    non-ConnectingPeer peers (e.g. already connected) will be incorrectly downgraded
    on handshake abort
  line_side: pre_fix
- file: node/src/bootstrap_client/handshake.rs
  line: 139
  summary: Same missing ConnectingPeer guard before downgrade_peer_to_candidate in
    bootstrap client handshake path
  line_side: pre_fix
