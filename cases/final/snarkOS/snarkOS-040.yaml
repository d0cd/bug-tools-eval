description: The heartbeat logic lacks awareness of pending connections, causing Router::connect
  to be called multiple times for the same peer during handshake. This generates frequent
  WARN-level log messages for conditions that are not errors (already connected or
  currently connecting). The fix downgrades these warnings to debug-level messages,
  reducing log noise without changing connection behavior.
expected_findings:
- file: node/router/src/lib.rs
  line: 166
  summary: 'Logging at WARN level for a non-error condition: attempting to connect
    to a peer that is already shaking hands as the initiator should be debug, not
    warn'
  line_side: pre_fix
- file: node/router/src/lib.rs
  line: 199
  summary: WARN log for connecting to an already-connected peer is misleading; this
    is expected behavior when heartbeat re-triggers connect before handshake completes
  line_side: pre_fix
- file: node/router/src/lib.rs
  line: 216
  summary: WARN log for duplicate connection attempt should be downgraded to debug
    since heartbeat has no pending-connection state and repeated calls are normal
  line_side: pre_fix
