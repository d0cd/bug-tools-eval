description: 'PR #1652 changed the signature of `Resources::register_task` to require
  an additional `Option<ResourceId>` first argument, but missed updating the call
  site inside `initialize_metrics()` which is gated behind `#[cfg(feature = "prometheus")]`.
  This caused a compilation failure when building with `--features prometheus`. The
  fix adds the missing `None` argument.'
