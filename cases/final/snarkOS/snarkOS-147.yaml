description: The BFT primary's signed_proposals cache only checked for same-round
  duplicate batch IDs but never verified that an incoming proposal's round was not
  behind the already-signed round. A malicious validator could exploit this gap by
  sending proposals for previous rounds, bypassing the cache and tricking peers into
  double-signing, which could lead to a DAG safety violation. The fix adds a round
  comparison check that disconnects peers requesting signatures on proposals behind
  the signed_round.
expected_findings:
- file: node/bft/src/primary.rs
  line: 540
  summary: 'Missing round validation: after retrieving (signed_round, signed_batch_id,
    signature) from the signed_proposals cache, the code only checks `signed_round
    == batch_header.round()` for duplicate batch IDs but never rejects proposals where
    `signed_round > batch_header.round()`, allowing a malicious validator to submit
    a batch for a previous round and induce double-signing'
  line_side: pre_fix
- file: node/bft/src/primary.rs
  line: 538
  summary: 'Missing round ordering check: after retrieving (signed_round, signed_batch_id,
    signature) from the signed_proposals cache, there is no guard rejecting batch_header.round()
    < signed_round. A malicious peer can submit a proposal for a prior round to bypass
    the duplicate-signature check and induce double-signing.'
  line_side: pre_fix
