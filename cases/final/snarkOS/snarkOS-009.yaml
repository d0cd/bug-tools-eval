description: The router's send path did not proactively disconnect peers that were
  no longer active, leading to erroneous send attempts to dead connections. The fix
  adds proactive disconnection checks in the outbound send path and removes redundant
  disconnect calls scattered across heartbeat and individual node router implementations,
  consolidating the disconnection logic.
expected_findings:
- file: node/router/src/outbound.rs
  line: 52
  summary: 'Missing liveness check before sending: the outbound send path resolves
    a peer address and attempts to send without first verifying the peer is still
    connected, leading to wasted sends to dead peers'
  line_side: pre_fix
- file: node/router/src/lib.rs
  line: 126
  summary: The connect/disconnect API does not enforce cleanup of stale peer state,
    allowing the router to retain references to peers that are no longer reachable
  line_side: pre_fix
- file: node/router/src/heartbeat.rs
  line: 65
  summary: Redundant disconnect call during heartbeat peer eviction — disconnection
    should be handled centrally in the send path rather than duplicated across heartbeat,
    beacon, client, prover, and validator routers
  line_side: pre_fix
