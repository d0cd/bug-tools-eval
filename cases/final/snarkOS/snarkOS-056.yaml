description: The longest_child_path implementation used an application-level HashMap
  cache (block_children_cache) that required repeated round-trips to the database
  for each tree level, leading to poor performance. The fix replaces it with a single
  recursive SQL CTE query and also corrects an off-by-one error in the canon hash
  fetch (OLDEST_FORK_THRESHOLD + 1 should be just OLDEST_FORK_THRESHOLD).
