  allowing the devnet to run in a degraded state without notice. Additionally, the
  client peering topology was under-connected (clients connected to fewer validators
  than needed), and multiple CI shell scripts had shellcheck warnings indicating potential
  bugs such as unquoted variables and missing source directives.
