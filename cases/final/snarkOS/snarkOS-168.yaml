description: The handshake protocol signs only the challenge nonce in the ChallengeResponse,
  allowing an attacker to craft a preimage matching the nonce range, trick a peer
  into signing it during a handshake, and replay that signature as an authenticity
  proof in non-handshake contexts. The fix adds a randomly generated response_nonce
  to ChallengeResponse that is co-signed with the original nonce, binding the signature
  to a specific handshake session and preventing cross-context replay.
expected_findings:
- file: node/router/src/handshake.rs
  line: 164
  summary: 'Signature forgery: ChallengeResponse signs only the request nonce without
    a response_nonce, allowing an attacker to brute-force a matching preimage and
    replay the signed nonce in non-handshake contexts'
  line_side: pre_fix
- file: node/bft/src/gateway.rs
  line: 1176
  summary: 'Same signature forgery vulnerability in BFT gateway handshake: response_nonce
    is generated but not included in the signed payload, enabling cross-context signature
    replay'
  line_side: pre_fix
- file: node/router/messages/src/challenge_response.rs
  line: 25
  summary: ChallengeResponse message struct lacks a response_nonce field, so the signed
    data does not include session-binding material to prevent replay attacks
  line_side: pre_fix
