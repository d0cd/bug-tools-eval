description: The cache `refresh` call was ordered before the `fetch`, creating an
  edge case where the refresh could clear the last-seen timestamp before the fetch
  reads it. The fix reorders the operations so that `refresh` runs after `fetch`,
  preserving the timestamp for the fetch to use.
