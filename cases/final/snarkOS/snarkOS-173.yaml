description: The `get_public_balance` function in `mod.rs` deserializes the REST API
  response directly as a string without handling the `null` case. When querying a
  non-existent account, the node returns `null`, causing a confusing JSON parse error
  instead of a clear 'account not found' message. The fix adds a null check before
  parsing the balance response.
expected_findings:
- file: cli/src/commands/developer/mod.rs
  line: 361
  summary: 'get_public_balance does not handle null API response: when the account
    does not exist the endpoint returns null, which fails JSON deserialization as
    a string. Should check for null and return a clear error or zero balance.'
