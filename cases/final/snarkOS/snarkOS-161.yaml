description: Block synchronization stalled when processing large blocks because block
  handling was performed synchronously on the router's main task, blocking progress.
  The fix adds the rayon dependency and offloads heavy block processing to a parallel
  thread pool, preventing the sync pipeline from being blocked by large blocks.
