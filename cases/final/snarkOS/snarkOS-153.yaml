description: The Scan CLI command used a hardcoded testnet3 CDN endpoint regardless
  of which network (mainnet, testnet, canary) was being scanned, causing incorrect
  block fetching on non-testnet3 networks. Additionally, the CDN HTTP client used
  native_tls which does not support the TLS configuration required by the new blocks.aleo.org
  endpoint, so all CDN block syncing would fail.
expected_findings:
- file: cli/src/commands/developer/scan.rs
  line: 34
  summary: Hardcoded CDN_ENDPOINT points to testnet3 S3 bucket regardless of which
    network is being scanned; should be network-aware (mainnet/testnet/canary) using
    the shared CDN_BASE_URL
  line_side: pre_fix
- file: node/cdn/src/blocks.rs
  line: 107
  summary: Client::builder().build() uses default native_tls which is incompatible
    with the blocks.aleo.org endpoint; should use .use_rustls_tls() to support the
    required TLS configuration
  line_side: pre_fix
- file: node/cdn/Cargo.toml
  line: 42
  summary: reqwest dependency missing 'rustls-tls' feature flag needed to enable rustls
    TLS backend for CDN requests
  line_side: pre_fix
