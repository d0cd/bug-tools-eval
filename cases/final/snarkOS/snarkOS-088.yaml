description: Several comments across peering-related files were inaccurate or misleading.
  gateway.rs had a vestigial reference to 'router' instead of 'gateway', handshake.rs
  had a comment with incorrect logic describing the peer trust check, and start.rs
  lacked clarity that Client and Prover nodes ignore the allow_external_peers flag.
expected_findings:
- file: node/router/src/handshake.rs
  line: 318
  summary: Comment states 'Ensure either the peer is trusted or allow_external_peers
    is true' but the actual logic checks the negation — the comment should reflect
    that untrusted peers are rejected when allow_external_peers is false.
  line_side: pre_fix
- file: node/bft/src/gateway.rs
  line: 904
  summary: Comment references 'router' but this code is in the gateway module; should
    say 'gateway' instead.
  line_side: pre_fix
- file: cli/src/commands/start.rs
  line: 110
  summary: Comment only mentions validators but omits that Client and Prover nodes
    ignore the allow_external_peers flag and always allow untrusted peers.
  line_side: pre_fix
