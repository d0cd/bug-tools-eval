description: Block requests on the gateway were not being cached or rate-limited,
  unlike other request types (e.g. validator requests). This allowed peers to send
  unlimited block requests without throttling, and made it impossible to match inbound
  block responses to prior outbound requests. The fix adds caching for both inbound
  and outbound block requests, mirroring the existing pattern for validator requests.
expected_findings:
- file: node/bft/src/gateway.rs
  line: 546
  summary: Block request handling path lacks cache insertion and rate-limit check;
    other request types (e.g. validator requests) are cached and rate-limited here
    but block requests are processed without any throttling
  line_side: pre_fix
- file: node/bft/src/gateway.rs
  line: 988
  summary: Outbound block requests are not recorded in a cache, so inbound block responses
    cannot be validated against a prior outbound request — allows unsolicited response
    injection
  line_side: pre_fix
- file: node/bft/src/helpers/cache.rs
  line: 33
  summary: Cache struct is missing a collection for block requests; validator requests
    have dedicated cache entries but block requests have none, creating an inconsistency
    in rate-limiting coverage
  line_side: pre_fix
