description: The PR switches the default storage backend from RocksDB to SQLite, removing
  the feature-gated `sqlite` option and making SQLite unconditional. However, the
  RocksDB code is left as a commented-out block rather than deleted, and the validator
  guard now permanently blocks `--validate-storage` since SQLite is the only backend
  and the validator was never implemented for it.
expected_findings:
- file: errors/Cargo.toml
  line: 16
  summary: rocksdb and curl are unconditional required dependencies but should be
    optional — they contain native C bindings that block compilation on restricted
    targets
  line_side: pre_fix
- file: algorithms/src/crh/pedersen.rs
  line: 9
  summary: Unconditional `use rayon::prelude::*` import forces rayon as a hard dependency;
    should be gated behind a feature flag for environments where parallel execution
    is not available
  line_side: pre_fix
- file: parameters/src/inner_snark_pk/inner_snark_pk.rs
  line: 5
  summary: Unconditional `use curl::easy::Easy` and direct curl usage in load_remote()
    makes curl a hard dependency; should be feature-gated behind a `remote` flag
  line_side: pre_fix
- file: snarkos/main.rs
  line: 130
  summary: 'Commented-out dead code: the entire RocksDB storage path is wrapped in
    `/* ... */` instead of being removed. Dead code should be deleted, not commented
    out — version control preserves history.'
  line_side: pre_fix
- file: snarkos/main.rs
  line: 123
  summary: 'Permanent feature breakage: `validate-storage` now always hits the `error!("validator
    not implemented for sqlite")` early return because SQLite is the only backend.
    This config flag is effectively dead and should be removed or the validator should
    be implemented.'
  line_side: pre_fix
- file: storage/src/storage/sync.rs
  line: 150
  summary: 'Debug log regression: changed from `longest_path.last()` (shows the actual
    terminal block hash) to `longest_path.len()` (shows only count), losing useful
    diagnostic information for fork debugging.'
  line_side: pre_fix
