description: 'The `snarkos developer scan` command failed on devnets due to three
  issues: (1) endpoint URLs were constructed with inline `format!()` instead of `Developer::build_endpoint()`,
  producing incorrect URLs for non-mainnet networks; (2) the CDN scan range calculation
  used `start_height % MAX_BLOCK_RANGE` instead of `end_height % MAX_BLOCK_RANGE`,
  causing incorrect block range boundaries; (3) the genesis block comparison assumed
  mainnet, preventing devnet detection.'
expected_findings:
- file: cli/src/commands/developer/scan.rs
  line: 70
  summary: Endpoint URL constructed with inline format!("{endpoint}{}/...", N::SHORT_NAME)
    instead of Developer::build_endpoint::<N>(), producing malformed URLs on devnets
    where the endpoint base differs from mainnet conventions
  line_side: pre_fix
- file: cli/src/commands/developer/scan.rs
  line: 109
  summary: 'CDN scan range calculation uses wrong variable: `end_height.saturating_sub(start_height
    % MAX_BLOCK_RANGE)` should be `end_height.saturating_sub(end_height % MAX_BLOCK_RANGE).saturating_add(MAX_BLOCK_RANGE)`
    — current logic computes an incorrect scan window boundary'
  line_side: pre_fix
- file: cli/src/commands/developer/scan.rs
  line: 14
  summary: Genesis block comparison via Block::from_bytes_le(N::genesis_bytes()) does
    not account for devnet/test networks — always compares against production genesis,
    so is_development_network is never set correctly on devnets
  line_side: pre_fix
