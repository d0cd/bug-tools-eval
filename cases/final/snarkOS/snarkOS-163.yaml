description: SchnorrParametersGadget was allocated as a witness (via AllocGadget)
  instead of being embedded as a constant in the circuit. This allows a malicious
  prover to substitute arbitrary Schnorr parameters, breaking signature verification
  soundness. Additionally, the precomputed scalar multiplication used Rust's default
  zip behavior which silently truncates to the shorter iterator when scalar bits and
  generator powers don't match, potentially producing incorrect results.
expected_findings:
- file: models/src/gadgets/algorithms/signature.rs
  line: 9
  summary: ParametersGadget is constrained as AllocGadget (witness) instead of a constant.
    A malicious prover can supply arbitrary Schnorr parameters, breaking signature
    verification soundness in the circuit.
  line_side: pre_fix
- file: models/src/gadgets/curves/group.rs
  line: 167
  summary: precomputed_base_scalar_mul uses itertools zip (or std zip) which silently
    truncates to the shorter of scalar_bits and generator powers. If lengths mismatch
    the multiplication is incomplete, producing wrong results without any error.
  line_side: pre_fix
- file: gadgets/src/algorithms/signature/schnorr.rs
  line: 47
  summary: Schnorr parameter gadget implements AllocGadget, allocating parameters
    as witnesses rather than circuit constants. Parameters should be hardcoded constants
    to prevent prover manipulation.
  line_side: pre_fix
