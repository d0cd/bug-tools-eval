description: 'Bootnode addresses in the snarkOS config struct were serializable and
  deserializable, allowing users (or attackers with config file access) to override
  hardcoded bootnodes via the config file. This could enable eclipse attacks by pointing
  a node to malicious bootnodes. The fix adds #[serde(skip_serializing, skip_deserializing)]
  to the bootnode fields so they are no longer read from or written to the config
  file.'
