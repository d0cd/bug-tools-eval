description: Cache request counters used a type smaller than u32 (likely u8 or u16),
  risking integer overflow when tracking outbound validator and puzzle requests per
  socket address. A Trail of Bits audit (TOB-27) identified that the counter could
  wrap around, potentially allowing rate-limit bypasses or incorrect cache behavior.
  The fix switches all affected counters to u32.
expected_findings:
- file: node/bft/src/helpers/cache.rs
  line: 39
  summary: Cache counter type for seen_outbound_validators_requests is too small and
    may overflow under sustained request load; should use u32 to prevent wraparound.
  line_side: pre_fix
- file: node/router/src/helpers/cache.rs
  line: 48
  summary: Cache counter type for seen_outbound_puzzle_requests is too small and may
    overflow; should use u32 to match the BFT cache and prevent integer wraparound.
  line_side: pre_fix
