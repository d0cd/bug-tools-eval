description: The sync mechanism would fast-forward corrupt or invalid blocks without
  proper validation, allowing bad blocks to be incorporated into the canonical chain.
  The fix adds validation checks in the sync/master path to reject invalid blocks
  before they are committed. This was bundled as a drive-by fix inside a large storage
  migration PR (RocksDB to SQLite).
