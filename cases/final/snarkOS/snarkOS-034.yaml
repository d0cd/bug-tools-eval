description: The CDN height calculation rounded the tip down to the nearest multiple
  of BLOCKS_PER_FILE instead of up to the next multiple. This caused blocks to be
  fetched from the wrong CDN file offset during sync. The fix adds BLOCKS_PER_FILE
  after the floor-rounding to snap to the next valid boundary.
