description: The REST endpoint for fetching a program by edition used `get_program_for_edition`
  which panicked or returned an internal server error when the program/edition didn't
  exist, instead of returning a proper 404. For credits.aleo, the latest edition was
  also not returning 0 correctly. The fix switches to `try_get_program_for_edition`
  which returns Option, allowing proper 404 responses for missing programs/editions.
expected_findings:
- file: node/rest/src/routes.rs
  line: 357
  summary: Using `get_program_for_edition` which fails with an opaque error instead
    of returning 404 when the program/edition doesn't exist. Should use `try_get_program_for_edition`
    and map None to a 404 RestError.
  line_side: pre_fix
- file: node/rest/src/helpers/error.rs
  line: 111
  summary: REST error log uses `{json_body:?}` (Debug format) which wraps the string
    in extra quotes, making logs harder to read. Should use `{json_body}` (Display
    format).
  line_side: pre_fix
