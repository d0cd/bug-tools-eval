description: The proposal cache storage path was hardcoded to the default Aleo ledger
  directory, ignoring the `--storage` CLI option. The fix threads the `StorageMode`
  parameter through the BFT, Primary, and consensus initialization paths so that `proposal_cache_path`
  respects the user-configured storage location. The `clean` command was also updated
  to remove the proposal cache from the correct directory.
expected_findings:
- file: node/bft/src/helpers/proposal_cache.rs
  line: 26
  summary: proposal_cache_path computes its path using the default ledger directory
    instead of accepting and using the configured StorageMode, causing the proposal
    cache to always be written to the default location regardless of the --storage
    CLI flag.
  line_side: pre_fix
- file: node/bft/src/primary.rs
  line: 123
  summary: Primary initialization does not pass the StorageMode to the proposal cache,
    so the cache path is always the hardcoded default rather than the user-configured
    storage directory.
  line_side: pre_fix
- file: cli/src/commands/clean.rs
  line: 38
  summary: The clean command does not account for the configured storage mode when
    removing the proposal cache, potentially leaving stale cache files in custom storage
    paths.
  line_side: pre_fix
