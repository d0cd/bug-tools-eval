description: 'Multiple safety improvements to the BFT consensus layer: PrimaryPing
  serialization is updated to change how batch certificates are transmitted, event
  handlers are wrapped in spawned tasks to prevent blocking the main select loop,
  sync frequency is reduced to avoid overloading peers, and signature processing gains
  improved async concurrency. These changes address potential liveness issues under
  adversarial or high-load conditions.'
expected_findings:
- file: node/bft/src/primary.rs
  line: 87
  summary: Event handlers executed inline in the select loop can block progress of
    other arms; long-running handlers (e.g., signature verification) should be spawned
    as separate tasks to avoid stalling the BFT pipeline.
  line_side: pre_fix
- file: node/bft/src/sync/mod.rs
  line: 80
  summary: Sync interval tied to MAX_BATCH_DELAY_IN_MS may be too aggressive under
    load, causing excessive sync requests that amplify network pressure during consensus
    catch-up.
  line_side: pre_fix
- file: node/bft/events/src/primary_ping.rs
  line: 19
  summary: PrimaryPing serialization uses IndexMap<Field<N>, Data<BatchCertificate<N>>>
    which is a breaking wire-format change; peers running mixed versions will fail
    to deserialize PrimaryPing messages.
  line_side: pre_fix
- file: node/sync/src/block_sync.rs
  line: 209
  summary: try_block_sync frequency reduction — verify the new interval is sufficient
    to maintain sync progress under normal network conditions and does not cause nodes
    to fall behind
  line_side: pre_fix
