description: The Bowe-Hopwood Pedersen CRH implementation used Rayon's parallel `.reduce()`
  directly, which is unavailable on WASM targets and blocks WASM builds. The fix introduces
  a `cfg_reduce!` macro that conditionally dispatches to parallel `.reduce()` (when
  `pedersen-parallel` feature is enabled) or sequential `.fold()` (otherwise), restoring
  WASM compatibility.
