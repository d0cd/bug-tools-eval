description: When importing a circuit with an alias (e.g., `import foo.Bar as Baz`),
  the symbol table registered the circuit under its original name rather than the
  alias. This caused an undefined type error when the alias was referenced in code.
  The fix updates the symbol table and import parser to correctly key imported symbols
  by their alias name when one is provided.
expected_findings:
- file: symbol-table/src/symbol_table.rs
  line: 149
  summary: 'Import alias not respected: circuits are inserted into the symbol table
    keyed by the original name, not the alias. When a user writes `import foo.Bar
    as Baz`, looking up `Baz` fails because only `Bar` is registered.'
  line_side: pre_fix
- file: imports/src/parser/import_parser.rs
  line: 37
  summary: insert_import does not propagate the alias name through to the symbol table,
    causing aliased imports to be registered under their original identifier.
  line_side: pre_fix
- file: symbol-table/src/errors/symbol_table.rs
  line: 92
  summary: Error message references `symbol.symbol` (original name) rather than the
    user-facing alias, producing confusing diagnostics for aliased imports.
  line_side: pre_fix
