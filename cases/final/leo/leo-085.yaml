description: When running `leo devnet` on a machine with an already-running tmux server,
  the new session inherits the server's environment variables rather than the current
  shell's. This causes CONSENSUS_VERSION_HEIGHTS to be set to a stale or incorrect
  value. The fix explicitly passes the environment variable to the new tmux session
  using the `-e` flag.
expected_findings:
- file: leo/cli/commands/devnet/mod.rs
  line: 347
  summary: tmux new-session command does not pass CONSENSUS_VERSION_HEIGHTS via `-e`
    flag, so an existing tmux server will use its own stale environment instead of
    the caller's current value
