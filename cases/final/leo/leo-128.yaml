description: The compound assignment canonicalization (e.g., `foo.bar += 1` → `foo.bar
  = foo.bar + 1`) incorrectly constructed the RHS expression using only the base identifier,
  discarding member/tuple accesses. This caused `foo.bar += 1` to be desugared as
  `foo.bar = foo + 1` instead of `foo.bar = foo.bar + 1`, producing incorrect results
  for any compound assignment on circuit members or tuple elements.
expected_findings:
- file: ast/src/reducer/canonicalization.rs
  line: 470
  summary: Compound assignment desugaring only uses the base identifier (`assignee.identifier.clone()`)
    for the RHS operand, ignoring any member/tuple accesses. Should reconstruct the
    full access expression (e.g., `foo.bar`) not just the identifier (`foo`).
  line_side: pre_fix
