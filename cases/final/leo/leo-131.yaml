description: The Leo compiler failed to propagate the `declared_circuit_reference`
  parameter into nested scopes (conditional blocks and iteration blocks) when evaluating
  statements inside circuit functions. This meant any access to `self` inside an `if`
  branch or `for` loop within a circuit method would fail, because the nested scope
  had no knowledge of the enclosing circuit context. The fix threads the `declared_circuit_reference`
  parameter through `resolve_block`, `resolve_conditional`, and `resolve_iteration`
  so that `self` is accessible in all nested statement contexts.
