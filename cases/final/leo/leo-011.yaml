description: HashMap usage throughout the compiler produces non-deterministic iteration
  order, meaning compiling the same Leo program multiple times can yield structurally
  different ASTs. While these ASTs should produce equivalent circuits, the non-determinism
  undermines reproducibility and makes debugging harder. The fix replaces HashMap/HashSet
  with IndexMap/IndexSet to guarantee insertion-order iteration.
expected_findings:
- file: ast/src/program.rs
  line: 20
  summary: HashMap used for program-level collections (imports, circuits, functions)
    in the AST — non-deterministic iteration order means the same source can produce
    different AST orderings across runs. Should use IndexMap for deterministic output.
  line_side: pre_fix
- file: symbol-table/src/symbol_table.rs
  line: 19
  summary: HashMap/HashSet used in the symbol table for names, circuits, and functions
    — non-deterministic ordering propagates through type checking and downstream passes.
    Should use IndexMap/IndexSet.
  line_side: pre_fix
- file: imports/src/parser/import_parser.rs
  line: 17
  summary: HashMap/HashSet in the import parser means import resolution order is non-deterministic,
    which can affect error reporting order and AST structure. Should use IndexMap/IndexSet.
  line_side: pre_fix
