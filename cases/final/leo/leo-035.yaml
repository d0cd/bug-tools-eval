description: The hex character literal parser incorrectly restricted valid hex escape
  values to ASCII range (<=127) instead of the full byte range (<=255), causing valid
  hex literals like '\x9A' to be rejected. Additionally, the lexer's unicode escape
  parsing had an incorrect boundary check when validating the closing '}' delimiter.
