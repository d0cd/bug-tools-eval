  line: 107
  summary: 'Incorrect upper bound: `if number <= 127` should be `<= 255` (0xFF) —
    hex escapes \xNN must accept the full single-byte range, not just ASCII'
  line_side: pre_fix
- file: parser/src/tokenizer/lexer.rs
  line: 113
  summary: Incorrect string slice boundary check for unicode escape closing delimiter
    — `string[string.len() - 1..]` may misidentify the closing '}' position when the
    escape sequence content varies in length
  line_side: pre_fix
