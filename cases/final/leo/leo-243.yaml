description: The `leo init` and `leo new` CLI commands did not create input files
  when scaffolding a new project, leaving users without the required inputs directory
  structure. The fix updates both commands to generate an input file at `{root}/inputs/{package_name}.in`,
  standardizes file extensions across the codebase, and updates the compiler's input
  parsing to match the new paths.
expected_findings:
- file: leo/commands/init.rs
  line: 66
  summary: 'Missing InputsFile creation: `leo init` scaffolds a project but does not
    generate the required input file, leaving the inputs directory empty and causing
    downstream commands (prove, run) to fail when they expect an input file to exist.'
  line_side: pre_fix
- file: leo/commands/new.rs
  line: 77
  summary: "Missing InputsFile creation: `leo new` has the same omission as `leo init`\
    \ \u2014 it does not create an input file during project scaffolding, inconsistent\
    \ with the expected project structure."
  line_side: pre_fix
- file: leo/files/inputs.rs
