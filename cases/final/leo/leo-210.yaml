description: The compiler's type checker produced unhelpful error messages when function
  calls had mistyped arguments. The span field on FunctionSymbol was prefixed with
  underscore (_span), making it inaccessible for error reporting. The fix exposes
  the span and uses it in the type checker to point error messages at the specific
  mistyped parameter location.
expected_findings:
- file: compiler/passes/src/symbol_table/function_symbol.rs
  line: 38
  summary: 'Field `_span: Span` is prefixed with underscore, suppressing its use —
    but span information is needed by the type checker to produce precise error messages
    for mistyped function call arguments.'
  line_side: pre_fix
- file: compiler/passes/src/type_checking/check_expressions.rs
  line: 455
  summary: Type mismatch error on function call arguments does not include the expected
    parameter's source location, producing a generic error instead of pointing to
    the specific parameter definition.
  line_side: pre_fix
