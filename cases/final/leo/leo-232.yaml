description: AST output files (e.g. initial_input_ast.json) were written without the
  program name in the filename. When a program had imports, multiple programs would
  write their AST snapshots to the same output path, causing files to silently overwrite
  each other. The fix prepends the program name to each AST output filename to disambiguate
  them.
expected_findings:
- file: compiler/compiler/src/compiler.rs
  line: 139
  summary: 'AST output filename missing program name prefix: `input_ast.to_json_file()`
    writes to a generic path that will be overwritten when processing imported programs'
  line_side: pre_fix
- file: compiler/compiler/src/compiler.rs
