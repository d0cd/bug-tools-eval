description: The Leo parser incorrectly accepted inclusive range syntax (e.g., `..=`)
  for loop ending bounds, which is not part of the Leo language specification per
  the ABNF grammar. The fix removes the inclusive range parsing path from the loop
  statement parser and updates tests to reflect that inclusive loop bounds are now
  a parse error.
expected_findings:
- file: compiler/parser/src/parser/statement.rs
  line: 140
  summary: 'Parser accepts inclusive loop ending bound (inclusive: true) which violates
    the ABNF grammar — only exclusive ranges should be valid for loop bounds'
  line_side: pre_fix
- file: compiler/parser/src/parser/statement.rs
  line: 152
  summary: Second code path also allows inclusive loop range syntax; should be removed
    or restricted to exclusive-only
  line_side: pre_fix
