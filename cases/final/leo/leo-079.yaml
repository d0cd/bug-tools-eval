description: The `PartialEq` implementation for `Identifier` was inconsistent with
  its `Hash` implementation. When `IndexMap` encountered hash collisions on insert,
  it fell back to `PartialEq` which did not compare all the fields that `Hash` used,
  causing duplicate keys and random compiler failures (~1% of runs). The fix corrected
  `PartialEq` (and the member-matching logic) to be consistent with `Hash`.
expected_findings:
- file: ast/src/common/identifier.rs
  line: 66
  summary: 'PartialEq implementation for Identifier is inconsistent with Hash: it
    does not compare all fields used by Hash, violating the Rust invariant that `a
    == b` implies `hash(a) == hash(b)` and vice versa. This causes IndexMap to treat
    distinct identifiers as equal (or equal ones as distinct) on hash collisions.'
  line_side: pre_fix
- file: ast/src/common/identifier.rs
  line: 95
  summary: Secondary Eq-related impl (likely PartialEq against a string/name type)
    also uses incomplete comparison, compounding the inconsistency with Hash.
  line_side: pre_fix
- file: compiler/src/statement/assign/assignee/member.rs
  line: 36
  summary: Uses `.matches(name)` for identifier lookup instead of full equality, which
    may mask or duplicate the incomplete-equality bug when searching members.
  line_side: pre_fix
