description: The Leo compiler incorrectly treated circuit inputs as constants when
  performing to_usize conversions, which is a ZK soundness issue. When inputs are
  allocated as constants rather than witnesses in the constraint system, the resulting
  circuit does not properly constrain those values, potentially allowing invalid proofs.
  The fix involved updating the snarkVM dependency and adjusting compiler gadget usage
  across expression evaluation, conditionals, and relational operations.
expected_findings:
- file: compiler/src/function/input/main_function_input.rs
  line: 36
  summary: Input values may be allocated as constants rather than witnesses in the
    constraint system when used in to_usize; this breaks soundness because the circuit
    does not constrain the actual input value
  line_side: pre_fix
- file: compiler/src/expression/array/access.rs
  line: 29
  summary: Array index access using to_usize on an input value treats it as a constant,
    meaning the constraint system does not enforce the index equals the actual runtime
    input
  line_side: pre_fix
- file: compiler/src/expression/conditional/conditional.rs
  line: 20
  summary: Ternary/conditional select gadget usage needs updated snarkVM API to correctly
    handle non-constant operands in select operations
  line_side: pre_fix
