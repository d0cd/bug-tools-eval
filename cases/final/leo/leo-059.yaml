description: The Pedersen hash example initialized its generator parameters with `[0group;
  256]` (the group identity/zero element), making the hash trivially degenerate since
  all commitments would collapse to zero. The fix adds `1group` syntax to the Leo
  compiler (via the `One` trait on `EdwardsGroupType`) to expose the curve's affine
  generator point, and updates the example to use `[1group; 256]`.
expected_findings:
- file: examples/pedersen_hash/src/main.leo
  line: 19
  summary: Pedersen hash parameters initialized with `[0group; 256]` (identity element)
    instead of generator points — this makes the hash function cryptographically degenerate,
    producing zero for all inputs
  line_side: pre_fix
- file: compiler/src/group/edwards_bls12.rs
  line: 33
  summary: Missing `One` trait implementation for `EdwardsGroupType` — the group type
    has no way to produce the affine generator point, preventing `1group` literal
    syntax
  line_side: pre_fix
- file: compiler/src/group/mod.rs
  line: 25
  summary: The `GroupType<F>` trait bound does not require `One`, so group implementations
    are not required to provide a generator/identity-one element
  line_side: pre_fix
