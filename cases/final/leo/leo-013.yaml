description: The tokenizer's unexpected_token error handler used byte-level string
  slicing (`&input[index..index+1]`) to extract the offending character. For multi-byte
  UTF-8 characters like emoji (e.g., 🦀), this panics because slicing at a non-character
  boundary is invalid in Rust. The fix replaces byte slicing with `.chars().next().unwrap()`
  to correctly extract the first character regardless of its byte width.
