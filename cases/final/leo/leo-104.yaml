description: The Leo compiler's circuit expression resolver only searched for circuit
  definitions at file/program scope. When code inside a circuit function (a nested
  scope) referenced another circuit type, the lookup failed because the scoping logic
  did not propagate a reference back to the enclosing program scope where circuit
  definitions live. The fix threads a `declared_circuit_reference` parameter through
  the compiler's function, statement, and expression enforcement so the resolver can
  find circuit definitions from any nested scope.
expected_findings:
- file: compiler/src/expression/circuit/circuit.rs
  line: 39
  summary: Circuit definition lookup is hard-coded to file scope only; when invoked
    from within a circuit function's nested scope, the lookup fails to find sibling
    circuit definitions. Needs to accept and use a scope reference that resolves back
    to the program-level definitions.
  line_side: pre_fix
- file: compiler/src/function/function.rs
  line: 47
  summary: enforce_function does not accept or propagate a declared_circuit_reference
    parameter, so circuit-scoped calls cannot resolve circuit types defined at program
    level.
  line_side: pre_fix
- file: compiler/src/statement/branch/branch.rs
  line: 44
  summary: Branch statement enforcement passes an empty string ("".to_owned()) where
    a circuit reference is needed, meaning circuit definitions are unresolvable inside
    conditional branches within circuit functions.
  line_side: pre_fix
