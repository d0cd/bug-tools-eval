description: The Leo compiler previously supported expression statements (e.g., `foo();`
  as a standalone statement), which were removed as a language design decision. The
  PR removes the ExpressionStatement AST node, its handling in all compiler passes
  (visitor, reconstructor, type checker), and updates the parser to emit an error
  when encountering expression statements, recovering gracefully. Test expectations
  are updated to reflect the new parser behavior.
