description: 'The Leo compiler''s code generation for external function calls had
  two bugs: (1) the future register returned by an external call was tracked internally
  but not included in the call instruction''s destination registers, producing malformed
  bytecode missing the future output; (2) the async instruction''s ''into'' clause
  used write! instead of writeln!, omitting the trailing newline and corrupting subsequent
  instruction formatting.'
expected_findings:
- file: compiler/passes/src/code_generation/visit_expressions.rs
  line: 551
  summary: Future register from external call is pushed to self.futures but never
    added to the destinations vector; the generated call instruction will be missing
    this output register, producing incorrect bytecode
  line_side: pre_fix
- file: compiler/passes/src/code_generation/visit_statements.rs
  line: 167
  summary: write! should be writeln! for the async instruction 'into' clause; missing
    trailing newline causes the next instruction to be appended on the same line,
    corrupting the generated Aleo bytecode
  line_side: pre_fix
