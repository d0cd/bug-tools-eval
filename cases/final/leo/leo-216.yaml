description: Function inlining did not apply SSA (Static Single Assignment) renaming
  to the reconstructed block, causing variable shadowing when the same function was
  inlined multiple times or when inlined variable names collided with caller variables.
  The fix runs an SsaFormingVisitor with rename_defs enabled on each inlined block
  immediately after reconstruction, and removes the now-unnecessary global rename_defs
  pass.
expected_findings:
- file: compiler/passes/src/function_inlining/ast.rs
  line: 60
  summary: After reconstructing the inlined block via Replacer, no SSA renaming is
    applied to the result. When the same function is inlined multiple times, the inlined
    variables retain their original names, causing shadowing in the caller scope.
    Must run SsaFormingVisitor with rename_defs:true on the reconstructed block.
  line_side: pre_fix
