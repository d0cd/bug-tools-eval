description: The Leo compiler's ASG (Abstract Semantic Graph) layer failed to detect
  namespace conflicts between different definition kinds — functions, circuits, aliases,
  and global constants could shadow each other silently. Additionally, the import
  resolution pass had structural issues causing incorrect resolution. The fix adds
  cross-namespace conflict checks in the program/scope layers and cleans up the import
  resolution AST pass.
expected_findings:
- file: asg/src/program/mod.rs
  line: 130
  summary: 'Missing cross-namespace conflict detection: when registering a new function/circuit/alias/global_const,
    the checker does not verify the name is absent from ALL other namespaces (functions,
    circuits, aliases, global consts), allowing silent shadowing.'
  line_side: pre_fix
- file: asg/src/statement/definition.rs
  line: 110
  summary: Variable definitions do not check whether the name shadows an existing
    global constant in scope, allowing local variables to silently shadow global consts
    without an error.
  line_side: pre_fix
- file: asg/src/scope.rs
  line: 151
  summary: Scope resolution for global constants is incomplete — resolve_global_const
    does not properly walk parent scopes or check for conflicts with other identifier
    kinds, enabling shadowing bugs.
  line_side: pre_fix
- file: ast-passes/src/import_resolution/importer.rs
  line: 21
  summary: Importer struct lacks necessary state (e.g. reference to import parser
    or accumulated program context), causing import resolution to fail or silently
    drop imported definitions.
  line_side: pre_fix
