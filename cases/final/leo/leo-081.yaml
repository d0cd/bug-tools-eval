description: 'Display trait implementations for AST nodes produced incorrect output:
  binary expressions lacked precedence-aware parenthesization, statements had inconsistent
  semicolons, and formatted output could be syntactically ambiguous or invalid. The
  fix introduces a precedence() method on expressions, adds proper conditional parenthesization
  in Display for binary/unary/cast/ternary nodes, and uses an Indent helper for block-level
  formatting.'
expected_findings:
- file: compiler/ast/src/expressions/binary.rs
  line: 179
  summary: Binary expression Display does not parenthesize sub-expressions based on
    operator precedence, producing ambiguous or incorrect output like `a + b * c`
    when `(a + b) * c` is intended.
  line_side: pre_fix
- file: compiler/ast/src/expressions/ternary.rs
  line: 33
  summary: Ternary expression Display does not wrap the condition in parentheses when
    its precedence requires it, leading to misparse-able output.
  line_side: pre_fix
- file: compiler/ast/src/statement/mod.rs
  line: 81
  summary: Statement Display implementations inconsistently emit trailing semicolons
    — some statement variants that require semicolons omit them, and block-like statements
    that should not have semicolons may include them.
  line_side: pre_fix
