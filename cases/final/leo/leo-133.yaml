description: The Leo compiler's array equality comparison (`evaluate_eq`) did not
  validate that both arrays have the same length before comparing elements. Because
  `zip` silently truncates to the shorter array, comparing `[1,2]` with `[1,2,3]`
  would incorrectly return `true` instead of producing a compiler error. The fix adds
  a length check before the zip loop and introduces a corresponding `array_sizes_must_match_in_eq`
  compiler error.
