description: 'The Leo compiler, parser, and type-checker were hardcoded to `MainnetV0`
  instead of being generic over the `Network` trait, preventing support for alternative
  networks. This refactoring threads a generic `N: Network` parameter through `Compiler`,
  `ParserContext`, and all type-checking passes, replacing concrete `MainnetV0` references
  with the generic bound.'
expected_findings:
- file: compiler/compiler/src/compiler.rs
  line: 58
  summary: Compiler struct is not generic over Network — hardcoded to a single network
    type, making it impossible to compile programs targeting other networks without
    duplicating the entire compiler.
  line_side: pre_fix
- file: compiler/parser/src/parser/expression.rs
  line: 769
  summary: 'Address literal parsing uses a concrete network type for validation. Should
    be generic over `N: Network` so addresses are validated against the target network''s
    parameters (prefix, encoding).'
  line_side: pre_fix
- file: compiler/parser/src/parser/context.rs
  line: 43
  summary: ParserContext is not parameterized by Network, forcing all parsed programs
    to assume MainnetV0 semantics even when targeting a different network.
  line_side: pre_fix
