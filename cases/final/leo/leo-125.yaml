description: When canonicalizing compound assignments (e.g. `a.x += 1` → `a.x = a.x
  + 1`), the access chain (field/tuple member accesses) on the assignee was being
  incorrectly reversed. This caused the generated right-hand-side expression to have
  accesses in the wrong order, producing incorrect semantics. The fix removes the
  erroneous reversal and adds tests for compound assignments involving nested accesses.
