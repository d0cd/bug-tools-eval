description: 'The parser benchmark file `big_ternary.leo` used outdated Leo syntax
  by prefixing each ternary expression with the `if` keyword (e.g., `return if x ==
  0 ? x : ...`). After Leo''s grammar evolved to drop the `if` prefix from ternary
  expressions, the benchmark file became unparseable, causing benchmark failures.
  The fix removes all spurious `if` keywords from the nested ternary chain.'
expected_findings:
- file: parser/benches/big_ternary.leo
  line: 4
  summary: 'Ternary expressions use outdated `if` prefix syntax (`return if x == 0
    ? x : (if x == 1 ? ...)`); Leo grammar no longer accepts `if` before ternary `?:`
    — remove all `if` keywords to match current syntax'
