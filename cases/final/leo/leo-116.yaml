description: This PR adds `self` keyword support for accessing circuit members and
  methods. The identifier check in `identifier.rs` conflates `Self` (type-level reference)
  and `self` (instance-level reference) into a single boolean check, which could cause
  incorrect resolution when one is used where the other is expected. Additionally,
  `is_in_scope` takes `&String` parameters instead of `&str`, which is a Rust anti-pattern
  that unnecessarily restricts callers.
