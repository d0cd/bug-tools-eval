description: The Leo CLI commands for deploy and execute were not selecting the fee
  calculation method based on the current consensus block height. Before this fix,
  the code did not branch on whether the height exceeded CONSENSUS_V2_HEIGHT, meaning
  it could use the wrong (likely more expensive) fee calculation regardless of the
  network's current consensus version. The fix adds height-aware fee selection across
  deploy and execute commands.
expected_findings:
- file: leo/cli/commands/deploy.rs
  line: 160
  summary: 'Fee calculation does not consider consensus height: should branch on whether
    current block height exceeds CONSENSUS_V2_HEIGHT to select between old and new
    (cheaper) fee computation'
  line_side: pre_fix
- file: leo/cli/commands/execute.rs
  line: 193
  summary: 'Execution cost calculation ignores consensus version: the v2 execution
    cost is available but not conditionally selected based on block height, leading
    to incorrect fee amounts'
  line_side: pre_fix
- file: leo/cli/commands/mod.rs
  line: 210
  summary: Base fee CLI option and its handling do not account for height-dependent
    fee logic; the fee options structure needs to support consensus-height-aware fee
    selection
  line_side: pre_fix
