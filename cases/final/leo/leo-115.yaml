description: The ASG layer did not enforce immutability for variables declared as
  `const`. The definition statement handler in `asg/src/statement/definition.rs` was
  missing a check to reject reassignment of const-declared variables. The fix adds
  a validation that emits an `invalid_const_assign` error when a const variable is
  assigned a non-const value, and updates test cases to use `let` where mutation is
  needed.
expected_findings:
- file: asg/src/statement/definition.rs
  line: 75
  summary: 'Missing const enforcement: when declaration_type is Declare::Const, there
    is no check that the assigned value is actually const-compatible, allowing mutation
    of const variables at the ASG level'
  line_side: pre_fix
- file: asg/src/error/mod.rs
  line: 172
  summary: No error variant exists for invalid const assignment — the compiler silently
    accepts reassignment of const variables without reporting an error
  line_side: pre_fix
