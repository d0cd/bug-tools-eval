description: The zip file creation code used raw OS paths as zip entry names, which
  on Windows produces backslash-separated paths (e.g., `package\src\main.leo`) instead
  of the forward-slash convention required by the ZIP specification. The fix uses
  the `zip` crate's deprecated path-sanitization method (with `#[allow(deprecated)]`)
  to normalize path separators, making `leo publish` work correctly on Windows.
expected_findings:
- file: package/src/root/zip.rs
  line: 106
  summary: 'Zip entry path not normalized for cross-platform compatibility: on Windows,
    OS path separators (backslashes) are used directly as zip entry names instead
    of forward slashes, violating the ZIP spec and breaking package publishing on
    Windows'
  line_side: pre_fix
- file: package/src/root/zip.rs
  line: 117
  summary: 'Same cross-platform path normalization issue: file entry paths passed
    to zip writer use OS-native separators instead of normalized forward-slash paths'
  line_side: pre_fix
