description: The Leo circuit grammar did not enforce member variable ordering before
  member functions, and lacked support for semicolons/commas after member variables.
  The fix updates the parser grammar but the author explicitly notes a 'hacky fix'
  for optional trailing commas and that semicolons and commas can be mixed, suggesting
  the grammar change is not fully rigorous.
