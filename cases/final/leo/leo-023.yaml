description: The FormatString AST nodes incorrectly modeled console format strings,
  causing issues with parsing and escape handling. The fix replaces FormatString with
  a simpler ConsoleArgs node and moves format-string parsing to the compiler level,
  adding proper escape handling for `{` and `}` via brace doubling. It also fixes
  the ABNF grammar to allow empty string-literals, with a canonicalization error for
  zero-size arrays.
