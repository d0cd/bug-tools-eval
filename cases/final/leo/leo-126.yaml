description: Two utility errors (network_error, failed_to_retrieve_from_endpoint)
  were declared as @formatted, which requires source spans for display, but these
  errors arise in contexts without associated spans. This caused their error messages
  to be silently dropped. The fix changes them to @backtraced and also makes the Formatted
  Display impl print the error message even when no source file is found.
expected_findings:
- file: errors/src/errors/utils/util_errors.rs
  line: 61
  summary: network_error is declared @formatted but has no associated span; should
    be @backtraced so the error message is actually displayed
  line_side: pre_fix
- file: errors/src/errors/utils/util_errors.rs
  line: 138
  summary: failed_to_retrieve_from_endpoint is declared @formatted but has no associated
    span; should be @backtraced
  line_side: pre_fix
- file: errors/src/common/formatted.rs
  line: 88
  summary: Display impl silently drops the error message when source file lookup fails;
    should still print the message even without a source file
  line_side: pre_fix
