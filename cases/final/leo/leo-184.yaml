description: The finalize executor's match arm for Position commands returned without
  incrementing the instruction index. This caused an infinite loop where the executor
  repeatedly fetched the same Position instruction. The fix increments the instruction
  index when a Position command is encountered, aligning with how other commands advance
  control flow.
