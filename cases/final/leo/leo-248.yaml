description: 'The signed integer division algorithm in the ZK gadget unconditionally
  computes the two''s complement of the denominator during calculation. For minimum
  values (e.g., -128 for i8), the two''s complement does not exist in the same bit
  width, causing the division to fail. The fix adds two special-case checks: when
  the denominator is the minimum value, the result is 1 if the numerator equals the
  denominator, and 0 otherwise.'
expected_findings:
- file: gadgets/src/signed_integer/arithmetic/div.rs
  line: 23
  summary: 'Division macro computes two''s complement of the denominator without guarding
    against the minimum value (e.g., i8::MIN = -128), which has no valid two''s complement
    in the same bit width. Must add a special case: if denominator == MIN, result
    is 0 (or 1 if numerator == denominator).'
  line_side: pre_fix
- file: gadgets/src/signed_integer/arithmetic/div.rs
  line: 85
  summary: The signed division constraint synthesis does not account for the edge
    case where the denominator is the type's minimum value, leading to constraint
    unsatisfiability when the two's complement overflows.
  line_side: pre_fix
