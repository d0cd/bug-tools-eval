description: 'The error message when no private key argument is provided and --discreet
  is false was misleading, suggesting the key could be read from an environment variable
  (PRIVATE_KEY), which this command does not support. The fix clarifies the message
  to accurately state the two options: pass the key as an argument or use --discreet
  for secure input.'
