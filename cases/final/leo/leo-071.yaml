description: The Leo compiler's ternary expression handler in the ASG never checked
  that the two branches (if_true and if_false) had the same type. This allowed programs
  with type-mismatched ternary branches to compile without error. The fix adds a type
  equality check between both branches and introduces a new `ternary_different_types`
  error diagnostic.
expected_findings:
- file: asg/src/expression/ternary.rs
  line: 79
  summary: 'Missing type check: after resolving the if_true and if_false expressions
    of a ternary, there is no validation that their types match. A type equality check
    should be added here to reject mismatched ternary branches.'
  line_side: pre_fix
- file: asg/src/expression/ternary.rs
  line: 105
  summary: Same missing type check in the second code path for ternary expression
    resolution — both branches' types are never compared for equality.
  line_side: pre_fix
