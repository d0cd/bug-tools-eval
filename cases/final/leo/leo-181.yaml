description: The Leo compiler's type checker in check_expressions.rs was missing type
  validation for multiplication (Mul) expressions. While other binary arithmetic operations
  (Add, Sub, Div) checked that both operands have the same type, the Mul case was
  skipped, allowing type-mismatched or invalid multiplication expressions to pass
  compilation without error.
