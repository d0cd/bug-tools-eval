description: Code generation for ExpressionStatements discarded the generated instructions
  by only capturing the expression value (tuple element .1) and ignoring the instruction
  string (tuple element .0). Additionally, dead code elimination incorrectly removed
  ExpressionStatements containing side-effecting function calls. The fix ensures generated
  instructions are emitted and DCE preserves expression statements with calls.
expected_findings:
- file: compiler/passes/src/code_generation/visit_statements.rs
  line: 167
  summary: ExpressionStatement codegen uses only `.1` (the operand register) from
    visit_expression, discarding `.0` (the generated instructions). The emitted instructions
    for the expression are silently lost, producing no code for standalone expression
    statements such as function calls.
  line_side: pre_fix
- file: compiler/passes/src/dead_code_elimination/eliminate_statement.rs
  line: 151
  summary: Dead code elimination reconstructs ExpressionStatements only when the expression
    is a function call, but the check or reconstruction is incorrect — side-effecting
    expression statements may be eliminated when they should be preserved.
  line_side: pre_fix
