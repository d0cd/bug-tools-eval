  summary: Error constructor passes `input.span()` (the whole struct/record span)
    instead of the member's own `*span`, making the diagnostic point to the entire
    block rather than the specific duplicate member
  line_side: pre_fix
- file: compiler/passes/src/type_checking/program.rs
  line: 229
  summary: Using `.all()` iterator pattern loses the ability to identify which specific
    member is the duplicate; should iterate with a for-loop and check `used.insert()`
    per member
  line_side: pre_fix
