description: The `read_token()` call in both `add.rs` and `login.rs` propagated raw
  IO errors when no JWT file existed, producing unhelpful error messages for non-authorized
  users. The fix wraps these calls with `.map_err()` to convert failures into domain-specific
  CLI errors (NotAuthorized, NoCredentialsProvided) with actionable messages.
