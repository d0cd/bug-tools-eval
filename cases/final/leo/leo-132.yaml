description: The Leo import parser was still looking for the deprecated `src/lib.leo`
  as the main file entry point for imported packages, but the project had migrated
  to `src/main.leo`. This caused all imports from Aleo Package Manager dependencies
  to fail with a 'cannot find imported package' error. The fix updates the `MAIN_FILE`
  constant and related path resolution logic to use `src/main.leo`.
