description: 'The Leo parser''s PEG grammar accepted bare `address()` as a valid address
  literal, with no validation of the address format. The fix constrains the `address`
  rule in the pest grammar to require the proper Aleo address format: prefix `aleo`
  followed by a digit and 58 alphanumeric characters, and adds corresponding error
  messages and test cases for invalid addresses.'
expected_findings:
- file: ast/src/leo.pest
  line: 206
  summary: The `address` grammar rule lacks format validation — it accepts empty or
    malformed address literals. Should require the pattern `aleo` + digit + 58 alphanumeric
    chars.
  line_side: pre_fix
- file: ast/src/errors/syntax.rs
  line: 15
  summary: Missing descriptive error message for invalid address syntax — user gets
    no guidance on the expected `aleo1...` format.
  line_side: pre_fix
