description: The arguments to `AsgError::unexpected_type(expected, got, span)` were
  passed in the wrong order at multiple call sites, causing error messages to display
  the expected type and the actual type swapped. The fix corrects the argument ordering
  across all callers in the ASG expression modules and potentially the error definition
  itself.
expected_findings:
- file: asg/src/expression/array_init.rs
  line: 74
  summary: 'Arguments to `unexpected_type` are in wrong order: expected type and actual
    type are swapped, producing a misleading error message'
  line_side: pre_fix
- file: asg/src/expression/binary.rs
  line: 123
  summary: 'Arguments to `unexpected_type` are swapped: passes `(Type::Boolean, x)`
    but `x` is the expected type and `Type::Boolean` is what was received (or vice
    versa)'
  line_side: pre_fix
- file: errors/src/asg/asg_errors.rs
  line: 443
  summary: The `unexpected_type` error definition — parameter naming or format string
    may need updating to match corrected call-site argument order
  line_side: pre_fix
