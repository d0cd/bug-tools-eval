description: A parser test file for implicit integer literals was incorrectly formatted
  — it was meant to be disabled but did not begin with the required block comment
  prefix. The fix reformats the test to start with a block comment and changes its
  expectation from Pass to Fail, since current Leo disallows untyped literals.
