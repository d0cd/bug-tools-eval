description: The `leo build` command serialized a circuit to JSON and then immediately
  deserialized it back, discarding the result. This unused deserialization logic (reading
  the circuit file back and parsing it) was dead code that added unnecessary I/O and
  complexity. The fix removes the unused read-back and deserialization calls.
