description: Reverse loop iteration in the Leo compiler incorrectly computed exclusive
  bounds for descending loops. The expression `(to..from).rev()` produces a range
  that excludes the starting value of the reverse iteration; the fix shifts both bounds
  by +1 via `((to+1)..(from+1)).rev()` so the loop visits the correct set of values.
expected_findings:
- file: compiler/src/statement/iteration/iteration.rs
  line: 60
  summary: 'Off-by-one in reverse exclusive range: `(to..from).rev()` excludes the
    `from` value from iteration. Needs `((to+1)..(from+1)).rev()` to produce the correct
    descending sequence for Leo''s `for i in high..low` syntax.'
  line_side: pre_fix
