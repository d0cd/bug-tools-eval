description: 'Three distinct bugs found during documentation writing: (1) `eq` and
  `ne` operators were assigned incorrect precedence in the PEG grammar, differing
  from other relational comparators like `lt`, `gt`, `le`, `ge`; (2) successful compilation
  of `lib.leo` files silently discarded the result (`let _program =`) instead of printing
  a success message to the console; (3) the reserved/protected keyword list was missing
  current Leo keywords like `address`, allowing them to be used as identifiers.'
expected_findings:
- file: ast/src/ast.rs
  line: 45
  summary: 'Operator precedence bug: `operation_eq` and `operation_ne` are defined
    at a different precedence level than other relational operators (`lt`, `gt`, `le`,
    `ge`); they should share the same precedence group.'
  line_side: pre_fix
- file: leo/commands/build.rs
  line: 55
  summary: Build result silently discarded via `let _program =` for lib.leo compilation;
    should print a success message to console like other build paths do.
  line_side: pre_fix
- file: ast/src/leo.pest
  line: 9
  summary: Reserved keyword list is incomplete — missing `address` and potentially
    other current Leo keywords, allowing them to be used as user-defined identifiers
    which will cause downstream errors.
  line_side: pre_fix
