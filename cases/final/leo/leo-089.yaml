description: The mutable circuit variable assignment path strips the Mutable wrapper
  after the first assignment. In circuit_variable.rs, conditionally_select produces
  an unwrapped value that overwrites member.1, so the variable loses its mutability
  flag and subsequent assignments to the same field fail with an immutability error.
  The test only performs a single assignment, masking this defect.
expected_findings:
- file: compiler/src/statement/assign/circuit_variable.rs
  line: 56
  summary: 'Mutable wrapper lost after assignment: conditionally_select returns an
    unwrapped value that overwrites member.1, stripping the Mutable(...) wrapper.
    After one assignment the variable becomes immutable. The result should be re-wrapped
    as ConstrainedValue::Mutable(Box::new(selected_value)).'
  line_side: pre_fix
- file: compiler/src/expression/circuit/circuit.rs
  line: 55
  summary: CircuitMember::CircuitVariable now carries is_mutable flag but the wrapping
    with ConstrainedValue::Mutable is only done at construction time with no guarantee
    it survives through assignment — should verify round-trip mutability preservation.
  line_side: pre_fix
- file: compiler/tests/mutability/circuit_variable_mut.leo
  line: 1
  summary: Test only performs a single assignment (a.x = 0). Missing a second assignment
    (e.g. a.x = 1) that would expose the Mutable wrapper stripping bug in the assign
    path.
  line_side: pre_fix
