description: The `from_external_record` method used an inefficient pattern of creating
  two intermediate `Vec`s (via `vec![]` and `collect_vec()`) then concatenating them
  with `.concat()`, causing unnecessary heap allocations. The fix replaces this with
  a single preallocated `Vec::with_capacity` using `push` and `extend`, eliminating
  the intermediate allocations while preserving identical behavior.
