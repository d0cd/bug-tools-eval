description: The ABNF grammar and parser were misaligned on equality operators (==,
  !=), causing incorrect parsing of equality expressions. The fix aligns the grammar
  spec with the parser implementation, corrects equality/comparison operator handling
  in the expression parser, updates package-name validation to check against language
  keywords, and updates all equality/inequality test cases to use the corrected semantics.
