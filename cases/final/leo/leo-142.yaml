description: The code generation for array init expressions concatenated operands
  without any separator space. `operands.push_str(&operand)` at line 154 joined array
  element operands directly, producing malformed bytecode. The fix adds a space prefix
  via `format!(" {operand}")` to properly separate operands in the generated code.
expected_findings:
- file: compiler/passes/src/code_generation/visit_expressions.rs
  line: 154
  summary: 'Missing space separator: `operands.push_str(&operand)` concatenates array
    init operands without any delimiter, producing malformed bytecode — should be
    `operands.push_str(&format!(" {operand}"))`.'
