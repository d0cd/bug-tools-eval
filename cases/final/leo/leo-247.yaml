description: The zip package builder excludes the `inputs/` directory itself but fails
  to exclude files nested inside it (e.g., `inputs/<pack_name>.state`). This produces
  a zip archive with file entries referencing a nonexistent parent directory, causing
  the apm-backend server to error when it tries to create files at those paths.
expected_findings:
- file: package/src/root/zip.rs
  line: 114
  summary: 'Incomplete path exclusion: `path.starts_with(INPUTS_DIRECTORY_NAME)` only
    skips the directory entry itself but does not skip files whose paths are nested
    under the inputs directory. The check needs to also exclude child paths within
    the inputs folder.'
  line_side: pre_fix
