description: The Leo CLI constructed the program query URL by always appending an
  edition (e.g. '/latest') even when the user did not specify one. The '/latest' endpoint
  was deprecated or changed on the Aleo network API, causing program fetches to fail.
  The fix omits the edition segment from the URL when none is explicitly provided,
  allowing the API to return the latest program version by default.
expected_findings:
- file: leo/cli/commands/query/program.rs
  line: 63
  summary: 'API misuse: URL always includes an edition path segment (e.g. ''/latest'')
    even when user did not specify one; the ''/latest'' endpoint is deprecated and
    causes fetch failures — omit edition from URL when unspecified'
  line_side: pre_fix
