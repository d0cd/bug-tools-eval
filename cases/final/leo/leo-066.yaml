description: The Leo CLI updater check propagated errors (likely via the `?` operator)
  when it failed to fetch the latest release version, causing the entire CLI command
  to abort instead of gracefully degrading. The fix changes error handling in the
  updater to catch and warn on update-check failures rather than halting execution.
