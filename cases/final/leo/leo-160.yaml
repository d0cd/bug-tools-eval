description: The Leo parser did not verify that function call expressions have an
  identifier as the callee, allowing literals like `100u8(0u8)` or `1000u128(...)`
  to be parsed as function calls. This caused unreachable!() panics in downstream
  compiler passes (code generation and type checking). The fix adds an identifier
  check in the parser, but also leaves debug println! statements in the type checker.
expected_findings:
- file: compiler/parser/src/parser/expression.rs
  line: 446
  summary: 'Missing validation: when a LeftParen follows an expression, the parser
    assumes it is a function call but does not check that the expression is an Identifier.
    Non-identifier expressions (e.g. literals) will be parsed as CallExpression and
    cause unreachable!() panics in later passes.'
  line_side: pre_fix
- file: compiler/passes/src/type_checking/check_expressions.rs
  line: 453
  summary: Debug println! statements left in production code — these should be removed
    before merging.
  line_side: pre_fix
