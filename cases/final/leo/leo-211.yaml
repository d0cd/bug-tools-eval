description: The Leo compiler did not validate that the return type of a function
  matched the declared output register type. This allowed programs to compile and
  produce incorrect output when there was a type mismatch between the function's return
  statement and the output register declaration. The fix adds a type check in the
  output bytes module and introduces a corresponding error variant.
expected_findings:
- file: compiler/src/output/output_bytes.rs
  line: 63
  summary: 'Missing type check: output register values are written without verifying
    the return type matches the declared register type, allowing type-mismatched programs
    to silently produce wrong output'
  line_side: pre_fix
- file: compiler/src/errors/output_bytes.rs
  line: 45
  summary: No error variant exists for return-type/register-type mismatch, so the
    compiler cannot report this class of error to the user
  line_side: pre_fix
