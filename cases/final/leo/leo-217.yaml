description: 'The Leo compiler''s flattening pass had three bugs: (1) it attempted
  to create ternary expression chains for unit expressions (void returns), which is
  invalid; (2) it failed to register structs read from mappings via Mapping::get/get_or_use
  into the struct tracking table, breaking subsequent member access in finalize blocks;
  (3) code generation panicked when the operand string was empty (unit return) because
  split('' '') on an empty string yields [""] instead of [], causing a length mismatch
  in zip_eq.'
expected_findings:
- file: compiler/passes/src/flattening/flattener.rs
  line: 98
  summary: Unit expressions (void returns) are fed into the ternary-chain fold without
    a guard check, causing the flattener to generate invalid ternary expressions for
    functions that return unit type.
  line_side: pre_fix
- file: compiler/passes/src/flattening/flatten_statement.rs
  line: 143
  summary: Assignment reconstruction does not handle the case where the RHS is a Mapping::get
    or Mapping::get_or_use call returning a struct; the struct is never registered
    in self.structs, so later member-access flattening fails.
  line_side: pre_fix
- file: compiler/passes/src/code_generation/visit_statements.rs
  line: 91
  summary: operand.split(' ') on an empty string produces a single-element iterator
    [""], not an empty iterator, causing zip_eq to panic when there are zero output
    operands (unit return type).
  line_side: pre_fix
