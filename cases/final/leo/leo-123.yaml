description: The interpreter's cursor duplicates futures when processing Element::Expression
  across multiple evaluation steps. Each intermediate step appends futures to the
  output vector, so a transition returning one future and two async calls produces
  five futures instead of three. The fix gates the futures-vector extension to only
  fire on the final step of expression evaluation.
expected_findings:
- file: interpreter/src/cursor.rs
  line: 1315
  summary: Futures are extended into the output vector unconditionally during multi-step
    Expression processing. Should only extend futures on the final evaluation step
    (e.g. guard with `if user_initiated` or equivalent last-step check) to prevent
    duplicate future entries.
  line_side: pre_fix
