description: The AST canonicalization pass did not replace `Self` references in static
  call expressions (e.g., `Self::function_name()`) with the actual circuit/type name.
  This meant that `Self` in static call position survived into later compiler phases
  unchanged, causing resolution failures. The fix extends the canonicalization reducer
  to handle `Self` in static calls, analogous to the existing handling for other `Self`
  type positions.
