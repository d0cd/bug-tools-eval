description: The Leo type checker was missing a validation rule that prevents `function`s
  (as opposed to `transition`s) from returning `record` types. Without this check,
  a user could write a `function` that outputs a record, which violates Leo's execution
  model where only transitions may handle records (private on-chain state). The fix
  adds output-type checks in both the `Output::External` and `Output::Internal` branches
  of the function output type-checking loop.
expected_findings:
- file: compiler/passes/src/type_checking/check_program.rs
  line: 232
  summary: 'Missing validation: the `Output::External` branch is a no-op (`{}`), but
    external outputs are always records, so non-transition functions reaching this
    branch should be rejected.'
  line_side: pre_fix
- file: compiler/passes/src/type_checking/check_program.rs
  line: 234
  summary: 'Missing validation: the `Output::Internal` branch checks that the output
    type is defined but never checks whether the type is a record. For non-transition
    functions, returning a record type via an internal output should be an error.'
  line_side: pre_fix
