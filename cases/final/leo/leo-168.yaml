description: Leo allowed single-element tuple types and parenthesized single-variable
  definitions, which should be disallowed since a 1-element tuple is semantically
  meaningless and can mask user intent errors. The fix adds validation in the canonicalizer
  to reject these cases and tracks whether definition variables are parenthesized
  via a new `parened` field on Definition statements.
expected_findings:
- file: ast-passes/src/canonicalization/canonicalizer.rs
  line: 376
  summary: 'Missing check: canonicalizer does not reject single-element tuple definitions
    when the variable list is parenthesized with only one name — should emit an error
    for `let (x) = ...`'
  line_side: pre_fix
- file: parser/src/parser/statement.rs
  line: 295
  summary: Parser does not track whether a definition's variable names were parenthesized,
    losing information needed to distinguish `let x = ...` from `let (x) = ...` for
    later validation
  line_side: pre_fix
