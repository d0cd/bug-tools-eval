description: The reverted GitHub Action allowed any user to trigger a workflow that
  modifies the README by opening an issue with a specific title pattern. The add_contributor.js
  script parsed issue titles to extract GitHub usernames and automatically committed
  changes to the repository, creating a vector for injection or unauthorized repository
  modifications. The revert removes this attack surface entirely.
expected_findings:
- file: .github/workflows/add_contributor.yml
  line: 1
  summary: GitHub Action triggered by issue events allows external users to trigger
    automated commits to the repository — potential for abuse via crafted issue titles
  line_side: pre_fix
- file: .github/scripts/add_contributor.js
  line: 1
  summary: Script parses user-controlled issue title to extract GitHub username and
    modifies README without sufficient input validation — injection risk
  line_side: pre_fix
