description: Multi-dimensional array tuple syntax dimensions were processed in the
  wrong order. For a type like `[bool; (2, 3)]`, the compiler accepted the nested
  literal `[[true; 2]; 3]` (incorrect) and rejected `[[true; 3]; 2]` (correct), because
  dimension indices were consumed from the wrong end when validating nested array
  initializers against tuple-style array types.
expected_findings:
- file: compiler/src/expression/array/array.rs
  line: 46
  summary: dimensions.first() consumes dimensions in wrong order for nested array
    initializers — outer dimension of tuple type (2,3) should map to outermost nesting
    level, but first() grabs the innermost
  line_side: pre_fix
- file: compiler/src/expression/array/array.rs
  line: 69
  summary: 'Same reversed-dimension bug in the second match arm: dimensions.first()
    picks the wrong dimension when validating array repeat initializers against tuple-style
    multidimensional types'
  line_side: pre_fix
- file: typed/src/expression.rs
  line: 501
  summary: Iterating dimensions with .rev() causes dimension-to-nesting-level mapping
    to be inverted — the tuple (2,3) dimensions get assigned inside-out when constructing
    the typed AST
  line_side: pre_fix
