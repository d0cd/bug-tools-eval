description: This PR addresses multiple Clippy linter warnings across the Leo compiler
  codebase. The fixes include removing redundant `.into_iter()` calls where the type
  already implements `IntoIterator`, simplifying `&Some(x.clone())` patterns, and
  cleaning up unnecessary intermediate references in iterator chains and symbol table
  lookups.
expected_findings:
- file: compiler/passes/src/function_inlining/inline_statement.rs
  line: 38
  summary: 'Redundant `into_iter()`: `left.elements.into_iter().zip(right.elements)`
    — Clippy warns that `.into_iter()` is unnecessary when the receiver already implements
    `IntoIterator` via a `for` loop or `.zip()` consumer'
  line_side: pre_fix
- file: compiler/passes/src/type_checking/check_expressions.rs
  line: 520
  summary: 'Clippy `needless_borrow` or `manual_map`: `&Some(input.type_.clone())`
    creates an unnecessary reference to a freshly constructed `Some`; should pass
    `Some(...)` directly or use `.as_ref()`'
  line_side: pre_fix
- file: compiler/passes/src/flattening/flatten_expression.rs
  line: 130
  summary: Redundant `.into_iter()` before `.zip_eq(second.elements)` — iterator adaptor
    already consumes the collection, so explicit `into_iter()` is unnecessary
  line_side: pre_fix
