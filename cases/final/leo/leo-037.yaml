description: The Leo compiler's code generation pass incorrectly handled ExpressionStatements
  containing function calls. The visit_statements handler for Expression::Call did
  not properly emit call instructions when a call was used as a standalone statement,
  and the external call formatting in visit_expressions also needed correction to
  generate valid Aleo instructions.
expected_findings:
- file: compiler/passes/src/code_generation/visit_statements.rs
  line: 128
  summary: Expression::Call match arm in expression statement codegen does not correctly
    handle call expressions used as standalone statements — missing or incorrect instruction
    emission
  line_side: pre_fix
- file: compiler/passes/src/code_generation/visit_expressions.rs
  line: 280
  summary: External call format string generates incorrect Aleo bytecode instruction
    for call expressions (wrong format for 'call {external}.aleo/{function}')
  line_side: pre_fix
- file: compiler/passes/src/code_generation/visit_expressions.rs
  line: 304
  summary: Duplicate external call formatting issue — same incorrect call instruction
    format as line 280
  line_side: pre_fix
