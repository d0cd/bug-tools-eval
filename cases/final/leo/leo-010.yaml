description: The Leo compiler was missing validation checks for the number of inputs
  and outputs in transitions. The fix adds proper bounds checking in the type checker
  to emit clear error messages when transitions exceed the maximum allowed number
  of inputs or outputs, while correctly exempting inline functions from these limits.
expected_findings:
- file: compiler/passes/src/type_checking/visitor.rs
  line: 1431
  summary: 'Missing check: transitions should validate that the number of input parameters
    does not exceed the maximum allowed (16 for non-inline functions)'
  line_side: pre_fix
- file: compiler/passes/src/type_checking/visitor.rs
  line: 1527
  summary: 'Missing check: transitions should validate that the number of output parameters
    does not exceed the maximum allowed (16 for non-inline functions)'
  line_side: pre_fix
- file: compiler/passes/src/type_checking/mod.rs
  line: 40
  summary: No max_outputs field tracked in type checker state, preventing output count
    validation
  line_side: pre_fix
