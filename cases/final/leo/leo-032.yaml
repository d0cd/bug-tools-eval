description: The `leo test` command reused a single `TestConstraintSystem` instance
  across all test functions, causing constraint pollution between tests. Constraints
  accumulated from earlier tests would leak into later ones, producing incorrect pass/fail
  results. The fix creates a fresh `TestConstraintSystem` before each test function
  runs.
expected_findings:
- file: compiler/src/constraints/constraints.rs
  line: 42
  summary: 'Shared TestConstraintSystem: a single constraint system is created and
    reused across multiple test invocations, causing constraints from one test to
    leak into subsequent tests. Each test should get its own fresh TestConstraintSystem.'
  line_side: pre_fix
- file: leo/commands/test.rs
  line: 12
  summary: compile_test_constraints() is called without ensuring test isolation —
    the compiler should create a new constraint system per test rather than accepting/reusing
    an external one.
  line_side: pre_fix
