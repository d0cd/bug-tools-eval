description: Circuit init and circuit access expressions did not implement constant
  value propagation, causing constant folding to fail for circuit types. The fix adds
  a Circuit variant to ConstValue and implements const_value() for circuit_access
  and circuit_init expressions, using a map of identifier names for efficient member
  lookups.
expected_findings:
- file: asg/src/expression/circuit_access.rs
  line: 83
  summary: const_value() for circuit access expressions returns None instead of propagating
    the constant value of the accessed circuit member
  line_side: pre_fix
- file: asg/src/expression/circuit_init.rs
  line: 70
  summary: const_value() for circuit init expressions returns None instead of constructing
    a ConstValue::Circuit from the member initializers
  line_side: pre_fix
- file: asg/src/const_value.rs
  line: 14
  summary: ConstValue enum is missing a Circuit variant to represent constant circuit
    values, preventing constant folding for circuit expressions
  line_side: pre_fix
