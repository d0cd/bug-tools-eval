description: The parser for ordering expressions (>, >=, <, <=) incorrectly used a
  looping/associative parsing pattern, allowing chained comparisons like `a > b >
  c` which violates the Leo grammar specification. The fix changes the ordering expression
  parser to parse at most one comparison operator, making these operators non-associative
  as the grammar requires.
