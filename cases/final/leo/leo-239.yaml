description: The `alloc_helper` function for address values unconditionally called
  `value_gen()` and failed with `SynthesisError::AssignmentMissing` when the constraint
  system was in setup mode, since no witness values are available during setup. The
  fix passes the constraint system into `alloc_helper` and returns a default address
  placeholder when `cs.is_in_setup_mode()` is true, allowing conditional address selections
  to work correctly during both setup and proving phases.
expected_findings:
- file: compiler/src/value/address/address.rs
  line: 88
  summary: alloc_helper does not accept the constraint system and cannot check `is_in_setup_mode()`
    — during setup, `value_gen()` returns Err which is unconditionally mapped to `SynthesisError::AssignmentMissing`
    instead of falling back to a default address placeholder.
  line_side: pre_fix
- file: compiler/src/value/address/address.rs
  line: 107
  summary: alloc() calls `Self::alloc_helper(value_gen)` without passing the constraint
    system, so alloc_helper cannot distinguish setup mode from proving mode and fails
    on conditional address selections.
  line_side: pre_fix
- file: compiler/src/value/address/address.rs
  line: 147
  summary: alloc_input() has the same issue — calls alloc_helper without constraint
    system, causing AssignmentMissing during setup mode for address inputs used in
    conditional branches.
  line_side: pre_fix
