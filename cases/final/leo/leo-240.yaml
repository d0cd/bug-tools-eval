description: 'After dependabot bumped the sha2 crate from 0.8.2 to 0.9.0 (PR #82),
  the call sites in compiler/src/compiler.rs were not updated. The sha2 0.9.0 release
  renamed `input()` to `update()` and `result()` to `finalize()` per the RustCrypto
  Digest trait, causing a compilation failure. PR #90 updates the two call sites to
  use the new API.'
