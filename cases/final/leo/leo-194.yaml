description: The return indicator for function statements was stored as Option<Boolean>,
  allowing None values that caused incorrect return propagation in functions with
  multiple return paths or conditional returns. When all indicators were None, the
  compiler silently returned the last result, masking multiple-return errors and producing
  incorrect circuit constraints for inlined functions with conditional branches.
expected_findings:
- file: compiler/src/statement/statement.rs
  line: 25
  summary: IndicatorAndConstrainedValue type alias uses Option<Boolean> instead of
    Boolean, allowing None indicators that break return propagation in multi-return
    and inlined functions
  line_side: pre_fix
- file: compiler/src/function/function.rs
  line: 97
  summary: Passes None as the indicator to enforce_statement instead of Boolean::constant(true),
    losing track of branch conditions at function entry
  line_side: pre_fix
- file: compiler/src/function/result/result.rs
  line: 42
  summary: conditionally_select_result silently returns last result when all indicators
    are None ('no branch conditions'), masking multiple-return errors and producing
    incorrect constraint selection
  line_side: pre_fix
