description: Comparing two values with mismatched types in relational operators (eq,
  ge, gt, le, lt) caused a stack overflow. The error formatting used `{:?}` (Debug
  trait) on synthesis errors, which triggered infinite recursion. The fix changes
  error formatting from `{:?}` to `{}` (Display trait) across all error types and
  adds a proper type-mismatch error path in relational operators.
expected_findings:
- file: compiler/src/expression/relational/eq.rs
  line: 102
  summary: map_err formats the synthesis error with Debug (`{:?}`), which causes infinite
    recursion (stack overflow) when the constraint system produces an error from mismatched
    types. Should use Display (`{}`) or return a dedicated type-mismatch error instead.
  line_side: pre_fix
- file: compiler/src/expression/relational/ge.rs
  line: 52
  summary: 'Same stack overflow pattern: map_err uses ExpressionError::cannot_evaluate
    which formats with `{:?}`, causing infinite recursion on synthesis errors from
    mismatched types.'
  line_side: pre_fix
- file: compiler/src/errors/value/boolean.rs
  line: 38
  summary: Error message formats synthesis error with `{:?}` (Debug), which can trigger
    recursive formatting and stack overflow. Should use `{}` (Display).
  line_side: pre_fix
