description: The Leo compiler's type checker did not properly validate operand types
  for shift-assign (`<<=`, `>>=`) and power-assign (`**=`) compound assignment operators,
  allowing type-incorrect programs to pass compilation. The fix removes compound assignments
  from the AST entirely, having the parser desugar `x <<= y` into `x = x << y` so
  that existing binary operation type-checking handles them correctly.
expected_findings:
- file: compiler/ast/src/statements/assign/mod.rs
  line: 34
  summary: AssignStatement carries a compound operation variant (e.g. ShlAssign, ShrAssign,
    PowAssign) that bypasses the type checker's binary-operation validation, allowing
    type-incorrect shift and power assignments to compile without error
  line_side: pre_fix
- file: compiler/parser/src/parser/statement.rs
  line: 55
  summary: Parser emits compound assignment statements (e.g. `<<=`, `>>=`, `**=`)
    directly into the AST without desugaring them to simple assignment + binary operation,
    so downstream passes including the type checker never see or validate the operand
    types
  line_side: pre_fix
- file: compiler/passes/src/static_single_assignment/rename_statement.rs
  line: 70
  summary: SSA pass must handle compound assignments specially but does not correctly
    decompose shift/pow-assign into a binary expression + simple assignment, propagating
    the unvalidated compound operation through the pipeline
  line_side: pre_fix
