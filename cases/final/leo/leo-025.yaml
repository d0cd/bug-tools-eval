description: Multiple type checking bugs in the Leo compiler's type checker pass.
  Issues include incorrect type comparison in ternary/binary expressions, insufficient
  return-statement tracking using a simple boolean (which fails for conditional branches),
  and missing checks for undefined variables and invalid variable assignments. The
  fix addresses five separate reported issues by correcting type match arms, improving
  return tracking logic, adding proper variable scope validation, and introducing
  new error messages.
expected_findings:
- file: compiler/passes/src/type_checker/check_expressions.rs
  line: 226
  summary: 'Ternary expression type checking: the (Some(t1), Some(t2)) match arm does
    not properly handle type mismatches between the two branches, allowing ill-typed
    ternary expressions to pass the type checker.'
  line_side: pre_fix
- file: compiler/passes/src/type_checker/checker.rs
  line: 26
  summary: 'Using a simple `has_return: bool` field is insufficient for tracking return
    coverage across conditional branches (if/else). A function with a return in only
    one branch of an if/else will incorrectly be marked as having a return.'
  line_side: pre_fix
- file: compiler/passes/src/type_checker/check_statements.rs
  line: 31
  summary: Unconditionally setting `self.visitor.has_return = true` on encountering
    a return statement without considering control flow context causes false negatives
    for the missing-return check.
  line_side: pre_fix
