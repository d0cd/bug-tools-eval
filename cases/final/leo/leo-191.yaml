description: 'Multiple Display implementations had minor formatting issues: TupleExpression
  used an inefficient map+collect+join pattern without spaces after commas, multi-output
  function return types were missing wrapping parentheses, Output::Display unconditionally
  printed the mode even when it was None (producing a leading space), and Composite::Display
  was missing a space before the identifier.'
expected_findings:
- file: compiler/ast/src/expressions/tuple.rs
  line: 35
  summary: 'Inefficient Display: uses `.map(|x| x.to_string()).collect::<Vec<_>>().join(",")`
    instead of `itertools::format`; also missing space after comma separator'
  line_side: pre_fix
- file: compiler/ast/src/functions/mod.rs
  line: 142
  summary: 'Missing parentheses around multi-output return type: `write!(f, " -> {}",
    ...)` should wrap output in `()` for correct tuple return syntax'
  line_side: pre_fix
- file: compiler/ast/src/functions/output.rs
  line: 48
  summary: Output::Display unconditionally prints mode even when Mode::None, producing
    a spurious leading space in the formatted output
  line_side: pre_fix
- file: compiler/ast/src/struct/mod.rs
  line: 138
  summary: 'Missing space before identifier in Composite::Display: `writeln!(f, "{}
    {{", self.identifier)` should be `writeln!(f, " {} {{", self.identifier)`'
  line_side: pre_fix
