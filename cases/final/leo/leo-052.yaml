description: The lexer's `&` handling returned `lexer_empty_input_tendril()` ("expected
  more characters to lex but found none") when encountering `&` not followed by another
  `&`, instead of the correct `lexer_expected_but_found()` error. This produced a
  confusing, misleading error message for users. The fix also refactored `fn eat`
  by extracting `single`, `followed_by`, and `twice` helper closures to eliminate
  duplicated match-arm logic.
expected_findings:
- file: compiler/parser/src/tokenizer/lexer.rs
  line: 172
  summary: 'Wrong error variant: `&` match arm calls `lexer_empty_input_tendril()`
    instead of `lexer_expected_but_found(found, ''&'')` when the next character is
    not `&`, producing a misleading error message'
  line_side: pre_fix
- file: compiler/parser/src/tokenizer/lexer.rs
  line: 229
  summary: 'Code duplication: multiple single-character token arms repeat the same
    `input.next(); Ok((1, Token::X))` pattern — should be extracted into a helper'
  line_side: pre_fix
- file: compiler/parser/src/tokenizer/lexer.rs
  line: 286
  summary: 'Code duplication: `followed_by` pattern (consume char, check next, branch)
    is repeated for `!`, `<`, `>` — should be consolidated'
  line_side: pre_fix
