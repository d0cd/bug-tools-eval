description: The `leo account sign` command exposed a `--seed` flag that allowed users
  to seed the nonce used during signature generation. Reusing or controlling signature
  nonces is a well-known cryptographic vulnerability that can lead to private key
  recovery in Schnorr-based signature schemes. The fix removes the `--seed` flag entirely
  to prevent accidental nonce reuse.
expected_findings:
- file: leo/cli/commands/account.rs
  line: 88
  summary: 'Security: the Sign variant includes a seed parameter that allows user-controlled
    signature nonces, enabling nonce reuse which can leak the private key in Schnorr-type
    signatures'
  line_side: pre_fix
- file: leo/cli/commands/account.rs
  line: 147
  summary: 'Security: seed parameter is destructured and potentially passed to the
    signing function, allowing deterministic/reusable nonces in signature generation'
  line_side: pre_fix
- file: leo/cli/commands/account.rs
  line: 262
  summary: 'Security: seed value is forwarded to the signature computation, undermining
    nonce randomness required for signature security'
  line_side: pre_fix
