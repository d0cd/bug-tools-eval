description: 'Implements abs_checked and abs_wrapped for signed integer circuit literals,
  refactoring div, mul, pow, neg, and shift operations to use the new abs primitives.
  The critical concern is correct ZK constraint enforcement for the I::MIN edge case
  in abs_wrapped (two''s complement: abs(MIN) overflows and must wrap back to MIN),
  which downstream operations (div_checked, div_wrapped, mul_checked) rely upon for
  soundness. Reviewer flagged cleanup issues: macro hygiene, stale naming (''checked''
  vs ''wrapped''), unnecessary trait bounds, and a leftover `absolute` method on IntegerProperties.'
