description: 'The test macro for integer division had two issues: (1) the panic_on_halt
  condition was too broad, triggering whenever the RHS was any constant rather than
  only when both operands are constant or the constant RHS is zero; (2) the value
  sampling did not include the signed integer overflow edge case (MIN / -1). This
  caused tests to incorrectly expect panics for valid division operations.'
expected_findings:
- file: synthesizer/src/program/instruction/operation/macros.rs
  line: 807
  summary: 'Incorrect panic_on_halt condition: `is_division_operator && mode_b.is_constant()`
    panics on any constant RHS, but should only panic when both operands are constant
    OR RHS is constant zero. Should be `is_division_operator && mode_b.is_constant()
    && (mode_a.is_constant() || is_rhs_zero)`.'
  line_side: pre_fix
- file: synthesizer/src/program/instruction/operation/macros.rs
  line: 710
  summary: Test value sampling for integer division does not include the signed-overflow
    edge case (MIN / -1) for signed integer types, missing a critical halting condition.
    Signed types (I8–I128) need a dedicated sample arm that generates this case.
  line_side: pre_fix
- file: synthesizer/src/program/instruction/operation/macros.rs
  line: 788
  summary: 'Overly broad panic condition: `is_division_operator && mode_b.is_constant()`
    should also require `mode_a.is_constant() || is_rhs_zero` — division by a non-zero
    constant with a non-constant LHS is valid and should not panic'
  line_side: pre_fix
- file: synthesizer/src/program/instruction/operation/macros.rs
  line: 713
  summary: Value sampling for signed integer division tests does not include the MIN
    / -1 overflow edge case (e.g. I8::MIN / -1); signed types need a dedicated sampling
    branch that tests this boundary
  line_side: pre_fix
