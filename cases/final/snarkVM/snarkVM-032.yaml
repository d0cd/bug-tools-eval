description: LinearCombination::add_assign used binary_search_by to locate existing
  variables but did not verify the found element matched the search variable when
  duplicates existed. Since binary_search_by does not guarantee which duplicate index
  is returned, different Rust versions (notably 1.51.0 vs 1.52.0) produced different
  R1CS constraint outputs, causing build-time nondeterminism. The fix adds an explicit
  equality check at the found index before updating in place.
expected_findings:
- file: r1cs/src/linear_combination.rs
  line: 91
  summary: 'binary_search_by result not verified: after the deduplication loop, the
    code falls through to Err(found_index) without checking whether the element at
    found_index actually matches search_var. When duplicates exist, binary_search_by
    may return any matching index, so the subsequent insert creates a duplicate entry
    instead of merging coefficients, causing nondeterministic R1CS output across Rust
    versions.'
  line_side: pre_fix
