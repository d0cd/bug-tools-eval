description: The `contains_transaction_id` check used `Result::or()` instead of logical
  OR (`||`) to combine the transaction store lookup with the rejected/aborted transaction
  lookup. `Result::or()` returns the first `Ok` value regardless of its boolean content,
  so if the transaction store returned `Ok(false)`, the rejected/aborted check was
  never evaluated — allowing duplicate rejected/aborted transactions to be accepted.
  The fix consolidates both checks into a single `BlockStore::contains_transaction_id`
  method using proper `||` on the boolean values.
expected_findings:
- file: ledger/src/contains.rs
  line: 58
  summary: 'Incorrect use of `Result::or()` to combine two boolean Result checks:
    `.or()` short-circuits on the first `Ok` value regardless of whether it''s `true`
    or `false`, so `Ok(false).or(Ok(true))` returns `Ok(false)`. Should use `||` on
    unwrapped booleans to correctly check both transaction store and rejected/aborted
    store.'
  line_side: pre_fix
- file: synthesizer/src/vm/verify.rs
  line: 42
  summary: 'Duplicated incorrect pattern: transaction ID uniqueness check manually
    combines `transaction_store().contains_transaction_id()` and `block_store().contains_rejected_or_aborted_transaction_id()`
    with `||`, but this logic should be centralized. The check here is actually correct
    (uses `||`), but the duplication means the ledger''s `contains.rs` version (which
    uses `.or()`) diverges in behavior.'
  line_side: pre_fix
