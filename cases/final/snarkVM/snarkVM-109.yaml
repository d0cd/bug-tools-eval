description: The `G2Prepared::read_le` deserialization method preallocated a `Vec`
  using `Vec::with_capacity()` with a size read directly from untrusted input. A malicious
  payload could specify an enormous capacity value, causing the process to attempt
  a massive memory allocation and crash (denial-of-service). The fix replaces `Vec::with_capacity(num)`
  with `Vec::new()`, removing the attacker-controlled preallocation.
