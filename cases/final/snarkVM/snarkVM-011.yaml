description: Calling `current_block_height` on an empty block store panics because
  the code computes height from `number_of_leaves()` without guarding against the
  zero-leaves case. The fix adds an early check for an empty block store, returning
  a safe value instead of allowing the arithmetic to produce a panic or nonsensical
  result.
expected_findings:
- file: ledger/store/src/block/mod.rs
  line: 1197
  summary: 'Missing empty-store guard: when `number_of_leaves()` is 0, the height
    calculation panics or produces an invalid result. Must check for empty tree before
    computing block height.'
  line_side: pre_fix
- file: ledger/store/src/block/mod.rs
