  line: 387
  summary: 'Missing historical map update in `replace_mapping`: other mutation methods
    (insert, update, remove) trigger `// Update the historical maps.` but this code
    path does not, causing historical queries to return stale or empty results for
    mappings modified through replace_mapping.'
