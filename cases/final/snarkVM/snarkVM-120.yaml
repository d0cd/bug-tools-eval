description: The `hash_many` instruction parser failed to call `Sanitizer::parse_whitespaces`
  between successive operands, causing inputs like `hash_many.psd2 r1 r2 into r3 as
  field` to fail while the concatenated form `r1r2` incorrectly passed. The fix adds
  whitespace-skipping before each operand, consistent with other instruction parsers.
