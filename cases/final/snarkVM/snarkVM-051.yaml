description: Ledger::check_next_block did not verify that the given block's height
  was the direct successor of the latest block. Height was only checked later in Metadata::verify,
  leading to confusing error messages like 'invalid previous state root' when a block
  with a non-sequential height was submitted. Additionally, no guard existed in advance_to_next_block
  against race conditions between checking and advancing.
expected_findings:
- file: ledger/src/check_next_block.rs
  line: 21
  summary: 'Missing early height validation: check_next_block retrieves latest_block
    but does not verify that the incoming block''s height equals latest_block.height()
    + 1 before proceeding with expensive checks.'
  line_side: pre_fix
- file: ledger/src/advance.rs
  line: 91
  summary: 'Missing height re-check before advancing: advance_to_next_block should
    verify the block height still matches the expected next height to guard against
    race conditions between check_next_block and advance_to_next_block.'
  line_side: pre_fix
