description: The `ToBytes` trait for account signature public keys serialized both
  x and y coordinates of an elliptic curve point, whereas `CanonicalSerialize` only
  kept the x coordinate plus a flag bit. This caused a 64-byte transaction size regression.
  The fix introduces a SchnorrCompressed signature variant that compresses the public
  key in `ToBytes` by discarding the y coordinate, which is safe specifically for
  twisted Edwards curves where y can be recovered from x.
