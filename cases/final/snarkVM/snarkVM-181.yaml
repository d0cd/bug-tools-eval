description: The byte serialization of plaintext structs and records used `u8` to
  read/write the number of members/entries, limiting the count to 255 and causing
  incorrect serialization when the count exceeds that range. The fix changes the size
  type (likely to `u16`) for both plaintext and record byte serialization, and regenerates
  the genesis block to match the new encoding.
