    all constraints even though they are not retained)
  line_side: pre_fix
- file: ast/src/leo.pest
  line: 4
  summary: Grammar rule `assignee = { identifier ~ access_assignee* }` only allows
    plain identifiers — `self` keyword cannot appear as an assignee target, so `self.field
    = expr` is unparseable
  line_side: pre_fix
- file: compiler/src/statement/assign/assign.rs
  line: 82
  summary: Assignment to `Assignee::CircuitField` calls `mutute_circuit_variable`
