description: The Varuna SNARK verifier did not validate the number of public inputs
  against the circuit's expected input domain size, allowing callers to pass more
  inputs than the circuit supports. This could cause the verifier to accept invalid
  proofs or produce incorrect verification results — a soundness issue in the proof
  system. The fix adds proper bounds checking and resolves a variable-shadowing bug
  where raw and formatted public inputs were conflated.
expected_findings:
- file: algorithms/src/snark/varuna/varuna.rs
  line: 657
  summary: 'Missing validation: the loop iterates over all provided public inputs
    without checking that the count does not exceed the circuit''s expected number
    of public inputs (vk.circuit_info). An attacker could supply extra inputs to manipulate
    verification.'
  line_side: pre_fix
- file: algorithms/src/snark/varuna/ahp/ahp.rs
  line: 180
  summary: No bounds check on public inputs size before formatting — the code formats
    all provided inputs without verifying count <= input_domain.size(). Additionally,
    variable shadowing causes `public_inputs` to refer ambiguously to both raw and
    formatted inputs.
  line_side: pre_fix
- file: algorithms/src/snark/varuna/ahp/ahp.rs
  line: 283
  summary: Uses `public_inputs[i]` (indexing raw inputs by position) instead of the
    formatted inputs, due to variable shadowing from the closure at line 180. This
    means unformatted/unvalidated inputs are used in the Lagrange evaluation, bypassing
    the admissibility check.
  line_side: pre_fix
