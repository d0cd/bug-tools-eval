description: The Schnorr signature verification gadget casts between G::ScalarField
  and the constraint field F using raw byte serialization (FromBytes::read) without
  any runtime or compile-time check that the two fields share the same modulus. If
  instantiated with mismatched fields, the prover_response and verifier_challenge
  would silently wrap to incorrect values, breaking signature verification soundness.
  Additionally, the verify trait method hardcodes Blake2s as the PRF, limiting genericity.
