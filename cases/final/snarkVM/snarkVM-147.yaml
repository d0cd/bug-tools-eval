  line: 181
  summary: 'Unsafe field cast: ScalarField is reinterpreted as constraint field F
    via FromBytes::read with no modulus compatibility check — silently produces wrong
    values if fields differ, breaking verification soundness'
  line_side: pre_fix
- file: gadgets/src/traits/algorithms/signature.rs
