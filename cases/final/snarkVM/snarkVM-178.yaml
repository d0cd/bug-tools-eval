description: 'The CLI `run` command incorrectly required `--function` and `--inputs`
  long flags due to clap derive attributes added in PR #1583. Additionally, clap''s
  default behavior doesn''t support multiple arguments, so passing multiple inputs
  was impossible. The fix removes the unnecessary clap attributes to restore positional
  argument syntax (`snarkvm run hello 1u32 2u32`).'
