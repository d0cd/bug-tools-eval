description: Multiple `FromBytes` implementations read a `u32` count from untrusted
  input and pass it directly to `Vec::with_capacity()` without upper-bound validation.
  On 32-bit architectures this panics if the value exceeds `i32::MAX`, and on all
  architectures an attacker-controlled allocation size enables denial-of-service.
  The fix adds bounds checks against protocol-defined maximums (e.g. `MAX_SOLUTIONS`,
  `BatchHeader::MAX_TRANSMISSIONS_PER_BATCH`) and tightens the type of `MAX_SOLUTIONS`
  from `usize` to `u16`.
