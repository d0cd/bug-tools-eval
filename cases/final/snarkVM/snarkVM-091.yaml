description: The finalize cost calculation in cost.rs used `.sum()` which does not
  guard against integer overflow. While u16::MAX operations times the most expensive
  operation wouldn't overflow in practice, the accumulation could theoretically wrap
  around and produce an incorrect (lower) cost value. The fix replaces `.sum()` with
  `try_fold` combined with `checked_add` to detect and propagate overflow errors.
expected_findings:
- file: synthesizer/src/vm/helpers/cost.rs
  line: 199
  summary: Using `.sum()` on u64 finalize operation costs does not guard against integer
    overflow; should use `try_fold` with `checked_add` to detect and handle overflow
    instead of silently wrapping.
