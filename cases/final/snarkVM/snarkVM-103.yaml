description: The fee validation in `check_fee_internal` used a strict less-than (`<`)
  instead of less-than-or-equal (`<=`) when comparing against `N::MAX_FEE`. This off-by-one
  error incorrectly rejected transactions whose fee was exactly the maximum allowed
  amount. The fix changes the comparison to `<=` so that the boundary value is accepted.
expected_findings:
- file: synthesizer/src/vm/verify.rs
  line: 258
  summary: 'Off-by-one in fee bound check: `*fee_amount < N::MAX_FEE` should be `*fee_amount
    <= N::MAX_FEE` — a fee exactly equal to MAX_FEE is valid but gets rejected'
