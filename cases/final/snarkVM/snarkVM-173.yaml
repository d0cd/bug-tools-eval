description: The block reward fee computation was incorrect, leading to wrong reward
  calculations for validators. Additionally, a fee check was missing from the transaction
  verification path, allowing transactions with invalid fees to pass validation. The
  fix corrects the block_reward calculation in target.rs, fixes the fee amount methods,
  and adds the missing fee verification in the VM's check_transaction flow.
