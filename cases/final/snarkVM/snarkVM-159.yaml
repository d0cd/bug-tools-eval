description: The Circuit::reset methods (eject_r1cs_and_reset, eject_assignment_and_reset,
  and reset) did not reset the `in_witness` flag to `false`, leaving the circuit in
  an inconsistent state if a reset or rollback occurred while in witness mode. The
  fix adds `IN_WITNESS.with(|in_witness| *(**in_witness).borrow_mut() = false)` to
  all three reset variants.
expected_findings:
- file: circuit/environment/src/circuit.rs
  line: 273
  summary: 'Missing reset of `in_witness` flag in `eject_r1cs_and_reset()`: the CIRCUIT
    cell is replaced but the thread-local `IN_WITNESS` flag is never cleared, so rolling
    back while in witness mode leaves the circuit in an inconsistent state.'
  line_side: pre_fix
- file: circuit/environment/src/circuit.rs
  line: 290
  summary: 'Missing reset of `in_witness` flag in `eject_assignment_and_reset()`:
    same omission as above — circuit state is reset but witness mode persists.'
  line_side: pre_fix
- file: circuit/environment/src/circuit.rs
  line: 306
  summary: 'Missing reset of `in_witness` flag in `reset()`: same omission — `in_witness`
    stays `true` after reset, corrupting subsequent circuit operations.'
  line_side: pre_fix
- file: circuit/environment/src/circuit.rs
  line: 271
  summary: 'Missing reset of `in_witness` flag in `eject_r1cs_and_reset()`: if a rollback
    occurs while in witness mode, `in_witness` remains `true`, leaving the Circuit
    in an inconsistent state where subsequent operations incorrectly treat inputs
    as witnesses.'
  line_side: pre_fix
