description: The `bond_public` function in `credits.aleo` did not check whether the
  caller was a user account or a program when bonding as a validator. A program could
  call `bond_public` with itself as the validator address, staking funds and becoming
  a validator despite being unable to participate in consensus. The fix adds an assertion
  that if `self.caller == validator_address`, then `self.caller == self.signer` (i.e.,
  the caller is a user, not a program).
