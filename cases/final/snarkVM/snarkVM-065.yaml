description: Major architectural refactoring that splits the monolithic inner circuit
  into separate input, output, and value-check proof circuits to support variable
  M-in N-out transitions. The change replaces the fixed 2-in-2-out constraint with
  flexible input/output counts, touching circuit definitions, network configs, transaction
  structures, and serialization tests. As a 'first iteration' by the PR author's own
  admission, the migration may be incomplete.
