description: This PR restructures the inner ZK circuit by making program ID public,
  encoding record members as individual field elements, removing the transition ID
  check, and removing function type checks from the inner circuit. Removing the transition
  ID check and function type checks from the inner circuit reduces constraints significantly
  (~10K) but shifts soundness responsibility — the program ID is added to the signature
  message to compensate for the removed function type checks, but reviewers must verify
  this substitution preserves soundness. The encoding change from aggregate to per-member
  field elements alters the record ciphertext format, which is a breaking change to
  serialization.
expected_findings:
- file: dpc/src/circuits/inner_circuit.rs
  line: 134
  summary: 'Transition ID check removed from inner circuit: verify that soundness
    is preserved and that no unconstrained path allows a malicious prover to substitute
    a different transition'
  line_side: pre_fix
- file: algorithms/src/encryption/ecies_poseidon.rs
  line: 220
  summary: 'Record ciphertext encoding changed to per-member field elements: ensure
    the new encoding is injective (no two distinct record payloads map to the same
    ciphertext) to prevent record malleability'
  line_side: pre_fix
- file: dpc/src/circuits/inner_public_variables.rs
  line: 20
  summary: 'Program ID exposed as public input: confirm the circuit enforces that
    the declared program ID matches the actual program being executed, otherwise a
    prover could claim a different program ID'
  line_side: pre_fix
- file: dpc/src/circuits/inner_circuit.rs
  line: 59
  summary: Function type checks removed from inner circuit and replaced by including
    program ID in the signature message. Confirm the signature verification in the
    circuit actually includes the program ID field — if the signature message construction
    omits it, function type is no longer verified anywhere.
  line_side: pre_fix
