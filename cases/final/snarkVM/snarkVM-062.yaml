description: The `Bech32ID` and `Bech32Object` traits required `Borrow<F>`, which
  allowed map operations to accept raw fields instead of their strongly-typed wrappers
  (e.g. `StateRoot`, `BlockHash`, `TransactionID`, `TransitionID` were all interchangeable
  as bare fields). This type leniency meant map lookups could silently use the wrong
  key type, producing incorrect results. The fix removes the `Borrow<F>` bound and
  updates call sites to use the wrapper types directly.
