description: The Merkle tree implementation used `next_power_of_two()` instead of
  `checked_next_power_of_two()` in five call sites across `new`, `append`, `prove`,
  and `leaf_hashes`. The unchecked version panics in debug mode and silently returns
  0 in release mode when the next power of two overflows `usize`, causing incorrect
  tree construction or memory corruption with very large leaf counts. The fix replaces
  all calls with `checked_next_power_of_two()` and propagates overflow errors via
  `bail!`.
expected_findings:
- file: console/collections/src/merkle_tree/mod.rs
  line: 59
  summary: Uses unchecked `next_power_of_two()` which panics in debug or returns 0
    in release on overflow — should use `checked_next_power_of_two()` with error handling.
  line_side: pre_fix
- file: console/collections/src/merkle_tree/mod.rs
  line: 118
  summary: Same unchecked `next_power_of_two()` in `append` — integer overflow on
    large leaf counts silently produces 0, leading to incorrect tree size and out-of-bounds
    access.
  line_side: pre_fix
- file: console/collections/src/merkle_tree/mod.rs
  line: 134
  summary: Unchecked `next_power_of_two()` used to compute precompute index — overflow
    causes wrapping to 0 then underflow on `- 1`, corrupting tree traversal.
  line_side: pre_fix
