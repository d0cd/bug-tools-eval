description: CircuitVerifyingKey derived CanonicalDeserialize without bounding the
  length of the circuit_commitments vector, allowing a malicious deserializer input
  to specify an arbitrarily large length and exhaust memory (denial of service). The
  fix replaces the derived deserialization with a custom implementation that caps
  circuit_commitments at 12 elements (3 matrices × 4 polynomials per Varuna protocol).
expected_findings:
- file: algorithms/src/snark/varuna/data_structures/circuit_verifying_key.rs
  line: 28
  summary: CanonicalDeserialize is derived here without bounding the length of the
    circuit_commitments Vec, allowing malicious input to trigger unbounded memory
    allocation during deserialization.
  line_side: pre_fix
- file: algorithms/src/snark/varuna/data_structures/circuit_verifying_key.rs
  line: 38
  summary: The circuit_commitments field is deserialized as an unbounded Vec; a crafted
    payload can specify an enormous length prefix to exhaust memory (DoS).
  line_side: pre_fix
