description: RocksDB write batches were only atomic within a single DataMap. When
  multiple DataMaps participated in an atomic scope, each independently created and
  flushed its own WriteBatch, so a crash between writes could leave the database in
  a partially-committed, inconsistent state. The fix introduces a shared WriteBatch
  on the RocksDB struct with depth tracking, deferring the physical write until the
  outermost atomic scope completes.
expected_findings:
- file: ledger/store/src/helpers/rocksdb/internal/mod.rs
  line: 64
  summary: Atomic write batch is scoped per-DataMap rather than shared across all
    maps; concurrent readers can observe partial cross-map writes because each DataMap
    flushes its own WriteBatch independently
  line_side: pre_fix
- file: ledger/store/src/helpers/rocksdb/internal/map.rs
  line: 89
  summary: DataMap performs its own atomic write without coordinating with sibling
    DataMaps; checkpoint/rollback logic only tracks operations within this single
    map, missing operations queued in other maps within the same logical transaction
  line_side: pre_fix
- file: ledger/store/src/helpers/rocksdb/internal/map.rs
  line: 187
  summary: 'Non-atomic cross-map writes: each DataMap independently calls `self.database.rocksdb.write(batch)`
    in `finish_atomic()`. If multiple DataMaps participate in a logical atomic operation,
    a crash between individual writes leaves the database in an inconsistent state.
    The WriteBatch should be accumulated in a shared location and written only once.'
  line_side: pre_fix
- file: ledger/store/src/helpers/rocksdb/internal/map.rs
  line: 176
  summary: Per-map `WriteBatch::default()` created in `finish_atomic()` means each
    map gets its own batch rather than contributing to a single cross-map atomic batch.
    This breaks the atomicity guarantee when multiple DataMaps are involved in a single
    logical transaction.
  line_side: pre_fix
- file: ledger/store/src/helpers/rocksdb/internal/map.rs
  line: 90
  summary: '`start_atomic()` does not track nesting depth across DataMaps. Without
    a shared depth counter, `finish_atomic()` cannot determine whether it is the outermost
    scope that should trigger the actual write, causing each map to write independently.'
  line_side: pre_fix
