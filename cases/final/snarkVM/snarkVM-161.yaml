description: A constant `POWERS_OF_ROOTS_OF_UNITY` in `curves/src/edwards_bls12/fr.rs`
  is defined with `unimplemented!()` as its value. While this doesn't affect runtime
  tests (the constant is never evaluated in test paths), `cargo doc` attempts to evaluate
  all constants during documentation generation, causing a compilation failure. The
  fix adds `#[doc(hidden)]` to exclude this constant from documentation.
