description: 'Merkle path verification gadget is explicitly incomplete: the CRH is
  hard-coded to Poseidon only (needs generalization to Pedersen/BHP), verify() returns
  the wrong type instead of Boolean<E>, and an endianness-unaware .to_bytes() is used
  where .to_bits_le() is required. Code organization also needs splitting into separate
  to_root.rs and verify.rs files.'
expected_findings:
- file: circuits/types/field/src/lib.rs
  line: 170
  summary: "Endianness-unsafe `.to_bytes()` used for field element conversion; must\
    \ use `.to_bits_le()` instead \u2014 `.to_bytes()` has no notion of endianness\
    \ and can produce incorrect Merkle hashes on different platforms."
  line_side: pre_fix
- file: circuits/core/src/merkle_path/mod.rs
  line: 140
  summary: '`verify()` should return `Boolean<E>` to allow the caller to compose the
    result in a circuit, but currently returns a different type or asserts internally.'
  line_side: pre_fix
- file: circuits/core/src/merkle_path/mod.rs
  line: 73
  summary: Merkle path `to_root` implementation is hard-coded to Poseidon CRH with
    unnecessary byte-to-field padding; needs generalization to support Pedersen/BHP
    hash functions and native field-element inputs.
  line_side: pre_fix
