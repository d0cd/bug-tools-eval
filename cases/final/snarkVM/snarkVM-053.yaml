description: The `shl_checked` implementation for signed integers incorrectly rejected
  valid shift-left operations. For example, `-1i8 << 7u8` should yield `-128i8` (a
  valid i8 value), but the intermediate computation `2^7 = 128` overflows i8, causing
  a spurious failure. The fix replaces num_traits' `CheckedShl` with a custom trait
  that computes the power as unsigned, then handles the signed MIN edge case, and
  updates both the circuit and VM test validation accordingly.
expected_findings:
- file: circuit/types/integers/src/shl_checked.rs
  line: 69
  summary: 'Missing signed/unsigned distinction in shl_checked: computes `base.pow_checked(rhs)`
    as signed, causing spurious overflow when shift result is the minimum signed value
    (e.g., -1i8 << 7 = -128i8 is valid but 2^7 overflows i8)'
  line_side: pre_fix
- file: console/types/integers/src/bitwise.rs
  line: 154
  summary: Uses num_traits CheckedShl which delegates to Rust's bitwise shift semantics;
    does not handle the signed edge case where the shift result equals the minimum
    signed value
  line_side: pre_fix
- file: vm/compiler/src/program/instruction/operation/macros.rs
  line: 729
  summary: Test validation uses Rust's `checked_shl` which has different semantics
    than the intended ZK checked_shl; incorrectly marks valid signed shift-left operations
    as failures
  line_side: pre_fix
