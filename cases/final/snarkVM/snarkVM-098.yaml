description: CommitInstruction::new fails to validate the destination register's type,
  allowing potentially invalid destination types for commit operations. Additionally,
  the FromBytes implementation constructs the instruction via struct literal instead
  of delegating to ::new(), completely bypassing any validation the constructor should
  provide.
expected_findings:
- file: synthesizer/program/src/logic/instruction/operation/commit.rs
  line: 67
  summary: "Missing destination type validation in CommitInstruction::new \u2014 after\
    \ checking operand count, should call is_valid_destination_type() and bail if\
    \ invalid before constructing Self"
  line_side: pre_fix
- file: synthesizer/program/src/logic/instruction/operation/commit.rs
  line: 326
  summary: "FromBytes constructs CommitInstruction via struct literal (Ok(Self { operands,\
    \ destination, destination_type })) bypassing ::new() validation \u2014 should\
    \ delegate to Self::new() to ensure destination type is checked on deserialization"
  line_side: pre_fix
