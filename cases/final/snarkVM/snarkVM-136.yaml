description: Identifier validation in `from_str` was too permissive, using Unicode
  `is_alphabetic()`/`is_alphanumeric()` instead of ASCII-only equivalents. This allowed
  Unicode homoglyph characters, identifiers starting with underscores, and empty strings
  to pass validation, diverging from the stricter nom parser path. The fix tightens
  all checks to ASCII-only and requires identifiers to start with a letter.
expected_findings:
- file: console/program/src/data/identifier/parse.rs
  line: 37
  summary: First-character validation uses `is_numeric()` negation which permits Unicode
    alphabetic chars and underscores. Should use `is_ascii_alphabetic()` to require
    an ASCII letter, matching the nom parser.
  line_side: pre_fix
- file: console/program/src/data/identifier/parse.rs
  line: 40
  summary: Remaining-character validation uses `is_alphanumeric()` (Unicode-aware)
    instead of `is_ascii_alphanumeric()`. Allows non-ASCII Unicode letters/digits
    through, creating a divergence with the nom parser and potential homoglyph confusion.
  line_side: pre_fix
