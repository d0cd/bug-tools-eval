description: Group::new was previously unchecked, meaning injected group points were
  not enforced to be on the curve and in the correct subgroup—a potential ZK soundness
  issue. The fix makes Group::new checked by default, adds E::assert_neq for efficient
  inequality constraints, and introduces Field::div_unchecked to preserve performance
  in BHP hashing where the divisor is known non-zero.
expected_findings:
- file: circuit/types/group/src/lib.rs
  line: 56
  summary: Group::new injects points without enforcing they are on the curve and in
    the correct subgroup; an adversary could supply an invalid group element, breaking
    circuit soundness.
  line_side: pre_fix
- file: circuit/types/field/src/div.rs
  line: 57
  summary: Field::div implementation does not efficiently assert the divisor is non-zero
    before computing the inverse; the clippy::suspicious_op_assign_impl allow hint
    suggests the division logic may not match standard field division semantics.
  line_side: pre_fix
- file: circuit/types/group/src/helpers/from_xy_coordinates.rs
  line: 18
  summary: from_xy_coordinates documents that the point should be enforced on the
    curve, but the prior implementation may not have enforced this for all modes,
    allowing unchecked group elements into the circuit.
  line_side: pre_fix
- file: circuit/types/field/src/div_unchecked.rs
  line: 1
  summary: New div_unchecked skips the assert_neq(divisor, zero) constraint. If ever
    called with a potentially-zero divisor outside the BHP context, the circuit becomes
    unsound — division by zero yields an unconstrained witness.
  line_side: pre_fix
