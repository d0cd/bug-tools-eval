description: The GET /testnet3/program/{program_id} endpoint did not handle the built-in
  `credits.aleo` program, which is not stored in the ledger's program storage but
  is a special built-in program. Requesting it returned an error instead of the program
  definition. The fix adds a special case to return `Program::credits()` when `credits.aleo`
  is requested.
