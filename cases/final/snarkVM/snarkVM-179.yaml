description: The BHP circuit gadget in the field arithmetic implementation (fp.rs)
  generated more non-zero entries than necessary in the R1CS constraint system. By
  optimizing how BigInteger operations are expressed as constraints, the inner circuit
  non-zero entries were reduced from ~538k to ~475k, yielding a 17% speedup in Marlin
  proving time.
