description: The coinbase solution processing pipeline did not filter out aborted
  solutions before block creation. This meant that solutions marked for abortion could
  be included in new blocks, leading to invalid blocks or consensus issues. The fix
  adds an aborted-solution filter to CoinbaseSolution and propagates it through verification
  and block advancement paths.
