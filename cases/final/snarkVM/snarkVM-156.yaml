description: The inclusion proof logic was using the global state path instead of
  the local transition path when computing inclusion proofs for transitions. This
  could cause proof verification failures or soundness issues, as the wrong Merkle
  path was being used to verify transition membership. The fix updates the path derivation
  in both execute and fee inclusion to use the local transition path.
