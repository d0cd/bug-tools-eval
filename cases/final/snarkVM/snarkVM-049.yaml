description: The Blake2Xs XOF round calculation had an incorrect ceiling-division
  formula for computing the number of 32-byte Blake2s blocks needed to produce the
  requested digest length. The fix corrects the arithmetic to `xof_digest_length.saturating_add(31)
  / 32`, which is the standard ceiling-division idiom, ensuring the correct number
  of hash rounds are performed.
