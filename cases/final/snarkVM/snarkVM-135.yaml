description: Race condition in Ledger where concurrent calls to prepare_next_beacon_block
  and advance_to_next_block can read inconsistent state — the block height from one
  state and the state_root from another — producing an invalid block that passes superficial
  checks. The fix makes ledger reads atomic by acquiring a lock that prevents partial/inconsistent
  reads across concurrent operations.
expected_findings:
- file: ledger/src/lib.rs
  line: 133
  summary: Ledger implements Sync but prepare_next_beacon_block reads current_block
    and state_root in separate non-atomic steps, allowing a concurrent advance_to_next_block
    to update state between reads, producing a block with mismatched height and state_root.
  line_side: pre_fix
- file: ledger/src/advance.rs
  line: 21
  summary: advance_to_next_block mutates current_block and state_root without holding
    a read-side lock that would block concurrent prepare calls, enabling a TOCTOU
    race where readers see partially-updated ledger state.
  line_side: pre_fix
