description: The `transfer_public` benchmark in `transaction.rs` used a hardcoded
  base fee that was too low for the execution cost, causing a panic on `unwrap()`
  when the fee validation failed. The fix increases the base fee constant passed to
  `authorize_fee_public` so it meets the minimum required microcredits for the transaction.
