description: The REST query client automatically detected whether the base URL contained
  an API version string and appended '/v2' if it did not. After backwards compatibility
  was added to REST API v1 (which remains the default), this forced version appending
  caused incorrect API routing by overriding the intended default version. The fix
  removes the automatic version detection and appending logic from the constructors.
expected_findings:
- file: ledger/query/src/query/rest.rs
