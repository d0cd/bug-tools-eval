description: During block deserialization, bounds checks existed for transactions,
  aborted transaction IDs, and aborted solution IDs, but the check for the number
  of solutions was missing. An attacker could craft a malicious block with an out-of-bounds
  solution count, potentially causing excessive memory allocation or denial of service
  during deserialization.
expected_findings:
- file: ledger/puzzle/src/solutions/bytes.rs
  line: 20
  summary: 'Missing bounds check: the number of solutions read from the byte stream
    is not validated against the maximum before deserializing, unlike other collection
    fields in block deserialization'
  line_side: pre_fix
- file: ledger/block/src/bytes.rs
  line: 36
  summary: Missing deserialization bounds check for solutions count before reading
    solution items, inconsistent with the checks applied to transactions and aborted
    IDs
  line_side: pre_fix
