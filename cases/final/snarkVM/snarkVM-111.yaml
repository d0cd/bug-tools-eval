description: The finalize logic incorrectly selects the transition ID corresponding
  to a Future operand passed to an `await` command. While the call graph is constructed
  correctly, it is traversed unsoundly to find the child transition ID used to initialize
  FinalizeRegisters, which seeds the RNG for on-chain `rand` instructions. This can
  result in non-unique or incorrect RNG seeds across finalize invocations. The fix
  introduces a nonce-based approach gated behind CONSENSUS_V3_HEIGHT to ensure unique
  seeding.
