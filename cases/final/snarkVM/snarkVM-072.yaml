description: The test `test_load_deployments_with_imports` used a non-deterministic
  RNG seed, causing the lexicographical ordering of `deployment_transaction_ids()`
  to sometimes align with the sequential deployment order. This meant the test would
  intermittently fail to exercise the recursive loading of import programs before
  parent programs, making it a flaky test. The fix pins the RNG seed to guarantee
  the ordering exercises the intended code path.
