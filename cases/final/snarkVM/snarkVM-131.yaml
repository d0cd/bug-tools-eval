description: The committee member sorting comparator in `sorted_members()` included
  the `is_open` boolean flag in the comparison by not destructuring the `(u64, bool)`
  tuple. When validators had equal stake, the `is_open` flag could influence ordering,
  making committee ordering non-deterministic and not SNARK-friendly. The fix destructures
  to `(stake, _)` to ignore `is_open`.
expected_findings:
- file: ledger/committee/src/lib.rs
  line: 201
  summary: sorted_unstable_by closure receives full (u64, bool) tuples as stake1/stake2
    instead of destructuring to (stake, _); the is_open flag is silently included
    in cmp comparisons, causing non-deterministic committee ordering when stakes are
    equal
  line_side: pre_fix
