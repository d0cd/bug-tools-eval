description: 'The CUDA implementation of MSM (Multi-Scalar Multiplication) in `blst_p1_add_affines_into_projective`
  failed to handle edge cases in elliptic curve point addition: specifically when
  one or both input points are the identity (zero point), or when the two points are
  equal (requiring doubling) or inverses (resulting in identity). The fix adds proper
  checks for these degenerate cases in the CUDA kernel and updates the compiled PTX
  files accordingly.'
