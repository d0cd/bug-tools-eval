description: When executing closures in the snarkVM synthesizer, only circuit-level
  caller, signer, and tvk were being set on the registers, but the console-level (plain
  value) equivalents were not. This meant closures could not resolve `self.caller`
  or `self.signer` at the console level. The fix adds `set_signer`, `set_caller`,
  and `set_tvk` calls using `eject_value()` before the existing circuit assignments.
expected_findings:
- file: synthesizer/process/src/stack/execute.rs
  line: 48
  summary: 'Missing console-level caller and signer assignment before closure execution:
    only circuit-level values are set via `set_signer_circuit`/`set_caller_circuit`,
    but `set_signer`/`set_caller`/`set_tvk` are never called, so closures cannot resolve
    `self.caller` or `self.signer` at the console level.'
  line_side: pre_fix
- file: synthesizer/process/src/stack/execute.rs
  line: 69
  summary: 'Missing `set_tvk()` call alongside `set_tvk_circuit()`: the transition
    view key is only available as a circuit value, not as a console value, which breaks
    console-level evaluation in closures.'
  line_side: pre_fix
