description: Deployment verification randomly generates inputs to execute the program
  and check that certificates match the assignment structure. The RNG was not deterministically
  seeded, so the verifier could generate different random inputs than the deployer,
  causing valid deployments to fail verification non-deterministically. The fix seeds
  the RNG deterministically (via rand_chacha) so both sides produce identical inputs.
expected_findings:
- file: synthesizer/process/src/stack/deploy.rs
  line: 93
  summary: RNG used for input generation during deployment is not deterministically
    seeded; verifier will produce different random inputs, causing certificate mismatch
    and spurious verification failures.
  line_side: pre_fix
- file: synthesizer/process/src/stack/deploy.rs
  line: 117
  summary: Same non-deterministic RNG issue on the verification path; must use identically-seeded
    RNG to reproduce the deployer's random inputs.
  line_side: pre_fix
- file: synthesizer/process/src/stack/deploy.rs
  line: 160
  summary: Third RNG creation site lacking deterministic seed; all three sites must
    share the same seeding strategy for deployment/verification consistency.
  line_side: pre_fix
