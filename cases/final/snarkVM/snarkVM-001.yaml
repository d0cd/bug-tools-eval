description: In `VM::atomic_speculate`, `enumerate` was used to assign indices to
  `ConfirmedTransaction`s, producing sequential indices (0, 1, 2…) that don't account
  for aborted transactions creating gaps. This caused `VM::check_speculate` to fail
  with mismatched transaction indices. The fix replaces `enumerate` with an explicit
  counter that only increments for confirmed (non-aborted) transactions.
expected_findings:
- file: synthesizer/src/vm/finalize.rs
  line: 207
  summary: 'Using `enumerate` to derive ConfirmedTransaction indices is incorrect:
    when a transaction is aborted and skipped, `enumerate` still advances, causing
    subsequent confirmed transactions to receive wrong indices. Replace with an explicit
    counter that increments only on successful confirmation.'
  line_side: pre_fix
- file: synthesizer/src/vm/finalize.rs
  line: 301
  summary: The confirmed transaction index from `enumerate` is used without adjustment
    when a transaction succeeds, but no compensating increment/skip logic exists for
    aborted transactions, so all indices after an abort are off by the number of prior
    aborts.
  line_side: pre_fix
