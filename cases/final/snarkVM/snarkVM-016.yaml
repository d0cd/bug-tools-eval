description: The monolithic check_next_block method lacked support for validating
  blocks whose predecessors hadn't been committed yet (pending blocks), and had no
  lock guarding concurrent block advancement/speculation. The fix splits validation
  into check_block_subdag (DAG structure) and check_block_content (header/transactions),
  introduces a PendingBlock wrapper type, adds a block_advancement_lock mutex, and
  makes solution-ID and subdag-leaf checks aware of pending block sequences.
