description: Major DPC model upgrade that restructures state transitions (noop, add,
  remove, update, split, join, joinsplit), simplifies serial number nonce derivation
  to use the previous record's serial number, reduces outer circuit from 4 proofs
  to 1, and adds enforcement that input program IDs match output program IDs or the
  noop program ID for each record pair. Also updates PoSW Merkle tree depth from a
  higher value to 3 and adds metadata to block header leaves.
expected_findings:
- file: dpc/src/circuits/inner_circuit.rs
  line: 58
  summary: 'Inner circuit constraint changes: verify that program ID matching enforcement
    (input program ID == output program ID || noop program ID) is correctly constrained
    for every (input, output) record pair to prevent soundness issues'
  line_side: pre_fix
- file: dpc/src/circuits/outer_circuit.rs
  line: 84
  summary: 'Outer circuit reduced from 4 proof verifications to 1: verify the single
    proof verification correctly covers all cases previously handled by 4 separate
    proofs, as missing any case would be a soundness vulnerability'
  line_side: pre_fix
- file: dpc/src/dpc.rs
  line: 60
  summary: "State transition refactor: serial number nonce now derived from previous\
    \ record's serial number \u2014 verify this does not allow nonce collisions or\
    \ replay attacks when records are split/joined across transitions"
  line_side: pre_fix
- file: dpc/src/circuits/outer_public_variables.rs
  line: 33
  summary: "program_id set to None in outer public variables \u2014 confirm this does\
    \ not weaken soundness by allowing arbitrary program IDs to pass outer circuit\
    \ verification after program commitment removal"
  line_side: pre_fix
