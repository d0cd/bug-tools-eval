  summary: 'Hardcoded type parameter: `Transactions::<console::network::Testnet3>::MAX_TRANSACTIONS`
    should use the generic `N` (`Transactions::<N>::MAX_TRANSACTIONS`) so the LRU
    cache capacity is correct for all network types, not just Testnet3.'
