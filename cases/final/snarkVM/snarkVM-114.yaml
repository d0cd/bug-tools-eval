description: The LRU cache capacity for `partially_verified_transactions` was hardcoded
  to use `Transactions::<console::network::Testnet3>::MAX_TRANSACTIONS` instead of
  the generic network type parameter `N`. This means on any network other than Testnet3,
  the cache would be sized incorrectly, potentially causing eviction issues or wasted
  memory.
expected_findings:
- file: synthesizer/src/vm/mod.rs
