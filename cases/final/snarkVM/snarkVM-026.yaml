description: 'DeployRequest''s Serialize impl only serialized the `deployment` field,
  omitting `address` and `program_id`, so the struct was incomplete when sent over
  the wire. DeployResponse''s Deserialize impl read from the wrong JSON key (`program_id`
  instead of `deployment`), causing deserialization to fail. Both bugs were introduced
  in PR #1000 when the deploy request/response types were added.'
