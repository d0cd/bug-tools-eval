description: JSON serialization via serde_json uses HashMap internally by default,
  which does not preserve key insertion order. When Deployment transactions were serialized
  and deserialized, the ordering of keys could change, causing transaction verification
  to fail. The fix enables the `preserve_order` feature on serde_json (which switches
  to IndexMap) across all workspace crates.
