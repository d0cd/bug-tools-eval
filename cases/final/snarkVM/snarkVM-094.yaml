description: The `check_instruction_opcode` function incorrectly used `Identifier::from_str`
  to validate opcodes, but `Identifier` requires alphanumeric characters only. Since
  many valid instruction opcodes contain dots (e.g., `is.eq`, `add.w`), this caused
  all programs using such instructions to fail during `Package::build`. The fix removes
  the `Identifier::from_str` call and validates opcodes directly with `Self::is_reserved_opcode`.
