description: The TokenIntrospectionEndpoint reflects unsanitized user input from the
  `token_type_hint` parameter directly into the error response message. This enables
  potential log injection, header injection, or XSS in downstream systems that render
  the error_description field. The fix replaces the dynamic string with a static error
  message and logs the raw value server-side via event.detail().
