description: Docker image builds for the Keycloak operator were slow or failing because
  the `--ulimit nofile` flag was not passed to `docker build` commands. A previous
  fix (#44233) tried to work around this by embedding `ulimit` calls inside Dockerfile
  `RUN` commands, which was fragile. This PR moves the ulimit setting to the build
  command level via `--ulimit nofile=1024000` in scripts and `quarkus.docker.additional-args`
  in application.properties, and also fixes an incorrect script path and missing `--cpus=max`
  in the README.
expected_findings:
- file: operator/scripts/olm-testing.sh
  line: 20
  summary: docker build command missing `--ulimit nofile=1024000` flag, causing potentially
    very slow `dnf install` steps due to low default file descriptor limits
  line_side: pre_fix
- file: operator/src/main/resources/application.properties
  line: 31
  summary: Missing `quarkus.docker.additional-args=--ulimit,nofile=1024000` property
    — operator image builds inherit the Docker daemon's default ulimit which may be
    too low, causing slow dnf operations
  line_side: pre_fix
