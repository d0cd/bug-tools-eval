description: The Infinispan single-use object provider methods incorrectly interpreted
  cache API return values. In Infinispan's cache API, `putIfAbsent` returns null on
  success (key was absent) and the existing value on failure (key already present),
  but the code was treating non-null returns as success. Similarly, `remove` return
  value semantics were mishandled, leading to incorrect boolean results for operations
  like token consumption.
