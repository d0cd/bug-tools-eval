  line: 51
  summary: 'Incorrect interpretation of putIfAbsent return value: null means success
    (key was absent), non-null means key already existed. The boolean logic derived
    from this return value is inverted.'
  line_side: pre_fix
- file: model/infinispan/src/main/java/org/keycloak/models/sessions/infinispan/InfinispanSingleUseObjectProvider.java
  line: 66
  summary: Return value of cache remove/replace operation is misinterpreted, causing
    single-use token operations to report wrong success/failure status.
  line_side: pre_fix
