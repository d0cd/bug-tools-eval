description: Dynamic URI path segments (client IDs, session IDs, resource IDs, credential
  IDs) were interpolated directly into API endpoint URLs without calling encodeURIComponent().
  This means special characters in these values could break requests or enable path
  traversal. The fix wraps all dynamic URI segments with encodeURIComponent() across
  seven Account Console page components.
expected_findings:
- file: themes/src/main/resources/theme/keycloak.v2/account/src/app/content/applications-page/ApplicationsPage.tsx
  line: 100
  summary: clientId is interpolated into the URL path without encodeURIComponent();
    special characters could corrupt the request or allow path manipulation
  line_side: pre_fix
- file: themes/src/main/resources/theme/keycloak.v2/account/src/app/content/my-resources-page/ResourcesTable.tsx
  line: 91
  summary: resource._id is interpolated into URL path without URI encoding; same missing
    encodeURIComponent() pattern repeated across multiple files
  line_side: pre_fix
- file: themes/src/main/resources/theme/keycloak.v2/account/src/app/content/signingin-page/SigningInPage.tsx
  line: 147
  summary: credentialId concatenated into URL path without encodeURIComponent(); user-influenced
    values in URI paths must be encoded
  line_side: pre_fix
