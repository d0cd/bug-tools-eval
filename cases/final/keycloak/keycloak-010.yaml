description: Environment properties in Keycloak's Quarkus configuration layer were
  not recognized as user-modifiable. The Configuration class explicitly skipped validation
  of env-sourced properties under the assumption users wouldn't specify them, and
  KeycloakPropertiesConfigSource did not properly treat EnvConfigSource entries as
  user-provided configuration. This caused downstream issues where env-based overrides
  were silently ignored or not validated.
expected_findings:
- file: quarkus/runtime/src/main/java/org/keycloak/quarkus/runtime/configuration/Configuration.java
  line: 51
  summary: Environment-sourced properties are excluded from user-modifiable validation
    with an incorrect assumption that users won't specify them via env vars. Env vars
    are a standard user configuration mechanism and should be treated as user-modifiable.
  line_side: pre_fix
- file: quarkus/runtime/src/main/java/org/keycloak/quarkus/runtime/configuration/KeycloakPropertiesConfigSource.java
  line: 31
  summary: EnvConfigSource handling does not mark properties from environment variables
    as user-modifiable, causing them to be treated as internal/system properties rather
    than user-supplied configuration.
  line_side: pre_fix
