description: XML/SAML signature verification fails on certain JDK versions due to
  changed linebreak handling in Base64-encoded signatures. The JDK and Apache Santuario
  libraries changed default behavior around linebreaks in XML digital signatures (JDK-8264194,
  SANTUARIO-482), breaking SAML authentication flows. The fix sets the system properties
  'com.sun.org.apache.xml.internal.security.ignoreLineBreak' and the Apache equivalent
  to ensure consistent signature validation.
expected_findings:
- file: saml-core/src/main/java/org/keycloak/saml/common/util/SystemPropertiesUtil.java
  line: 32
  summary: Missing system property configuration for ignoring linebreaks in XML signature
    Base64 encoding. Both the OpenJDK internal property (com.sun.org.apache.xml.internal.security.ignoreLineBreak)
    and the Apache Santuario property (org.apache.xml.security.ignoreLineBreaks) must
    be set to 'true' to prevent signature verification failures across JDK versions.
  line_side: pre_fix
