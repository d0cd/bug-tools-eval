  line: 35
  summary: 'Missing X-Forwarded-Prefix option: the proxy options define forwarding
    support for Host, Port, Proto, and For headers but omit Prefix, leaving context-path
    resolution unsupported when behind a path-rewriting reverse proxy.'
  line_side: pre_fix
- file: quarkus/runtime/src/main/java/org/keycloak/quarkus/runtime/configuration/mappers/ProxyPropertyMappers.java
