description: The Keycloak admin client did not handle `FormData` payloads correctly.
  When a request payload was a `FormData` instance, the agent would likely JSON-stringify
  it or set an incorrect `Content-Type` header, causing the server to reject the request.
  The fix adds an `instanceof FormData` check to bypass JSON serialization and let
  the browser/runtime set the correct multipart boundary header.
expected_findings:
- file: js/libs/keycloak-admin-client/src/resources/agent.ts
  line: 209
  summary: 'Missing FormData handling: when payload is a FormData instance, the agent
    must not JSON-stringify it and must omit the Content-Type header so the runtime
    sets the correct multipart boundary automatically'
  line_side: pre_fix
- file: js/libs/keycloak-admin-client/src/resources/clients.ts
  line: 979
  summary: The uploadKey method needs to send its payload as FormData, but the underlying
    agent request pipeline lacks FormData support, causing the upload to send a malformed
    or incorrectly serialized body
  line_side: pre_fix
