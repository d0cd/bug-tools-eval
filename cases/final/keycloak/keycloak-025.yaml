description: The `useFetch()` hook instantiates a new `AbortController` on every call
  (i.e., every render) rather than inside the `useEffect` callback. This means the
  controller referenced in the effect's cleanup function is not the same one passed
  to the fetch request, so calling `abort()` on unmount or dependency change never
  actually cancels the in-flight request. Moving the `AbortController` construction
  inside the effect ensures the cleanup closes over the correct instance.
expected_findings:
- file: js/apps/admin-ui/src/context/auth/AdminClient.tsx
  line: 38
  summary: AbortController is instantiated outside the effect on every render. It
    must be created inside the useEffect callback so the cleanup function's `abort()`
    targets the same controller instance passed to the fetch call.
  line_side: pre_fix
