description: The KeyValueInput component did not handle the empty state correctly
  — when no attributes were defined, it rendered a row with empty values instead of
  an empty state, causing UI issues and potentially triggering errors when interacting
  with the empty row. The key-value-convert utility also failed to properly handle
  empty or undefined attribute arrays during conversion, leading to unexpected form
  state.
expected_findings:
- file: js/apps/admin-ui/src/components/key-value-form/key-value-convert.ts
  line: 22
  summary: keyValueToArray/arrayToKeyValue does not guard against empty or undefined
    input, producing malformed form state when no attributes exist
  line_side: pre_fix
- file: js/apps/admin-ui/src/components/key-value-form/KeyValueInput.tsx
  line: 2
  summary: Component renders an empty key-value row when the attributes array is empty
    instead of showing an empty state; should check for zero entries and render EmptyState
    component
  line_side: pre_fix
- file: js/apps/admin-ui/src/components/multi-line-input/MultiLineInput.tsx
  line: 85
  summary: MultiLineInput has the same empty-entry pattern — field name indexing assumes
    at least one row exists, no empty state guard
  line_side: pre_fix
