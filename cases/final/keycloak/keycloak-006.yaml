description: The usePromise() hook awaited a Promise from the factory without a try-catch,
  so any rejection (including AbortError on unmount) became an unhandled promise rejection.
  The fix wraps the await in try-catch, silences AbortError (expected on unmount/dep
  change), and rethrows other errors.
expected_findings:
- file: js/apps/account-ui/src/utils/usePromise.ts
  line: 55
  summary: 'Unhandled promise rejection: `await factory(signal)` is not wrapped in
    try-catch, so if the Promise rejects (e.g. network error or AbortError on unmount),
    the error is never caught, causing an unhandled rejection that may crash the app
    or silently fail.'
  line_side: pre_fix
- file: js/apps/account-ui/src/utils/usePromise.ts
  line: 57
  summary: 'Incorrect abort guard: checking `signal.aborted` after awaiting only prevents
    calling `callback` on abort, but does not catch the AbortError exception that
    rejected Promises throw, leading to unhandled rejections on component unmount.'
  line_side: pre_fix
