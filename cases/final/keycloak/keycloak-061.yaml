description: EmbeddedKeycloakServer did not handle `dependencyCurrentProject()` dependencies
  correctly. It always resolved versions via `Maven.getArtifact()`, which fails for
  artifacts from the current Maven module that haven't been published to any repository.
  The fix extracts dependency resolution into `MavenProjectUtil.updateDependencyDetails()`
  which branches on `dependencyCurrentProject()` to use the local module's coordinates
  instead.
