description: The Authorization header parsing in AppAuthManager.java used indexOf('
  ') to split the header value without validating that the scheme is 'Bearer' or that
  a non-empty token follows. This pattern is repeated in three locations, allowing
  malformed Authorization headers to bypass authentication checks (CVE-2026-0707).
  The fix adds explicit Bearer prefix validation and non-empty token checks.
expected_findings:
- file: services/src/main/java/org/keycloak/services/managers/AppAuthManager.java
  line: 32
  summary: Authorization header split on space via indexOf(' ') without validating
    the scheme is 'Bearer' or that the token portion is non-empty, allowing auth bypass
    with crafted headers
  line_side: pre_fix
- file: services/src/main/java/org/keycloak/services/managers/AppAuthManager.java
  line: 41
  summary: 'Same vulnerable pattern: naive space-based split of Authorization header
    without Bearer scheme validation or empty-token check'
  line_side: pre_fix
- file: services/src/main/java/org/keycloak/services/managers/AppAuthManager.java
  line: 62
  summary: 'Third instance of the same vulnerable pattern: no Bearer prefix validation
    before extracting token from Authorization header'
  line_side: pre_fix
