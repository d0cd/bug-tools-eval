  summary: getWildcardsMappedFrom only traverses a single mapFrom level — properties
    reachable through chained mapFrom references are not discovered, leaving some
    property names unexposed
  line_side: pre_fix
- file: quarkus/runtime/src/main/java/org/keycloak/quarkus/runtime/configuration/PropertyMappingInterceptor.java
