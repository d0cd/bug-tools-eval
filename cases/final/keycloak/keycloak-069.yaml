description: The `targetServerType` JDBC parameter was not always being passed through
  to the database connection URL. The property mapping logic only advertised the option
  under certain conditions, so even when a user explicitly set `targetServerType`,
  it could be silently dropped. The fix adds a default value of "primary" to the `DatabaseOptions`
  definition so the property mapper always processes and forwards the parameter.
