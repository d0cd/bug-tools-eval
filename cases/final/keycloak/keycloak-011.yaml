description: After importing a new realm, the master admin role's composite roles
  are not updated in the Infinispan cache, and the MgmtPermissions check doesn't account
  for newly-added realm client roles when using lightweight tokens. This means admin
  operations on newly-imported realms fail until a server restart forces cache refresh.
