- file: services/src/main/java/org/keycloak/services/resources/admin/fgap/MgmtPermissions.java
  line: 176
  summary: 'hasOneAdminRole returns only identity.hasOneClientRole() without fallback:
    when a new realm is imported and lightweight tokens are used, the token lacks
    the new realm''s client roles, so admin access is incorrectly denied until restart.'
  line_side: pre_fix
- file: model/infinispan/src/main/java/org/keycloak/models/cache/infinispan/RealmCacheSession.java
  line: 494
  summary: prepareCachedRealm does not check whether the master admin role's composites
    are stale after a new realm import. The cached admin role never gets invalidated,
    so newly-imported realm client roles are invisible to permission checks.
  line_side: pre_fix
