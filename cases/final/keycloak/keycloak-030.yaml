description: The OID4VCI test client was incorrectly constructing credential offer
  URLs by manually appending the nonce to the endpoint path (e.g., `getOid4vcCredentialOffer(nonce)`
  with a trailing slash). The correct approach is to use the `CredentialOfferURI`
  object returned from the credential-offer-uri endpoint, which already contains the
  properly constructed URL via `getCredentialOfferUri()`. Multiple call sites were
  also manually concatenating `issuer + "/" + nonce` instead of using the model's
  accessor.
expected_findings:
- file: tests/utils-shared/src/main/java/org/keycloak/testsuite/util/oauth/Endpoints.java
  line: 93
  summary: 'API misuse: `getOid4vcCredentialOffer(String nonce)` bakes the nonce into
    the URL path with a trailing slash, but the credential-offer endpoint expects
    the nonce as a path segment without trailing slash, or should be resolved from
    a CredentialOfferURI object rather than manually constructed'
  line_side: pre_fix
- file: tests/utils-shared/src/main/java/org/keycloak/testsuite/util/oauth/oid4vc/CredentialOfferRequest.java
  line: 27
  summary: 'Incorrect URL construction: `getEndpoint()` builds the credential offer
    URL by calling `client.getEndpoints().getOid4vcCredentialOffer(nonce)` instead
    of using `CredentialOfferURI.getCredentialOfferUri()` which contains the canonical
    URL returned by the server'
  line_side: pre_fix
- file: testsuite/integration-arquillian/tests/base/src/test/java/org/keycloak/testsuite/oid4vc/issuance/signing/OID4VCAuthorizationDetailsFlowTestBase.java
  line: 141
  summary: 'Manual URL construction: concatenating `credentialOfferURI.getIssuer()
    + "/" + credentialOfferURI.getNonce()` instead of using `credentialOfferURI.getCredentialOfferUri()`
    which returns the proper URL'
  line_side: pre_fix
