description: The DisabledForServers test framework annotation referenced an incorrect
  execution condition class (or used the wrong JUnit 5 meta-annotation), causing the
  conditional test disabling to not function properly. The fix corrects the single-line
  annotation reference so that tests annotated with @DisabledForServers are properly
  skipped when running against the specified server types.
