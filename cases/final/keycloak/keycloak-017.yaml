description: The single-select typeahead resolved the displayed resource name from
  the paginated search results (`items`) instead of from the `selected` state (fetched
  by ID). When a user picked a resource outside the initial 10 results and the search
  reset, the name disappeared because it was no longer in the `items` list. The fix
  resolves the display from `selected` (always stable) and eagerly updates `selected`
  on pick so the name is available without an async round-trip.
