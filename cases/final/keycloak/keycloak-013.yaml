description: New database-related configuration options were being advertised to Quarkus
  through the property mapping interceptor when they should have been hidden. The
  fix ensures these options null themselves in the transformer so Quarkus does not
  attempt to process or validate them, which could cause configuration errors or unexpected
  behavior.
