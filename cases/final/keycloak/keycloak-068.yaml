description: ClientPermissionsV2.canExchangeTo() throws UnsupportedOperationException
  instead of returning false, causing V1TokenExchangeProvider.validateAudience() to
  propagate an uncaught exception as an HTTP 500 when FGAPv2 is enabled and a cross-client
  audience is requested. The fix replaces the throw with a graceful denial by returning
  false.
