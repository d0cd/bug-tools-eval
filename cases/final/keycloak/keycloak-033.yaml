description: The OID4VCIssuerEndpoint was setting the VerifiableCredential type field
  to a single scope value instead of using the configured supported credential types
  from credentialScopeModel.getSupportedCredentialTypes(). Additionally, date fields
  in VerifiableCredential were not serialized in ISO 8601 format, causing interoperability
  issues with OID4VC consumers expecting standard date formatting.
