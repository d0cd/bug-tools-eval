description: The GitHub Actions workflow for Cypress tests lacked a repository guard,
  causing tests to run on every fork push and PR. This overwhelmed CI budget and polluted
  fork PRs with unnecessary Cypress Cloud comments. The fix adds a `github.repository
  == 'keycloak/keycloak'` condition to restrict Cypress jobs to the main repo only.
expected_findings:
- file: .github/workflows/js-ci.yml
  line: 190
  summary: 'Missing repository guard: Cypress test job runs on all forks because the
    `if` condition does not check `github.repository == ''keycloak/keycloak''`, wasting
    CI budget and posting unwanted comments on fork PRs'
  line_side: pre_fix
- file: .github/workflows/js-ci.yml
  line: 243
  summary: Same missing repository guard on a second Cypress-related job; both jobs
    need `github.repository == 'keycloak/keycloak'` to prevent fork execution
  line_side: pre_fix
