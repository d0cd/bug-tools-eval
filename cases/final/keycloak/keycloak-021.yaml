description: The Keycloak operator's client controller did not check whether the server
  had ready replicas before invoking admin API operations, leading to confusing errors
  when the server was not yet available. The fix adds an `isServerReady()` pre-check,
  but introduces a typo in the error message ("operatiorn") and throws a generic RuntimeException
  instead of a domain-specific exception, which makes error handling less precise.
