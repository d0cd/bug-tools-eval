  summary: 'Typo in error message: ''operatiorn'' should be ''operation''. Also, throwing
    a generic RuntimeException rather than a specific exception (e.g., ServerNotReadyException)
    makes it impossible for callers to distinguish this condition from other failures
    in error handling.'
