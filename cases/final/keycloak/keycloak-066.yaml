description: The SelectControl options for the OIDC IdP prompt dropdown had their
  label and value properties reversed, causing the localized display string to be
  stored as the protocol value instead of the OIDC-compliant prompt value (e.g. 'select_account').
  The fix swaps the key/value mapping so that OIDC prompt values are persisted while
  localized labels are used only for display.
