description: The Authorization header parsing in AppAuthManager used a naive space-based
  split (indexOf(' ')) without validating that the scheme is actually 'Bearer'. This
  allowed attackers to supply malformed or alternative authorization schemes that
  would be incorrectly accepted as bearer tokens, bypassing authentication checks
  (CVE-2026-0707). The fix adds explicit validation that the header starts with 'Bearer
  ' before extracting the token.
