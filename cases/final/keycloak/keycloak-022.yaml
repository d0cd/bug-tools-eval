description: AuthenticationManager.finishedRequiredActions() rendered the ACCOUNT_UPDATED
  info page without setting the messageHeader attribute. The info.ftl template falls
  back to message.summary when messageHeader is absent, causing the same 'Your account
  has been updated.' string to appear as both the page header and the body text. The
  fix sets an explicit messageHeader so the header and body are distinct.
