description: URL.getFile() returns a percent-encoded string (e.g. spaces as %20),
  which is then passed to new JarFile() expecting a decoded filesystem path. This
  causes Keycloak to fail when installed in a directory containing spaces. The fix
  replaces url.getFile() with url.toURI().getSchemeSpecificPart() which properly decodes
  the path, and also adds a missing null check on the JAR entry lookup.
expected_findings:
- file: quarkus/deployment/src/main/java/org/keycloak/quarkus/deployment/KeycloakProcessor.java
  line: 1083
  summary: 'API misuse: url.getFile() returns percent-encoded path (spaces become
    %20), causing JarFile constructor to fail on paths with spaces. Should use url.toURI().getSchemeSpecificPart()
    for proper decoding.'
  line_side: pre_fix
- file: quarkus/deployment/src/main/java/org/keycloak/quarkus/deployment/KeycloakProcessor.java
  line: 1095
  summary: 'Missing null check: jarFile.getJarEntry() can return null if the entry
    doesn''t exist, but the result is passed directly to getInputStream() which would
    throw NullPointerException.'
  line_side: pre_fix
