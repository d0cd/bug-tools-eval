description: The `byteArrayToResolverProviderId` method in `ArtifactBindingUtils`
  did not validate that the input byte array had at least 4 bytes before accessing
  elements for the type code and endpoint index, causing an `ArrayIndexOutOfBoundsException`
  on malformed SAML artifacts. The fix adds a length check throwing `IllegalArgumentException`
  for arrays shorter than 4 bytes, and the callers in `SamlService` now catch `IllegalArgumentException`
  alongside `ArtifactResolverProcessingException` to handle malformed input gracefully.
expected_findings:
- file: server-spi-private/src/main/java/org/keycloak/protocol/saml/util/ArtifactBindingUtils.java
  line: 11
  summary: 'Missing length validation: byteArrayToResolverProviderId accesses array
    indices 0-3 without checking that the input has at least 4 bytes, causing ArrayIndexOutOfBoundsException
    on short/malformed SAML artifacts'
  line_side: pre_fix
- file: services/src/main/java/org/keycloak/protocol/saml/SamlService.java
  line: 387
  summary: Catch block only handles ArtifactResolverProcessingException but not IllegalArgumentException,
    so a malformed artifact that triggers an unchecked exception will propagate as
    a 500 instead of being handled gracefully
  line_side: pre_fix
- file: services/src/main/java/org/keycloak/protocol/saml/SamlService.java
  line: 1218
  summary: Same missing IllegalArgumentException catch as the other SAML artifact
    handling path — both code paths need to handle malformed artifact input consistently
  line_side: pre_fix
