description: When a new realm is created or imported, the Infinispan cache layer in
  RealmCacheSession did not invalidate admin role entries, causing stale cached permissions.
  This meant newly created realms could have incorrect or missing admin role assignments.
  The fix adds admin role cache invalidation on realm creation/import and adjusts
  permission checks in MgmtPermissions (FGAP) to account for lightweight token usage.
