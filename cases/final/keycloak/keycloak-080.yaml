description: The Maven BootstrapMavenContext was being created as an instance field,
  causing it to be bootstrapped multiple times across test runs — an expensive operation.
  The fix makes the context a static field so it is initialized once and reused, which
  also resolves the inability to resolve the current project as a dependency in the
  test framework server config.
