description: The REST endpoint path `/admin/realms/{realm}/clients/{client-uuid}/roles/{role-name}/composites/clients/{client-uuid}`
  reuses the path parameter name `{client-uuid}` twice, producing an invalid OpenAPI
  specification. This violates the OpenAPI requirement that parameter names be unique
  per path and breaks code generators that rely on this invariant. The fix renames
  the inner parameter to `{targetClientUuid}`.
expected_findings:
- file: services/src/main/java/org/keycloak/services/resources/admin/RoleContainerResource.java
  line: 1
  summary: 'Duplicate path parameter name `{client-uuid}`: the sub-resource path for
    composite roles reuses the same `@PathParam("client-uuid")` name as the parent
    resource, producing an invalid OpenAPI spec. Rename the inner parameter to a distinct
    name like `{targetClientUuid}`.'
