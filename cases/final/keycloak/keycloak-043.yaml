description: The group duplication function in the admin UI did not account for organization
  groups, which don't support role mappings or fine-grained admin permissions (FGAP).
  Duplicating an org group would attempt unsupported operations (role mapping copy,
  FGAP permission copy, wrong member-add API), causing failures. Additionally, the
  backend OrganizationGroupResource.addSubGroup endpoint returned 201 without a Location
  header, preventing the frontend from obtaining the created subgroup's URI for subsequent
  operations.
expected_findings:
- file: js/apps/admin-ui/src/groups/GroupsModal.tsx
  line: 136
  summary: Unconditionally calls adminClient.users.addToGroup for all groups including
    org groups, which don't support this API. Should branch on groups.isOrgGroups()
    and use addMemberToOrgGroup for org groups.
  line_side: pre_fix
- file: js/apps/admin-ui/src/groups/GroupsModal.tsx
  line: 157
  summary: Unconditionally copies realm role mappings and client role mappings when
    duplicating a group. Org groups don't support role mappings, so this block should
    be skipped for org groups.
  line_side: pre_fix
- file: services/src/main/java/org/keycloak/organization/admin/resource/OrganizationGroupResource.java
  line: 246
  summary: addSubGroup returns 201 status without a Location header. The response
    must include the URI of the newly created child group so the caller can reference
    it for subsequent operations (e.g., adding members).
  line_side: pre_fix
