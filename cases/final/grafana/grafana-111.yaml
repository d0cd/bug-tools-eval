description: The Alertmanager UI stored the selected Alertmanager in a single global
  localStorage key (`alerting-alertmanager`) shared across all organizations. When
  switching orgs, the stale key referenced an AM that no longer existed in the new
  org context, rendering the UI in an unrecoverable error state with a disabled dropdown.
  The fix scopes the key per organization (`alerting-alertmanager-org-{orgId}`) and
  adds a graceful fallback to the built-in Grafana Alertmanager when the stored selection
  is unavailable.
