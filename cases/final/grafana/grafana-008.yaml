description: 'The dashboard version history resolved user display names using index-based
  array lookup between two misaligned arrays: the `keys` array (in request order)
  and the `display` array (ordered by `u.id ASC` from the database). This caused user
  names to appear swapped or shuffled across versions whenever multiple distinct users
  edited a dashboard. The fix replaces the index-based lookup with an identity-based
  Map keyed on each display item''s `identity` field.'
