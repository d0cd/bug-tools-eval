  summary: isRenderTarget check only covers DashboardRoutes.Report and DashboardRoutes.Embedded
    but misses the case where route is DashboardRoutes.Normal and authenticatedBy
    === 'render', causing the render-readiness observer to not be initialized for
    /render/d/... callback flows
