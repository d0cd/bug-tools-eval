description: MenuItem components rendering as links (<a href>) did not receive role="menuitem",
  causing VoiceOver to count them separately from button-based menuitems. This made
  the Keyboard shortcuts button announce "1 of 1" instead of its correct position
  in the menu. The fix applies role="menuitem" to link-based MenuItems by default
  while still allowing callers to override via the role prop.
expected_findings:
- file: packages/grafana-ui/src/components/Menu/MenuItem.tsx
  line: 1
  summary: 'Link-based MenuItem missing role="menuitem" attribute: when MenuItem renders
    an <a> element, it should default to role="menuitem" so assistive technologies
    like VoiceOver correctly count all items in the parent menu list. Without this,
    VoiceOver treats button menuitems and link menuitems as separate lists, causing
    incorrect position announcements (e.g. "1 of 1").'
  line_side: pre_fix
