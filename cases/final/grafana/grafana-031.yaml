description: The legacy dashboard API did not properly handle Kubernetes-style dashboard
  payloads. When a v2 schema dashboard was saved through the legacy API path, the
  k8s wrapper was not detected or unwrapped, and internal IDs were not correctly managed
  via the deprecated internal ID selector, causing dashboards to fail to save or to
  be saved incorrectly.
