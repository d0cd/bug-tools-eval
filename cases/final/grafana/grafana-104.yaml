description: 'The Prometheus datasource''s ad-hoc filter logic (`enhanceExprWithAdHocFilters`)
  did not handle the multi-value `=|` and `!=|` operators introduced for the one-of
  UI feature. When the `promQLScope` feature toggle was removed (PR #112035), all
  users hit the older codepath which passed these unrecognized operators directly
  into PromQL expressions, causing query failures. The fix remaps `=|` to `=~` and
  `!=|` to `!~` by joining the `values` array into a regex pattern before the filter-reduce
  step.'
expected_findings:
- file: packages/grafana-prometheus/src/datasource.ts
  line: 754
  summary: 'Unhandled operator: `filters.reduce(...)` passes `=|`/`!=|` operators
    straight into PromQL without converting them to the equivalent regex operators
    (`=~`/`!~`). Needs a remap step (e.g. `.map(remapOneOf)`) before the reduce to
    translate multi-value one-of filters into regex matchers.'
