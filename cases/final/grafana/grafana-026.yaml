description: 'The integration test workflow''s `actions/setup-go` steps use `cache:
  true` without specifying `cache-dependency-path`, so the cache key only hashes the
  root `go.sum` file instead of all 49 `*.sum` files across the 39-module Go workspace.
  This causes stale cache hits (sub-module dependency changes missed) and false cache
  misses (root-only changes triggering full re-downloads), degrading CI performance.'
