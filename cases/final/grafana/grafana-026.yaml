  summary: 'Missing `cache-dependency-path` on `actions/setup-go` steps: in a multi-module
    workspace the default cache key only hashes the root `go.sum`, causing stale hits
    and false misses. Add `cache-dependency-path: "**/*.sum"` to all setup-go steps.'
