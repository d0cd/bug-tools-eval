  summary: addVariable() flow calls selectObject() which clears the isNewElement flag
    before the edit form renders, causing autoFocus to never trigger on the variable
    name input
  line_side: pre_fix
- file: public/app/features/dashboard-scene/settings/variables/VariableEditableElement.tsx
