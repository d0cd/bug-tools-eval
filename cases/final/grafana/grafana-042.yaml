- file: pkg/storage/unified/resource/broadcaster.go
  line: 101
  summary: 'Race condition: select statement can non-deterministically pick the unsubscribe
    case before the subscribe case even though subscribe was buffered first, because
    Go''s select chooses randomly among ready channels. Must drain pending subscribes
    before processing unsubscribe to maintain ordering.'
