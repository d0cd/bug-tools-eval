description: Race condition in the broadcaster's select loop where an unsubscribe
  message could be processed before its corresponding subscribe message, despite being
  sent sequentially from the same goroutine. This left the subscriber channel unclosed,
  causing tests to hang indefinitely. The fix drains all pending subscribe messages
  before processing an unsubscribe.
