description: The team_member.external database column can contain NULL values, but
  the Go code was scanning it directly into a non-nullable type, causing a SQL scan
  error that broke dashboard loading. The fix imports database/sql and uses sql.NullString
  (or similar nullable types) to safely handle NULL column values during row scanning.
