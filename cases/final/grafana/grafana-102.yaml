  summary: LegacyStatsGetter stores dual-writer mode as static boolean fields captured
    at construction time. These become stale after auto-migration sets Mode5 later
    during startup, causing GetStats() to always include legacy SQL counts. Should
    read mode dynamically from cfg at query time.
  line_side: pre_fix
- file: pkg/storage/unified/client.go
