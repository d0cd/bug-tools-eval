description: LegacyStatsGetter captured dual-writer mode as static booleans during
  wire DI, before auto-migration had a chance to set Mode5. This caused stale legacy
  dashboard counts to persist, making folder deletion fail with 'folder is not empty'
  after upgrading to 12.4. The fix replaces static booleans with a *setting.Cfg pointer
  so the mode is read dynamically at query time.
