  summary: Passes pre-resolved boolean for dual-writer mode into federated client
    constructor. Since auto-migration hasn't run yet at wire DI time, this value is
    always false. Should pass cfg reference so the federated client can read the current
    mode dynamically.
  line_side: pre_fix
