description: The `find` command in `pkgs-with-tests-named.sh` recursively searched
  subdirectories for `*_test.go` files, incorrectly including parent packages when
  matching test functions only existed in child packages. This violated Go's package
  semantics where only files in the same directory belong to a package. The fix adds
  `-maxdepth 1` to restrict the search to the immediate directory.
