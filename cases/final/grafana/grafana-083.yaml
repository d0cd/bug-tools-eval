- file: pkg/storage/unified/federated/stats.go
  line: 81
  summary: Dual-writer mode captured as a static boolean at construction time instead
    of read dynamically from Cfg; value is always false because auto-migration hasn't
    run yet when the struct is created
  line_side: pre_fix
- file: pkg/storage/unified/client.go
  line: 24
  summary: Passing pre-resolved boolean flags (DisableSQLFallbackDashboards/Playlists)
    instead of the Cfg pointer; these are stale by the time they're actually used
  line_side: pre_fix
- file: pkg/storage/unified/client.go
  line: 71
  summary: Same static boolean capture pattern for the second call site — should pass
    *setting.Cfg so the federated client reads current dual-writer mode at query time
  line_side: pre_fix
