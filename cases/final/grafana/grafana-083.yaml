description: During dependency injection, LegacyStatsGetter captured dual-writer mode
  flags as static booleans at construction time. Because auto-migration sets Mode5
  later during service startup, the booleans were always false, causing GetStats()
  to always include stale legacy SQL dashboard counts and preventing deletion of empty
  folders.
