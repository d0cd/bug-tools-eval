description: The heatmap panel's prepareHeatmapData function crashes when it receives
  data frames that have fields but no actual values (empty arrays). The existing guard
  only checked for an empty frames array, not for frames containing zero-length data.
  The fix adds an upfront filter to exclude frames where frame.length is 0, fields
  array is empty, or any field has no values.
