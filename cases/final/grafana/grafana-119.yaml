description: The dashboard version history 'Updated By' column displayed incorrect
  user names because the IAM display API returns `keys` in request order but `display`
  items sorted by database ID. The code used index-based array lookup to match display
  names to user keys, which silently mapped the wrong name to the wrong user whenever
  the two orderings diverged. The fix replaces the positional array indexing with
  an identity-keyed Map for correct association.
