description: When the `newVizSuggestions` feature flag is disabled and data is available,
  the panel editor incorrectly opens the viz picker instead of showing the default
  panel with options. The `isVizPickerOpen` state was set solely based on whether
  the plugin ID matched `UNCONFIGURED_PANEL_PLUGIN_ID`, without considering the feature
  flag state.
