description: 'The QueryEditor incorrectly gates card rendering on an `isLoading` state
  that tracks whether queries are executing, but the card data (`queryRunner.state.queries`)
  is always synchronously available and has no dependency on execution status. This
  causes visible flicker: cards render, disappear when isLoading becomes true, then
  reappear when loading completes. The fix removes the unnecessary isLoading check
  and the associated loading component render.'
expected_findings:
- file: public/app/features/dashboard-scene/panel-edit/PanelEditNext/QueryEditor/Sidebar/QueriesAndTransformationsView.tsx
  line: 1
  summary: 'Unnecessary `isLoading` conditional rendering: query card data is synchronously
    available from `queryRunner.state.queries` and does not depend on query execution
    state, so gating on `isLoading` causes cards to flicker on load and on every action
    (delete, hide, duplicate)'
  line_side: pre_fix
- file: public/app/features/dashboard-scene/panel-edit/PanelEditNext/QueryEditor/QueryEditorContext.tsx
  line: 1
  summary: The `isLoading` state exposed by this context is being consumed to gate
    rendering of synchronously-available data, causing unnecessary re-renders and
    visual flicker
  line_side: pre_fix
