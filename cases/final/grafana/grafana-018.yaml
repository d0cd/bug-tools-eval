    \ links inaccessible; add explicit height cap (e.g. `maxHeight: calc(100vh - spacing)`)\
    \ and overflow handling here"
  line_side: pre_fix
- file: packages/grafana-ui/src/components/Table/DataLinksActionsTooltip.tsx
