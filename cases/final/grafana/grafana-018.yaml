description: The DataLinksActionsTooltip's tooltipWrapper CSS had no maxHeight or
  overflow constraint, so when many data links were configured the tooltip extended
  beyond the viewport edge, making off-screen links inaccessible. The fix adds a viewport-relative
  maxHeight and overflowX:'hidden' to the tooltipWrapper style, but the reviewer noted
  the styles should live in the CSS object (not inline on the floating element) and
  that explicit overflowY was unnecessary since CSS spec coerces it automatically.
