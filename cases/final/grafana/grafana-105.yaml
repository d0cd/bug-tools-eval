description: 'PR #113412 introduced strict host environment variable filtering for
  plugin processes but failed to include PLUGIN_UNIX_SOCKET_DIR in the permitted list.
  This causes plugins to lose the configured Unix socket temp directory path, falling
  back to /tmp which is read-only in many Kubernetes pod configurations, breaking
  plugin communication.'
