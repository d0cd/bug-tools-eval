description: 'The nanogit dependency was pinned at v0.6.0 which transitively pulled
  in Go toolchain 1.25.6, exposing the application to four CVEs in Go stdlib: filesystem
  sandbox escape (os), IPv6 URL parsing error (net/url), certificate validation panic
  (crypto/x509), and incorrect email constraint enforcement (crypto/x509). The fix
  bumps nanogit to v0.7.0 which uses Go 1.25.8.'
