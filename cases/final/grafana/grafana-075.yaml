description: The dashboard reference was stored in a local `let` variable and initialized
  via `useEffectOnce`. When the effect responsible for subscribing to dashboard events
  re-ran due to dependency changes, the local variable had been re-declared as `undefined`
  by the new render cycle, causing `dashboard?.events.subscribe` to silently fail
  and the event subscription to be lost. The fix stores the dashboard in a `useRef`
  to persist it across renders and splits the event subscription and data fetch into
  separate effects to avoid unnecessary unsubscribe/resubscribe cycles.
