description: The quota change check was only performed at the status-patching step
  (line 624), but the switch statement that gates whether reconciliation proceeds
  at all (line 600-608) had no case for quota changes. When only the quota changed
  (no spec change, not blocked, no token generation), the controller fell through
  to `default` and returned nil, silently skipping the quota update. The fix hoists
  the comparison before the switch and adds a `hasQuotaChanged` case so quota-only
  changes trigger reconciliation.
