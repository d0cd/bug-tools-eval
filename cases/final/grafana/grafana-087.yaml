description: The dashboard version history page resolves user identity keys to display
  names via the IAM /display API. The response's `keys` array is in request order
  while the `display` array is ordered by database ID (u.id ASC). The code used index-based
  array lookup between these two misaligned arrays, mapping the wrong display name
  to the wrong user key whenever multiple users with different DB IDs edited the dashboard.
expected_findings:
- file: public/app/features/dashboard-scene/settings/VersionsEditView.tsx
  line: 133
  summary: 'Index-based lookup between misaligned arrays: `keys[i]` is in request
    order but `display[i]` is sorted by DB ID. Use a Map keyed by identity instead
    of positional indexing to correctly associate display names with user keys.'
