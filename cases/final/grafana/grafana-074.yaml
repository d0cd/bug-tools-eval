  summary: 'Non-deterministic classification: isSnowflake compares against time.Now()
    making it sensitive to wall-clock timing. A microsecond timestamp slightly more
    than 1 hour in the future would be misclassified as a snowflake ID. Replace with
    a deterministic numeric threshold (e.g. rv >= 1e18) since all valid snowflake
    IDs have 19 digits.'
