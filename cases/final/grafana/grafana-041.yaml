description: Flaky test uses `user.clear()` on a Downshift-based Combobox, which is
  unreliable because the Combobox's stateReducer clears the input when the menu opens.
  Timing differences between local and CI environments cause `user.type()` to append
  to the stale value instead of replacing it (e.g., 'mainfeature-branch' instead of
  'feature-branch'). The fix replaces `user.clear()` with a click to open the menu,
  letting the stateReducer clear the input reliably before typing.
