description: The `persistInitialConfig` function redundantly called `getTestHelper()`
  internally, spinning up a second SQLite test database environment while a helper
  was already passed in by the caller. This caused intermittent `database is locked`
  (SQLITE_BUSY) errors due to two test environments competing for the same underlying
  database. The fix removes the redundant `getTestHelper()` call so the function uses
  the already-initialized helper.
