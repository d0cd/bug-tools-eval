  summary: "Deadlock: the broadcast loop sends on `b.unsubscribe` to remove slow consumers,\
    \ but that channel is only drained by this same goroutine \u2014 if >100 slow\
    \ consumers accumulate, the buffered channel fills and the send blocks forever,\
    \ deadlocking the entire broadcaster"
