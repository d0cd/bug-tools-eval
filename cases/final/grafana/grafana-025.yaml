description: The Git type mutator unconditionally appended `.git` to every repository
  URL, and nanogit also appended `.git` internally. This broke providers like Azure
  DevOps where `.git` is a literal path segment in the URL (e.g. `/_git/MyRepo`),
  causing repository operations to fail. The fix removes the forced `.git` appending
  from the mutator and uses nanogit's `WithoutGitSuffix()` option so URLs are preserved
  as provided.
expected_findings:
- file: apps/provisioning/pkg/repository/git/mutator.go
  line: 27
  summary: Unconditional `.git` suffix appending breaks providers where `.git` is
    already a path segment (e.g. Azure DevOps `/_git/Repo`). The URL should be stored
    as-is without forcing a suffix convention.
  line_side: pre_fix
- file: apps/provisioning/pkg/repository/git/extra.go
  line: 37
  summary: 'Missing `SkipGitSuffix: true` in RepositoryConfig construction — nanogit
    will still append `.git` internally unless explicitly told not to, duplicating
    the suffix for URLs that already contain it.'
  line_side: pre_fix
- file: apps/provisioning/pkg/repository/git/repository.go
  line: 33
  summary: RepositoryConfig lacks a `SkipGitSuffix` field to control whether nanogit
    appends `.git`, meaning there is no way to opt out of the double-suffix behavior
    for non-GitHub providers.
  line_side: pre_fix
