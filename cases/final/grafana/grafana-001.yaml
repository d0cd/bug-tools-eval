description: 'The Air hot-reload configuration and Makefile were not optimized for
  fast incremental rebuilds. Three build configuration changes were made: pinning
  SOURCE_DATE_EPOCH to improve cache hits, explicitly setting CGO_ENABLED=0 to avoid
  cgo overhead, and disabling compiler optimizations (-N -l) for faster dev builds.'
expected_findings:
- file: .air.toml
  line: 1
  summary: Build command lacks CGO_ENABLED=0 and uses default optimizations, causing
    unnecessarily slow incremental rebuilds during development
  line_side: pre_fix
- file: Makefile
  line: 1
  summary: SOURCE_DATE_EPOCH not pinned, causing cache invalidation on every build
    due to changing timestamps
  line_side: pre_fix
