description: The status subresource store in the Grafana API server app installer
  was configured with an incorrect or missing KeyFunc. This caused status update requests
  to fail to correctly identify the target resource, breaking status subresource operations.
  The fix corrects the KeyFunc assignment for status stores at two locations where
  cluster-scoped and namespace-scoped resources are set up.
expected_findings:
- file: pkg/services/apiserver/appinstaller/server.go
  line: 151
  summary: Status subresource store is using an incorrect KeyFunc — it should use
    the parent resource's KeyFunc so status updates correctly resolve the resource
    identity
  line_side: pre_fix
- file: pkg/services/apiserver/appinstaller/server.go
  line: 173
  summary: Same KeyFunc issue repeated for the second status store setup path — status
    subresource KeyFunc must match the parent resource's KeyFunc
  line_side: pre_fix
