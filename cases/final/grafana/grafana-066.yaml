description: The heatmap panel's bucket expansion factor calculation performs an unguarded
  division `u.data[1][2][0] / u.data[1][1][0]` (yMax[0] / yMin[0]). When the minimum
  y bucket value is zero, this produces Infinity or NaN, causing the entire heatmap
  to fail to render when the y-axis max is set to auto. Additionally, the code uses
  a @ts-ignore comment to suppress type errors on the array access rather than validating
  the data.
expected_findings:
- file: public/app/plugins/panel/heatmap/utils.ts
  line: 248
  summary: 'Division by zero: `u.data[1][2][0] / u.data[1][1][0]` divides yMax by
    yMin without checking for zero denominator. When first bucket starts at 0 (common
    in Prometheus-style exponential histograms), this yields Infinity/NaN, breaking
    heatmap rendering. Should iterate buckets to find a valid non-zero denominator
    or default to 1.'
  line_side: pre_fix
- file: public/app/plugins/panel/heatmap/utils.ts
  line: 247
  summary: 'Unsafe data access: @ts-ignore suppresses type checking on nested array
    indexing (`u.data[1][2][0]`) without validating that the arrays exist or contain
    numeric values, masking potential runtime errors.'
  line_side: pre_fix
