description: The MultiCombobox component calculated the number of hidden/truncated
  selected items using the length of `shownItems` instead of `visibleItems`, causing
  an incorrect count to be displayed when the component is focused. The fix swaps
  the variable to `visibleItems` so the truncation indicator reflects the actual number
  of items not visible.
