description: The project depended on @grafana/llm@1.0.2, which transitively pulled
  in @modelcontextprotocol/sdk < 1.26.0, a version affected by CVE-2026-25536 (cross-client
  data leak via shared server/transport reuse, CVSS 7.1). The fix bumps @grafana/llm
  to 1.0.3, which declares @modelcontextprotocol/sdk@^1.26.0.
