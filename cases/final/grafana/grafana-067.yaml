description: PR adds a target-eligibility guard to skip unified-storage migrations
  when the Grafana target is not 'all' or 'core'. However, the pre-existing SkipsMigrations
  test cases ('storage type is not unified', 'data migrations disabled') do not set
  cfg.Target to an eligible value, so they now pass vacuously due to the new target
  check rather than the condition they claim to test.
