description: 'The Makefile unconditionally added `-trimpath` to all Go builds, stripping
  path information needed for debugging. The fix conditionally applies `-trimpath`
  only for non-dev builds and adds `-gcflags "all=-N -l"` for dev builds, though the
  approach has known weaknesses: GO_BUILD_DEV is largely unused and GO_BUILD_GCFLAGS
  can silently override the dev flags.'
