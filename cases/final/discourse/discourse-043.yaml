description: Public methods `process_command` and `mattermost_token_valid?` on `MattermostCommandController`
  are routable as controller actions in Rails, allowing unauthenticated access to
  command processing logic that should only be invoked internally. The fix makes these
  methods private. The same pattern was also fixed in `TelegramCommandController`.
