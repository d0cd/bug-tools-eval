description: The PR replaces a full Rails engine mount at the legacy `/admin/plugins/explorer`
  path with only three GET redirect routes. This means POST/PUT/DELETE requests to
  old URLs (e.g., running queries via API, updating queries, deleting queries) will
  now return 404 instead of being redirected or handled. External API consumers and
  scripts using the old `/admin/plugins/explorer/queries/:id/run` POST endpoint will
  silently break. Additionally, the old `?id=` query-parameter URL format that was
  previously redirected client-side is no longer handled.
expected_findings:
- file: plugins/discourse-data-explorer/config/routes.rb
  line: 30
  summary: 'Incomplete redirect coverage: replacing `mount Engine, at: /admin/plugins/explorer`
    with only `get` redirect routes drops support for POST/PUT/DELETE to legacy URLs.
    API clients POSTing to `/admin/plugins/explorer/queries/:id/run` will get 404.
    Should either keep the engine mount for non-GET methods, add redirects for all
    HTTP verbs, or use `match ... via: :all`.'
  line_side: pre_fix
- file: plugins/discourse-data-explorer/config/routes.rb
