description: The TagGroupsForm component used @cached @dependentKeyCompat for its
  buffered getter, which does not invalidate when classic component attrs change.
  When navigating between tag groups, the BufferedProxy kept wrapping the stale model.
  The fix switches to @computed("model") so the proxy is properly recreated on model
  change, consistent with other computed properties in the same component.
