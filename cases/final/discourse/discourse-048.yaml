description: Predicate methods (has_*?) in the review page object were using expect()
  assertions instead of returning boolean values. This breaks RSpec's matcher protocol,
  which expects predicate methods to return true/false so that matchers like `expect(page).to
  have_reviewable_with_topic_title(...)` work correctly via delegation to `has_reviewable_with_topic_title?`.
