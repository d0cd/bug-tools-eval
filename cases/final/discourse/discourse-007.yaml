description: 'Passkey registration fails in two ways: (1) the authenticator data parser
  naively slices all bytes after the credential ID as the public key, so authenticators
  that include CBOR extension data (e.g. hmac-secret) cause a CBOR/COSE decode failure
  (HTTP 500); (2) pubKeyCredParams is populated from COSE::Algorithm.registered_algorithm_ids
  which includes HMAC symmetric algorithms that strict authenticator firmware rejects
  with NotAllowedError. The fix uses CBOR::Unpacker streaming decode to read exactly
  one CBOR object and replaces the blanket algorithm list with an explicit asymmetric-only
  allow-list.'
expected_findings:
- file: lib/discourse_webauthn/registration_service.rb
  line: 118
  summary: Public key extraction slices remaining bytes after credential ID without
    accounting for trailing CBOR extension data; should use CBOR::Unpacker streaming
    decode to read exactly one CBOR object instead of consuming the entire remainder
  line_side: pre_fix
- file: lib/discourse_webauthn.rb
  line: 4
  summary: COSE::Algorithm.registered_algorithm_ids includes HMAC symmetric algorithms
    invalid for WebAuthn credential creation; should use an explicit allow-list of
    asymmetric signature algorithm IDs (e.g. ES256, RS256, EdDSA)
  line_side: pre_fix
- file: lib/discourse_webauthn/registration_service.rb
  line: 159
  summary: Rescue block does not catch COSE::MalformedKeyError, so malformed key data
    from extension-polluted bytes returns an unhandled 500 instead of a proper error
    response
  line_side: pre_fix
