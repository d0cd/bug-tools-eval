description: On login-required sites, the anonymous site payload omits the `email_configured`
  field entirely. The GlobalNotice component used a falsy check (e.g., `!this.site.email_configured`)
  which treated `undefined` the same as `false`, causing the SMTP configuration warning
  banner to incorrectly appear on the login page. The fix switches to a strict `===
  false` comparison so that a missing/undefined value no longer triggers the banner.
