description: An overly broad CSS selector `.select-kit .select-kit-header .selected-name
  .name` was restricting the width of select-kit dropdowns site-wide, when the original
  intention was only to limit the width of the group dropdown on the /g page to prevent
  text wrapping. The fix scopes the selector more specifically to `.user-primary-navigation
  .group-dropdown` so it no longer affects unrelated select-kit instances.
