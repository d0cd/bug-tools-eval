description: 'PR #37763 moved plugin script tag generation from ember-cli to Rails
  but omitted the data-discourse-plugin, data-preinstalled, and data-official attributes.
  Additionally, discourse-test-load-dynamic-js.js used `script.dataset = element.dataset`
  which is a silent no-op since dataset is a readonly DOMStringMap property. Without
  these attributes, setup-tests.js treated all test runs as core tests, causing private
  plugin tests to fail on deprecation warnings they should have been exempt from.'
expected_findings:
- file: frontend/discourse/public/assets/scripts/discourse-test-load-dynamic-js.js
  line: 40
  summary: 'Silent no-op: `script.dataset = element.dataset` does not copy data attributes
    because `dataset` is a readonly property. Must iterate with Object.entries() and
    assign individually.'
  line_side: pre_fix
- file: app/views/layouts/_plugin_js.html.erb
  line: 5
  summary: 'Missing data attributes: `preload_script asset[:name]` generates script
    tags without data-discourse-plugin, data-official, or data-preinstalled attributes,
    making it impossible for test infrastructure to distinguish plugin scripts from
    core scripts.'
  line_side: pre_fix
- file: spec/rails_helper.rb
  line: 1203
  summary: plugin_from_fixtures creates a bare Plugin::Instance with nil metadata.
    When _plugin_js.html.erb later accesses `asset[:plugin].metadata.name`, this raises
    NoMethodError on the nil metadata object. Should use `parse_from_source` to populate
    metadata.
  line_side: pre_fix
