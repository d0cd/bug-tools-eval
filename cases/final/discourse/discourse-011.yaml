description: The seed/fixture file for AI agents attempts to insert rows into the
  `ai_agents` table, but during the transition period (rename from personas to agents),
  `ai_agents` is a database view for cross-compatibility, not a real table. INSERT
  operations fail against views. The fix guards the seeding to only run after the
  post-migration converts the view into an actual table.
