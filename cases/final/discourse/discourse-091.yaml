description: 'The `reload` method overrides in `User`, `ReactionUser`, and `Poll`
  did not accept an `options` parameter, diverging from the `ActiveRecord::Base#reload(options
  = nil)` signature. This caused `ArgumentError` when any caller passed options such
  as `reload(lock: true)`, which ActiveRecord internally does during pessimistic locking.'
