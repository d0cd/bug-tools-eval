  summary: 'Method signature mismatch: `def reload` does not accept `options` parameter,
    diverging from `ActiveRecord::Base#reload(options = nil)`. Will raise `ArgumentError`
    when called with options like `lock: true`.'
  line_side: pre_fix
- file: plugins/discourse-reactions/app/models/discourse_reactions/reaction_user.rb
  line: 44
  summary: 'Same signature mismatch: `def reload` missing `options = nil` parameter,
    will raise `ArgumentError` when ActiveRecord or application code passes reload
    options.'
  line_side: pre_fix
- file: plugins/poll/app/models/poll.rb
