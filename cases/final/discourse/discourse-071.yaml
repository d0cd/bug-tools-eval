description: TranslationController#schedule_topic authorized access at the topic level
  but did not scope individual posts through Post.secured(guardian), allowing users
  in content_localization_allowed_groups to enqueue translation jobs for posts they
  were not permitted to view. This leaks post content through the translation pipeline.
  The fix applies Post.secured(guardian) scoping in find_untranslated_posts.
