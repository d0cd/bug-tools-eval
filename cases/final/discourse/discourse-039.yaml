description: The `upload_csv` endpoint in `invites_controller.rb` accepted arbitrary
  user-controlled CSV column headers without validation, passing them directly into
  invite hashes consumed by the BulkInvite job. This allowed potential mass-assignment-style
  injection of unexpected keys. The fix adds an allowlist filtering accepted columns
  to known values (`email`, `groups`, `topic_id`, `locale`, and valid UserField names).
expected_findings:
- file: app/controllers/invites_controller.rb
  line: 512
  summary: CSV headers from user-uploaded file are zipped into hashes without filtering
    against an allowlist; arbitrary keys flow into BulkInvite job, enabling mass-assignment-style
    injection. Must filter columns to known values (email, groups, topic_id, locale,
    valid UserField names).
  line_side: pre_fix
