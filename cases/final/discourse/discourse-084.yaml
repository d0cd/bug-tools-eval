description: The `/raw/:topic_id` endpoint returned hidden post content to all users
  (including anonymous) without checking `guardian.can_see?`, while the single-post
  endpoint `/raw/:topic_id/:post_number` correctly filtered them. This information
  disclosure allowed unauthorized users to read hidden post content by fetching the
  full topic markdown.
