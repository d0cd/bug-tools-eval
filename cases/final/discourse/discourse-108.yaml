description: The `newFeatures` tracked property was initialized to `null`, causing
  `Object.keys(null)` to throw a TypeError when the dashboard feed request fails on
  first load. The fix initializes it to `{}` and resets it in the catch block so stale
  data is cleared on retry failures.
