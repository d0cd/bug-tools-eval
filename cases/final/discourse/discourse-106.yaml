  line: 63
  summary: 'Missing nil guard: `modifications["raw"]` can be nil when only "cooked"
    modifications exist, causing NoMethodError on `map!`. Use safe navigation (`&.map!`)
    or an explicit nil check.'
  line_side: pre_fix
- file: app/jobs/regular/change_display_name.rb
