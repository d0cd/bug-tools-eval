description: The `model.tags` property can be null or undefined for topics without
  tags, but the code at line 30 calls `.some()` on it without a null guard. This causes
  a runtime TypeError when processing topics that have no tags. The fix adds a fallback
  to an empty array (e.g., `?? []`) or uses optional chaining (`tags?.some(...)`)
  to safely handle the missing property.
