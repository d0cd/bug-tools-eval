description: 'This PR reverts a security fix (PR #38026) that limited visibility on
  the accepted/not_accepted policy endpoints in the discourse-policy plugin. The revert
  was done because the original fix caused CI failures, but it re-exposes the endpoints
  without proper access control, meaning users may be able to see who accepted or
  rejected a policy when they should not have visibility into that information.'
