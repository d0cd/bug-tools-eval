description: The ProseMirror quote node spec did not store a displayName attribute,
  so the markdown→ProseMirror→markdown round-trip discarded the user's display name
  and fell back to just the username. Additionally, when the display name contained
  no commas the split result was left as an array instead of being joined into a string.
expected_findings:
- file: frontend/discourse/app/static/prosemirror/extensions/quote.js
  line: 14
  summary: Quote node spec missing displayName attribute — the ProseMirror node only
    tracks username, so display name is lost on deserialization
  line_side: pre_fix
- file: frontend/discourse-markdown-it/src/features/quotes.js
  line: 42
  summary: Display name extracted via split but never emitted as a data-display-name
    attribute on the aside token, so ProseMirror parser cannot pick it up
  line_side: pre_fix
- file: frontend/discourse-markdown-it/src/features/quotes.js
  line: 91
  summary: displayName left as an array (result of split) instead of joined into a
    string when the name contains no commas, causing type mismatch downstream
  line_side: pre_fix
