description: SiteCategorySerializer was missing localized overrides for description_text
  and description_excerpt, causing non-localized descriptions to appear when the UI
  reads from /site.json. The fix adds overrides, but the description_text implementation
  HTML-escapes the localized description (ERB::Util.html_escape) instead of stripping
  HTML tags to produce plain text, unlike the original object.description_text behavior
  and unlike description_excerpt which correctly uses PrettyText.excerpt.
expected_findings:
- file: app/serializers/site_category_serializer.rb
  line: 57
  summary: description_text uses ERB::Util.html_escape on HTML content instead of
    stripping tags. This produces escaped entities like '&lt;p&gt;' rather than plain
    text, inconsistent with the semantic purpose of description_text and with how
    the non-localized object.description_text works. Should strip HTML (e.g., via
    ActionView sanitizer or Nokogiri) instead of escaping it.
  line_side: pre_fix
- file: app/serializers/site_category_serializer.rb
  line: 55
  summary: The description_text and description_excerpt methods bypass localization
    for uncategorized categories via early return to super, but the description method
    has no such guard — inconsistent handling of the uncategorized edge case across
    the three related methods.
  line_side: pre_fix
