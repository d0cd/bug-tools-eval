description: Badge grouping section titles used the `dasherize` helper to generate
  HTML `id` attributes, but `dasherize` only converts camelCase to dash-case and does
  not strip special characters (e.g., ampersands, parentheses). This produces invalid
  HTML IDs that break anchor links and CSS selectors. The fix replaces `dasherize`
  with `slugify`, which properly sanitizes all non-word characters.
