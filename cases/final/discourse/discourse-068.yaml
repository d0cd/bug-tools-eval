description: The rollup plugin compiler mode fails for plugins with empty JS directories
  because the code unconditionally tries to render plugin JS assets without checking
  for a valid asset manifest. Additionally, `js_manager.rb` uses a class variable
  (`@@manifest_data`) instead of an instance variable (`@manifest_data`) for production
  memoization, causing shared mutable state across instances, and `discourse.rb` has
  incorrect fallback logic that reverts to the old asset system when it should not.
expected_findings:
- file: lib/plugin/js_manager.rb
  line: 2
  summary: Class variable `@@manifest_data` used for memoization instead of instance
    variable `@manifest_data`; class variables are shared across all instances and
    subclasses, causing unintended state sharing in production
  line_side: pre_fix
- file: lib/discourse.rb
  line: 461
  summary: Missing guard for valid asset manifest before rendering plugin JS assets;
    plugins with empty js dirs will hit this path and fail
  line_side: pre_fix
- file: lib/discourse.rb
  line: 485
  summary: Fallback logic incorrectly drops to the old asset system when the rollup
    plugin compiler mode is active but the plugin has no JS assets
  line_side: pre_fix
