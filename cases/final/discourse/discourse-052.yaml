description: 'After a TagChooser refactor (commit 9e99066b07) began passing tag objects
  instead of plain name strings, the webhook form sent these objects to the backend
  where Rails'' `permit(tag_names: [])` silently dropped non-scalar values, causing
  all tag selections on webhooks to be silently lost. The fix adds `tag_ids` as the
  canonical parameter while keeping `tag_names` with a deprecation path.'
expected_findings:
- file: app/controllers/admin/web_hooks_controller.rb
  line: 1
  summary: 'Strong parameters `permit(tag_names: [])` silently strips non-scalar (object)
    values passed from the frontend TagChooser, causing tag selections to be silently
    discarded. Needs to also permit `tag_ids` and handle the object-to-id/name coercion.'
  line_side: pre_fix
- file: frontend/discourse/admin/models/web-hook.js
  line: 1
  summary: Webhook model passes raw tag objects (with id, name, etc.) from TagChooser
    directly to the API as `tag_names`, but the backend expects an array of scalar
    strings/ids. Should extract and send `tag_ids` (or at minimum tag name strings)
    instead of full objects.
  line_side: pre_fix
