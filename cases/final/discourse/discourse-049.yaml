description: The user card cloak (overlay) did not disappear on mobile because the
  component listened for `mousedown` events, which do not fire on touch interactions.
  The fix replaces `mousedown` with `pointerdown`, which fires for both mouse and
  touch input, resolving the issue on mobile devices.
