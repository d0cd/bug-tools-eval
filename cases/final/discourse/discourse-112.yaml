  line_side: pre_fix
- file: lib/discourse_webauthn/authentication_service.rb
  line: 98
  summary: Verification via `cose_key.to_pkey.verify` bypasses the COSE gem's own
    dispatch logic and assumes all algorithms support a separate hash function. Should
    delegate to `cose_algorithm.verify` which correctly handles algorithm-specific
    verification semantics.
