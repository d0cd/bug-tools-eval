description: The email styling code in Discourse handled various onebox types but
  did not convert user profile oneboxes to a table-based layout compatible with email
  clients. Email clients have limited CSS support (no flexbox/grid), causing user
  profile cards to render poorly. The fix adds a dedicated conversion step that restructures
  user oneboxes into an HTML table layout with inline styles.
