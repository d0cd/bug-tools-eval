description: The sidebar 'New Topic' button passed `this.tag?.id` (a numeric database
  ID) to `composer.openNewTopic()`, which expects tag names as strings. This caused
  a TypeError for non-staff users (calling `.filter` on a number) that prevented the
  composer from opening, and for staff users it silently inserted the numeric ID as
  the tag name.
