description: When GPT 5.4 sends max_posts:0 to the Discourse search tools, the code
  interprets it literally and returns zero posts instead of treating 0 as 'no limit'.
  The fix removes the max_posts parameter when its value is 0, so the search falls
  back to the default unlimited behavior.
expected_findings:
- file: plugins/discourse-ai/lib/personas/tools/search.rb
  line: 1
  summary: 'max_posts parameter is not guarded against 0: a value of 0 causes the
    search to return no posts instead of treating it as unlimited. Should treat 0
    the same as nil/absent.'
  line_side: pre_fix
- file: plugins/discourse-ai/lib/personas/tools/discourse_meta_search.rb
  line: 1
  summary: 'Same max_posts:0 issue exists here: 0 is treated as a literal limit rather
    than as ''no limit'', returning empty results when the caller intended unlimited.'
  line_side: pre_fix
