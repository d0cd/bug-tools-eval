description: "The channel settings component used a simple isOpen/else conditional\
  \ to render the open/close toggle, causing any non-open channel state (archived,\
  \ read-only) to incorrectly display an active 'Open channel' button. Clicking this\
  \ on archived or read-only channels triggered the wrong modal and a server error\
  \ since the backend guardian only permits closed\u2192open transitions. The fix\
  \ replaces the catch-all else with an explicit isClosed check and renders a disabled\
  \ button with tooltip for other states."
