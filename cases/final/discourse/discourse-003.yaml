description: The Chat::ListChannelThreadMessages service looked up threads globally
  by thread_id alone, ignoring the channel_id from the URL path. This allowed accessing
  thread messages via a mismatched channel_id, violating REST hierarchy semantics
  and potentially leaking messages from private channels. The fix scopes the thread
  lookup by both thread_id and channel_id and adds a threading-enabled policy check.
expected_findings:
- file: plugins/chat/app/services/chat/list_channel_thread_messages.rb
  line: 1
  summary: 'IDOR: fetch_thread looks up thread by thread_id only without scoping to
    channel_id, allowing access to threads in other channels by manipulating the URL'
  line_side: pre_fix
- file: plugins/chat/app/services/chat/list_channel_thread_messages.rb
  line: 1
  summary: 'Missing policy check: unlike peer services (LookupThread, UpdateUserThreadLastRead),
    this service does not verify that threading is enabled for the channel'
  line_side: pre_fix
