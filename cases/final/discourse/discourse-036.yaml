description: 'Flaky test caused by missing async synchronization in two places: (1)
  the chat lightbox test clicks an image immediately after `this.set()` without waiting
  for the re-render, and (2) the lightbox system''s async work is not wrapped in `waitForPromise`,
  so Ember''s `settled()` test helper cannot track it. The fix adds `await settled()`
  before the click in the test and wraps the lightbox promise with `waitForPromise`
  from `@ember/test-waiters`.'
expected_findings:
- file: plugins/chat/test/javascripts/components/chat-message-collapser-test.gjs
  line: 284
  summary: Missing `await settled()` before `click()` — after `this.set()` the component
    has not re-rendered yet, so the click targets stale DOM, causing flaky failures
  line_side: pre_fix
- file: frontend/discourse/app/lib/lightbox.js
  line: 20
  summary: Async lightbox work is not wrapped in `waitForPromise`, making it invisible
    to Ember's test settled state and causing `settled()` to resolve before the lightbox
    operation completes
  line_side: pre_fix
