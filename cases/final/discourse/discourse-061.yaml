description: The localized (translated) name of the light color scheme was being cached,
  causing it to return a stale value when the locale changed between calls. This produced
  flaky test failures depending on test execution order. The fix ensures the translated
  name is resolved on every access rather than being memoized.
expected_findings:
- file: app/models/color_scheme.rb
  line: 1
  summary: 'Locale-dependent string is being cached/memoized: localized color scheme
    names depend on the current locale and must not be stored in a class-level or
    instance-level cache that persists across locale changes'
  line_side: pre_fix
- file: lib/stylesheet/manager.rb
  line: 1
  summary: References to cached localized color scheme name should use the dynamically-resolved
    name to avoid stale locale values
  line_side: pre_fix
