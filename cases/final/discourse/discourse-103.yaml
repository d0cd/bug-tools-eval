description: The Report model's valueAt and valueFor methods assume this.data is a
  flat array of {x, y} points, but when stacked chart data is enabled, this.data becomes
  an array of series objects with nested data arrays, causing dashboard visit counters
  to silently return incorrect values. A secondary issue has the legacy warning banner
  rendering outside the showHeader conditional, making it visible in counters mode.
expected_findings:
- file: frontend/discourse/admin/models/report.js
  line: 225
  summary: "valueAt/valueFor operate on this.data directly without checking whether\
    \ the data is in stacked format (array of {label, data} series objects vs flat\
    \ {x, y} points); this.data can also be null \u2014 need to detect stacked mode\
    \ (e.g. via report mode) and flatten/sum across series before lookup"
  line_side: pre_fix
- file: frontend/discourse/admin/components/admin-report-new.gjs
  line: 1
  summary: Legacy warning banner is rendered outside the showHeader conditional block,
    causing it to appear even when headers are hidden (e.g. in counters/dashboard
    mode)
  line_side: pre_fix
