description: The server-side code that determines the initial value of `enabled_for`
  for the upcoming changes page did not account for localized staff group names. When
  the staff group name was translated to a non-English locale, the string comparison
  failed and the staff group was not marked as selected on page load, even though
  it was enabled. The fix updates the server-side list service and upcoming changes
  library to match localized group names.
expected_findings:
- file: app/services/upcoming_changes/list.rb
  line: 60
  summary: enabled_for/setting_groups resolution does not account for localized staff
    group names — a translated group name will fail the string match and the staff
    group won't be selected on page load
  line_side: pre_fix
- file: lib/upcoming_changes.rb
  line: 181
  summary: Group name comparison here uses raw (English) name; should resolve localized
    staff group name so non-English locales correctly identify the staff group as
    enabled
  line_side: pre_fix
