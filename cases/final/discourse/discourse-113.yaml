description: 'When importing an AI agent with force=true but no pre-existing agent,
  the overwrite flag was not passed to `importer.import!`, so existing custom tools
  with matching identifiers would not be overwritten. Additionally, `initial_attributes`
  was captured inside the conditional block after the import could have mutated state,
  though this was a secondary issue. The fix passes `overwrite: force_update` in the
  else branch and moves the attribute snapshot before the conditional.'
