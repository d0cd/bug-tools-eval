description: The ChannelsArchivesController#create action allows staff users to archive
  a chat channel into an existing topic without verifying the user has access to that
  destination topic. While the user cannot see the resulting archived content, the
  action itself bypasses topic-level access controls, allowing unauthorized writes
  to restricted topics.
