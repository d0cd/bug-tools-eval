description: 'The DMenu UX rewrite introduced two state-management bugs in the vote
  button component: the vote button label was cached and not reset when navigating
  between topics, and the ''Remove vote'' option was incorrectly shown on closed topics
  where the user had no votes. Both stem from stale or incorrect property derivations
  in the component''s getter methods.'
expected_findings:
- file: plugins/discourse-topic-voting/assets/javascripts/discourse/components/vote-button.gjs
  line: 15
  summary: 'Stale topic reference: the `get topic()` getter caches the topic across
    navigations, so vote button label and state do not update when the user moves
    to a different topic.'
  line_side: pre_fix
- file: plugins/discourse-topic-voting/assets/javascripts/discourse/components/vote-button.gjs
  line: 59
  summary: 'Incorrect conditional logic: ''Remove vote'' action is shown on closed
    topics even when the user has no vote, because the getter does not properly check
    both vote status and topic open state together.'
  line_side: pre_fix
