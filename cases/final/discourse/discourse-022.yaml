description: The Anthropic integration was sending anthropic-beta headers for prompt
  caching and extended thinking/effort features that have graduated to GA. Sending
  these now-unsupported beta flags causes API requests to break. The fix removes the
  obsolete beta headers and updates model presets from Claude 4.5 to Claude 4.6 with
  corrected token limits.
