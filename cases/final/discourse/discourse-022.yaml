    \ valid \u2014 these are now GA and sending the beta flag causes API errors. Remove\
    \ the beta header injection."
  line_side: pre_fix
- file: plugins/discourse-ai/lib/completions/endpoints/aws_bedrock.rb
  line: 1
  summary: AWS Bedrock endpoint may also be sending deprecated beta headers or missing
    model ID mappings for Claude 4.5/4.6, causing request failures.
  line_side: pre_fix
- file: plugins/discourse-ai/lib/completions/llm_presets.rb
  line: 1
  summary: Model presets reference Claude 4.5 Opus/Sonnet with stale max_output_tokens
    and pricing; should be updated to Claude 4.6 variants with 128k output token limit
    for Opus.
  line_side: pre_fix
