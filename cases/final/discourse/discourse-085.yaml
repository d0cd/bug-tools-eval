description: Localized tag names were never sanitized through DiscourseTagging.clean_tag,
  unlike regular tag names. This allowed special characters (e.g., quotes, parentheses)
  to be stored verbatim and rendered into HTML body classes like `tag-mijn-naam" (123)`,
  potentially breaking page rendering and enabling class attribute injection. The
  fix adds a before_validation callback on TagLocalization and a post-migration to
  clean existing dirty names.
