description: 'Category custom field boolean values were incorrectly round-tripped:
  ''true'' stored as a string in the DB was converted to a boolean for FormKit checkboxes,
  but on save was converted back to ''t'' instead of ''true'', breaking downstream
  checks that expected the string ''true''. The fix makes the checkbox component accept
  multiple truthy representations and ensures the server-side controller normalizes
  booleans back to string form for category custom fields.'
expected_findings:
- file: app/controllers/categories_controller.rb
  line: 206
  summary: Category custom field values that are booleans are not being converted
    back to their string representation ('true'/'false') before storage — a boolean
    `true` will be persisted as 't' by ActiveRecord, breaking code that checks for
    the string 'true'.
  line_side: pre_fix
- file: frontend/discourse/app/form-kit/components/fk/control/checkbox.gjs
  line: 4
  summary: Checkbox checked state uses strict equality (`eq`) against boolean `true`
    only. Values like the string 'true' or 't' will not be treated as checked, causing
    the checkbox to appear unchecked for truthy string values loaded from the database.
  line_side: pre_fix
- file: frontend/discourse/admin/controllers/edit-category/tabs.js
  line: 111
  summary: Custom field values loaded from the server are strings ('true'), but after
    a save round-trip they may become 't' — this controller does not normalize the
    value before passing it to the form, propagating the type mismatch.
  line_side: pre_fix
