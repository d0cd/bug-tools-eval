description: 'The `raw-topic-link` element in Horizon high-context cards contains
  an inner span that can become the event target on click. When the span is the target
  instead of the link itself, the client-side routing logic fails to recognize it
  as a navigable link, causing a full page reload instead of an SPA transition. The
  fix ensures clicks on the inner span are attributed to the parent `raw-topic-link`,
  likely via `pointer-events: none` on the child span.'
