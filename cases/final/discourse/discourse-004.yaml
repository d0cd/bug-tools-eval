description: The theme JS detection logic in the test setup file was never updated
  when Discourse switched themes from AMD scripts to native ES modules. The `hasThemeJs`
  check uses a `document.querySelector` selector that matches the old AMD script pattern,
  so it always returns false for the new module-based themes. This causes `isCoreTest`
  to be incorrectly true for theme tests, making deprecation warnings erroneously
  raise errors during theme QUnit tests.
