description: The topic search feature unconditionally includes user real names via
  `COALESCE(u.name, '')` in the ILIKE search query, leaking name information even
  when `SiteSetting.enable_names` is disabled. The fix conditionally appends the name
  column to the search fields only when `enable_names` is true, aligning with the
  behavior of global user search.
expected_findings:
- file: lib/search.rb
  line: 1275
  summary: 'Privacy leak: `COALESCE(u.name, '''')` is unconditionally concatenated
    into the topic search ILIKE query fields, making user real names searchable even
    when `SiteSetting.enable_names` is disabled. The name column should only be included
    when `SiteSetting.enable_names` is true.'
  line_side: pre_fix
