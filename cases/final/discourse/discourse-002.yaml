description: The 'Required' and 'Enum' labels in the AI tool parameter configuration
  were hardcoded English strings instead of using the existing i18n translation keys
  (`parameter_required` and `parameter_enum`). This breaks localization for non-English
  users. The fix replaces the hardcoded strings with proper `i18n` calls.
