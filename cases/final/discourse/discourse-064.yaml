description: When creating a new category from the slide-out sidebar on mobile, the
  sidebar failed to close after the route transition. The fix threads a `@toggleNavigationMenu`
  action through the sidebar component hierarchy (sections → categories-section →
  section) and invokes it on route change using Ember's `next` runloop helper. Additionally,
  the admin changes banner's bottom offset was not accounting for the PWA footer nav,
  and a button element was missing the `btn` base class.
expected_findings:
- file: frontend/discourse/app/components/sidebar/user/categories-section.gjs
  line: 106
  summary: 'Missing `@toggleNavigationMenu` prop pass-through: the categories section
    does not forward the navigation menu toggle action, so creating a category and
    navigating away leaves the sidebar open on mobile.'
  line_side: pre_fix
- file: app/assets/stylesheets/admin/site-settings.scss
  line: 36
  summary: Admin changes banner bottom positioning does not account for `.footer-nav-visible`,
    causing the PWA footer nav to overlap the banner on mobile.
  line_side: pre_fix
- file: frontend/discourse/app/components/d-page-subheader.gjs
  line: 39
  summary: Button element missing the `btn` base CSS class, resulting in inconsistent
    styling with other buttons in the application.
  line_side: pre_fix
