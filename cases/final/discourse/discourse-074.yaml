description: Test specs use `freeze_time 31.days.ago` which produces flaky failures
  depending on the current calendar date — for example, running on March 31 means
  '31 days ago' is February 28, causing month-boundary arithmetic to behave differently
  than expected. The fix replaces the relative duration with a more stable value that
  avoids calendar edge cases.
