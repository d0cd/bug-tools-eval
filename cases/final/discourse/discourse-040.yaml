description: The `pg_function` attribute on `EmbeddingDefinition` was not validated,
  allowing an admin to set it to an arbitrary SQL fragment. This value was then string-interpolated
  into raw SQL queries in `DiscourseAi::Embeddings::Schema`, creating a SQL injection
  vector. The fix adds input validation to restrict `pg_function` to safe, known PostgreSQL
  function names.
