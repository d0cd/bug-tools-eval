  summary: 'Missing validation: auth_redirect parameter is not checked against the
    UserApiKeyClient''s registered redirect URL. An attacker can use a valid client
    public key with an arbitrary redirect URL that matches the global wildcard allowlist,
    bypassing per-client redirect restrictions.'
