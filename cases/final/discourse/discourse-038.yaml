description: The delegated auth flow in redirect_to_login_if_required validated auth_redirect
  only against global allowed_user_api_auth_redirects wildcards, but never checked
  it against the specific UserApiKeyClient's registered auth_redirect. This allowed
  an attacker to pair a legitimate client's public key with a different redirect URL,
  enabling an open redirect that could capture user authorization tokens.
