description: Category authors could restore chat messages that were deleted by someone
  else, even without moderation privileges. The guardian check in `can_restore_chat?`
  allowed any user whose `deleted_by_id` matched OR who had category-level permissions,
  but did not properly gate non-self-deleted message restores behind `can_moderate_chat?`.
  Additionally, the client-side subscription managers removed deleted messages from
  the UI on live-delete events, causing moderators to lose visibility of deleted messages
  without a full page reload.
expected_findings:
- file: plugins/chat/lib/chat/guardian_extensions.rb
  line: 246
  summary: 'Authorization bypass: the restore guard allows category authors to restore
    messages deleted by other users. The check should require `can_moderate_chat?`
    when `deleted_by_id != current_user.id`, not just fall through on category-level
    permissions.'
  line_side: pre_fix
- file: plugins/chat/assets/javascripts/discourse/lib/chat-message-interactor.js
  line: 126
  summary: 'Missing permission check: the restore action visibility condition uses
    `canModerate` but does not account for whether the current user is the one who
    deleted the message, allowing the UI to offer restore to unauthorized category
    authors.'
  line_side: pre_fix
- file: plugins/chat/assets/javascripts/discourse/lib/chat-channel-subscription-manager.js
  line: 184
  summary: Live-delete handler unconditionally removes the message from the channel
    message list. For moderators/admins, deleted messages should remain visible (marked
    as deleted) so they can take action without a reload.
  line_side: pre_fix
