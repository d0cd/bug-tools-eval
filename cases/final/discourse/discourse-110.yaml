description: The NavItem component's `active` getter calls `router.isActive(route)`
  without passing the `routeParam` dynamic segment value. This causes all nav items
  sharing the same route but with different params to appear active simultaneously.
  The fix passes `routeParam` to `router.isActive(route, routeParam)` when the param
  is present.
