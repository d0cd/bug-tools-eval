description: The `getConsolePrefix` function in `deprecated.js` calls `consolePrefix(null,
  source)` but omits the `return` keyword, so it always returns `undefined`. This
  caused deprecation warnings to lose their source-identifying prefix (e.g. `[THEME
  123 'test-theme']`). The bug was masked because a downstream `filter(Boolean)` silently
  stripped the `undefined` value.
