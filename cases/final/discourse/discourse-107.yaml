description: An empty Ember route file at `routes/admin-plugins/explorer/queries.js`
  was removed before merging a prior commit, but it was necessary for Ember's resolver
  to correctly match the `adminPlugins.explorer.queries` route. Without it, the resolver's
  suffix trie falls back to `queries/index.js`, causing old Data Explorer query links
  (e.g. `/admin/plugins/explorer/queries/:id`) to fail to redirect to the new path
  (`/admin/plugins/discourse-data-explorer/queries/:id`).
