description: The AI helper assistant controller used a single unioned authorization
  check (ensure_can_request_composer_suggestions) applied broadly, allowing users
  with only composer AI helper group access to call post AI helper endpoints and vice
  versa. The fix splits the before_action into context-specific permission checks
  so each endpoint enforces its own group policy.
expected_findings:
- file: plugins/discourse-ai/app/controllers/discourse_ai/ai_helper/assistant_controller.rb
  line: 7
  summary: 'Authorization bypass: before_action :ensure_can_request_composer_suggestions
    is applied to post-context endpoints (like stream_suggestion) via an overly broad
    `except:` clause, allowing users with only composer permissions to access post
    helper actions.'
  line_side: pre_fix
- file: plugins/discourse-ai/app/controllers/discourse_ai/ai_helper/assistant_controller.rb
  line: 286
  summary: 'Missing context-specific authorization: the stream_suggestion/post helper
    actions lack their own before_action guard, relying on the unioned composer check
    which does not enforce post-specific group membership.'
  line_side: pre_fix
