description: The destroy post action endpoint leaked post content to users who no
  longer had access. By calling the undo/destroy post action within the `post_undo_action_window_mins`
  window after a post was made inaccessible, an attacker could retrieve the post's
  content from the response. The fix adds an access check before returning the post
  data.
