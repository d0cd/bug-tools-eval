description: API credentials (api_key, api_username) were passed as URL query parameters
  when polling RSS feeds. This is both a security risk (credentials leak via server
  logs, proxy logs, and Referer headers) and a functional bug since api_parameter_allowed?
  rejects the request when route path_parameters aren't populated in this context.
  The fix extracts credentials from the URL and sends them as Api-Key/Api-Username
  HTTP headers instead.
